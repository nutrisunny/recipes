const ZEMO={"新手":"🌱","懶人":"🛋️","澎湃":"🍊","高蛋白":"💪"};
const zbar=document.getElementById('zbar');
{const lb=document.createElement('span');lb.className='barlabel';lb.textContent='專區';zbar.appendChild(lb);}
ZONES.forEach(([label,key],zi)=>{const b=document.createElement('button');b.className='zpill z'+zi;b.textContent=label;
  b.onclick=()=>{const on=b.classList.contains('active');[...zbar.querySelectorAll('.zpill')].forEach(x=>x.classList.remove('active'));
    if(on){curZone="全部";}else{curZone=key;b.classList.add('active');}render();window.scrollTo({top:0})};zbar.appendChild(b);});
function zmatch(r){return curZone==="全部"||(r.zones||[]).includes(curZone);}
function zbadges(r){const z=(r.zones||[]).map(t=>ZEMO[t]||'').join('');return z?` <span class="zb" title="${(r.zones||[]).join('、')}">${z}</span>`:'';}
let curLCat="全部";
const lbar=document.getElementById('lbar');
const lcats=DB.cats.filter(c=>(DB.vrecipes||[]).some(r=>r.wide&&r.cat===c));
{const lb=document.createElement('span');lb.className='barlabel';lb.textContent='分類';lbar.appendChild(lb);}
["全部",...lcats].forEach(c=>{const b=document.createElement('button');b.className='pill'+(c==="全部"?' active':'');b.textContent=c;
  b.onclick=()=>{curLCat=c;[...lbar.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');render();window.scrollTo({top:0})};lbar.appendChild(b);});
function match(r){const kw=q.value.trim().toLowerCase();if(!zmatch(r))return false;if(curCat!=="全部"&&r.cat!==curCat)return false;if(!kw)return true;
  return r.name.toLowerCase().includes(kw)||r.ing.join(",").toLowerCase().includes(kw);}
function thumb(r){return r.img?`<img src="${r.img}" alt="${r.name}">`:`<div class="ph">${r.name}</div>`;}
function cardCard(r){return `<div class="card" onclick="openModal(${DB.recipes.indexOf(r)})"><div class="thumb"><span class="badge">${r.cat}</span>${r.yt?'<span class="vbadge">▶ 影片</span>':''}${thumb(r)}</div><div class="body"><h3>${r.name}${zbadges(r)}</h3><div class="ing">${r.desc||r.ing.join('、')}</div></div></div>`;}
function fmtViews(n){if(!n)return'';return n>=10000?(n/10000).toFixed(1).replace(/\.0$/,'')+'萬':n.toLocaleString();}
function vidCard(r){return `<div class="card" onclick="openVModal(${DB.vrecipes.indexOf(r)})"><div class="vthumb"><img src="${r.img}" alt="${r.name}">${r.cat?`<span class="badge">${r.cat}</span>`:''}<span class="vbadge">▶ 影片</span><div class="vplay"><span>${PLAY_SVG}</span></div></div><div class="body"><h3>${r.name}${zbadges(r)}</h3>${r.desc?`<div class="ing">${r.desc}</div>`:''}${r.views?`<div class="views">▶ ${fmtViews(r.views)}次觀看</div>`:''}</div></div>`;}
function kwMatchCard(r,kw){return r.name.toLowerCase().includes(kw)||r.ing.join(",").toLowerCase().includes(kw)||(r.ingFull||"").toLowerCase().includes(kw);}
function render(){
  const kw=q.value.trim().toLowerCase();
  const sv=document.getElementById('searchview'),cv=document.getElementById('cardview'),vv=document.getElementById('vidview');
  if(kw){sv.style.display='block';cv.style.display='none';vv.style.display='none';renderSearch(kw);return;}
  sv.style.display='none';
  cv.style.display=mode==='card'?'block':'none';
  vv.style.display=mode==='vid'?'block':'none';
  document.getElementById('longview').style.display=mode==='long'?'block':'none';
  document.getElementById('plateview').style.display=mode==='plate'?'block':'none';
  if(mode==='vid')renderV();else if(mode==='long')renderL();else renderCards();}
function renderCards(){const list=DB.recipes.filter(match);countEl.textContent=`共 ${list.length} 道`;
  grid.innerHTML=list.map(cardCard).join('')||`<p style="color:#999">找不到符合的食譜</p>`;}
let curSort="default";
const SORTS=[["預設","default"],["觀看數多→少","desc"],["觀看數少→多","asc"]];
function buildSortBar(id){const bar=document.getElementById(id);
  const lb=document.createElement('span');lb.className='barlabel';lb.textContent='排序';bar.appendChild(lb);
  SORTS.forEach(([label,key])=>{const b=document.createElement('button');b.className='pill'+(key==="default"?' active':'');b.textContent=label;
    b.onclick=()=>{curSort=key;document.querySelectorAll('.sortbar .pill').forEach(x=>x.classList.toggle('active',x.textContent===label));render();};bar.appendChild(b);});}
buildSortBar('vsortbar');buildSortBar('lsortbar');
function applySort(list){if(curSort==="default")return list;
  return [...list].sort((a,b)=>curSort==="desc"?(b.views||0)-(a.views||0):(a.views||0)-(b.views||0));}
function renderV(){const list=applySort((DB.vrecipes||[]).filter(r=>!r.wide).filter(zmatch).filter(r=>curVCat==="全部"||r.cat===curVCat));
  document.getElementById('vcount').textContent=`共 ${list.length} 道影片食譜`;
  document.getElementById('vgrid').innerHTML=list.map(vidCard).join('')||`<p style="color:#999">找不到符合的影片食譜</p>`;}
function renderSearch(kw){
  const cm=DB.recipes.filter(zmatch).filter(r=>kwMatchCard(r,kw));
  const vm=(DB.vrecipes||[]).filter(zmatch).filter(r=>!r.wide&&r.name.toLowerCase().includes(kw));
  const lm=(DB.vrecipes||[]).filter(zmatch).filter(r=>r.wide&&r.name.toLowerCase().includes(kw));
  let h='';
  if(cm.length)h+=`<div class="sgrouptitle">圖卡食譜（${cm.length}）</div><div class="grid">${cm.map(cardCard).join('')}</div>`;
  if(vm.length)h+=`<div class="sgrouptitle">影片食譜（${vm.length}）</div><div class="grid vgrid">${vm.map(vidCard).join('')}</div>`;
  if(lm.length)h+=`<div class="sgrouptitle">長片教學（${lm.length}）</div><div class="grid vgrid">${lm.map(vidCard).join('')}</div>`;
  document.getElementById('sresults').innerHTML=h||`<p style="color:#999;text-align:center;margin:30px">找不到符合的食譜</p>`;
  document.getElementById('scount').textContent=`搜尋「${q.value.trim()}」：圖卡 ${cm.length} ＋ 影片 ${vm.length} ＋ 長片 ${lm.length} 道`;}
function renderL(){const list=applySort((DB.vrecipes||[]).filter(r=>r.wide).filter(zmatch).filter(r=>curLCat==="全部"||r.cat===curLCat));
  document.getElementById('lcount').textContent=`共 ${list.length} 道長片教學`;
  document.getElementById('lgrid').innerHTML=list.map(vidCard).join('')||`<p style="color:#999">尚無長片教學</p>`;}
const PLATE_CATS={grain:['全穀雜糧'],protein:['肉類','海鮮魚類','豆蛋'],veg1:['蔬菜'],veg2:['蔬菜'],soup:['湯品']};
const PLATE_FIXED={fruit:['當季水果 1 份（約 1 個拳頭大）','芭樂 1 顆','蘋果 1 顆','香蕉 1 根','奇異果 2 顆','橘子 1 顆','小番茄 1 碗'],
nut:['原味堅果 1 小把','無調味腰果 5-8 顆','核桃 2-3 顆','杏仁 8-10 顆'],
dairy:['鮮奶 240ml','無糖優格 1 杯','無糖優酪乳 1 杯','起司 2 片']};
let plateSel={};
const STARCH_KW=['馬鈴薯','山藥','薏仁','南瓜','芋頭','玉米','栗子','地瓜','蓮藕','米糕','粥','冬粉'];
function hasStarch(r){const t=(r.name+(Array.isArray(r.ing)?r.ing.join(''):String(r.ing||''))).replace(/玉米雞/g,'');return STARCH_KW.some(k=>t.includes(k));}
const RICE_RE=/飯|麵|便當|糕|粿|糰|粽|包/;
const ONEDISH_RE=/炒飯|炒麵|炒米粉|便當|咖哩飯|義大利麵|油飯|沙拉$|漢堡|壽司|吐司|刈包|潤餅|捲餅|飯糰/;
function platePool(cats,excl,slot){let pool=[...DB.recipes.map((r,i)=>({r,i,vid:false})),...(DB.vrecipes||[]).map((r,i)=>({r,i,vid:true}))]
  .filter(p=>p.r.img&&cats.includes(p.r.cat)&&p.r.name!==excl&&!p.r.name.endsWith('醬'));
  pool=pool.filter(p=>!ONEDISH_RE.test(p.r.name));
  if(slot==='soup')pool=pool.filter(p=>!hasStarch(p.r));
  if(slot==='protein'||slot==='veg1'||slot==='veg2')pool=pool.filter(p=>!RICE_RE.test(p.r.name));
  return pool;}
function rollSlot(k){const excl=k==='veg1'?(plateSel.veg2&&plateSel.veg2.r.name):(k==='veg2'?(plateSel.veg1&&plateSel.veg1.r.name):null);
  const pool=platePool(PLATE_CATS[k],excl,k);
  plateSel[k]=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('p-'+k).textContent=plateSel[k]?plateSel[k].r.name:'—';if(document.getElementById('platemenu'))renderMenu();}
function rollFixed(k){const arr=PLATE_FIXED[k];const cur=document.getElementById('p-'+k).textContent;
  let n;do{n=arr[Math.floor(Math.random()*arr.length)];}while(arr.length>1&&n===cur);
  document.getElementById('p-'+k).textContent=n;if(document.getElementById('platemenu'))renderMenu();}
function rollPlate(){['grain','protein','veg1','veg2','soup'].forEach(rollSlot);['fruit','nut','dairy'].forEach(rollFixed);renderMenu();
  try{window.goatcounter&&goatcounter.count&&goatcounter.count({path:'配餐',title:'配餐',event:true});}catch(e){}}
function openPlate(k){const p=plateSel[k];if(!p)return;(p.vid?openVModal:openModal)(p.i);}
function menuLines(){const g=k=>document.getElementById('p-'+k).textContent;
  return [['全穀雜糧',g('grain')],['豆蛋魚肉',g('protein')],['蔬菜',g('veg1')+'、'+g('veg2')],['湯品',g('soup')],
          ['水果',g('fruit')],['堅果',g('nut')],['乳品',g('dairy')]];}
function renderMenu(){document.getElementById('platemenu').innerHTML=
  menuLines().map(([k,v])=>`<div><b>${k}</b>${v}</div>`).join('');}
function copyMenu(btn){const NL=String.fromCharCode(10);const txt='🍽️ 今日營養餐盤菜單'+NL+menuLines().map(([k,v])=>k+'：'+v).join(NL)+NL+'— 送你營養吃 https://nutrisunny.github.io/recipes/';
  navigator.clipboard.writeText(txt).then(()=>{const o=btn.textContent;btn.textContent='✅ 已複製';setTimeout(()=>btn.textContent=o,1500);});}
function setMode(m){mode=m;q.value='';window.scrollTo({top:0});
  document.getElementById('ms-card').classList.toggle('active',m==='card');
  document.getElementById('ms-vid').classList.toggle('active',m==='vid');
  document.getElementById('ms-long').classList.toggle('active',m==='long');
  document.getElementById('ms-plate').classList.toggle('active',m==='plate');
  if(m==='plate'&&!plateSel.grain)rollPlate();
  render();}
function ingTokens(r){const raw=Array.isArray(r.ing)?r.ing:String(r.ing||'').split('、');
  return raw.map(x=>x.trim().split(/[ （(]/)[0]).filter(x=>x&&x.length>=2);}
function relatedHtml(cur,isVid){
  const pool=[];
  DB.recipes.forEach((r,i)=>{if(r.img&&!(!isVid&&r===cur))pool.push({r,i,vid:false});});
  (DB.vrecipes||[]).forEach((r,i)=>{if(!(isVid&&r===cur))pool.push({r,i,vid:true});});
  const myIng=new Set(ingTokens(cur)), myZ=new Set(cur.zones||[]);
  pool.forEach(p=>{let sc=0;
    if(p.r.cat&&p.r.cat===cur.cat)sc+=3;
    (p.r.zones||[]).forEach(z=>{if(myZ.has(z))sc+=1;});
    ingTokens(p.r).forEach(t=>{if(myIng.has(t))sc+=2;});
    p.sc=sc;});
  const top=pool.filter(p=>p.sc>=4).sort((a,b)=>b.sc-a.sc).slice(0,3);
  if(!top.length)return'';
  return `<h4>你可能會喜歡</h4><div class="rel">${top.map(p=>
    `<div class="relcard" onclick="${p.vid?'openVModal':'openModal'}(${p.i})"><img src="${p.r.img}" alt="${p.r.name}" loading="lazy"><p>${p.r.name}</p></div>`).join('')}</div>`;}
function openVModal(i){const r=DB.vrecipes[i];gcEvent(r.name);
  let h=`<div class="mimg mvid"><iframe class="${r.wide?'wide':''}" src="https://www.youtube.com/embed/${r.yt}" title="${r.name}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  h+=`<div class="mbody"><div class="mcat">影片食譜${r.cat?'｜'+r.cat:''}</div><h2>${r.name}</h2>`;
  if(r.ing){h+=`<h4>食材</h4><div class="tags">${tagize(r.ing)}</div>`;}
  if(r.wide&&r.chapters&&r.chapters.length){h+=`<h4>影片時間軸（點時間直接跳到該段）</h4><div class="chaps">${r.chapters.map(c=>`<button class="chap" onclick="seekTo('${r.yt}',${c.s})"><b>${c.t}</b>${c.label}</button>`).join('')}</div>`;}
  if(r.steps&&r.steps.length){h+=`<h4>作法</h4><ol class="steps">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;}
  else{h+=`<p style="color:var(--muted);font-size:14px;line-height:1.7;margin:2px 0 0">跟著影片一步一步做，快速學會這道料理 🍳</p>`;}
  h+=buyBtns(r.ing||'',r.name);
  if(r.tip){h+=`<div class="tip">💡 ${r.tip}</div>`;}
  if(r.long){h+=`<a class="longbtn" href="${r.long}" target="_blank" rel="noopener">🎬 觀看完整教學長片</a>`;}
  h+=relatedHtml(r,true);
  h+=`<div class="follow"><p>❤️ 喜歡這道料理？追蹤送你營養吃看更多影片食譜！</p><div class="socials">${SOCIAL_MODAL}</div></div></div>`;
  const mEl=document.getElementById('modal');mEl.classList.toggle('longmode',!!r.wide);mEl.innerHTML=h;
  document.getElementById('overlay').classList.add('show');}
function tagize(s){return s.split(/[、,]/).map(x=>x.trim()).filter(Boolean).map(x=>`<span class="tag">${x}</span>`).join('');}
function buyBtns(t,name){let h='',note='';
  if(t.includes('蒟蒻米'))h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E8%92%9F%E8%92%BB%E7%B1%B3" target="_blank" rel="noopener">🛒 哪裡買蒟蒻米</a>`;
  if(t.includes('蒟蒻麵'))h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E8%92%9F%E8%92%BB%E9%BA%B5" target="_blank" rel="noopener">🛒 哪裡買蒟蒻麵</a>`;
  if(t.includes('番茄')){
    note+=`<div class="buynote">🍅 如果沒有番茄，可以用番茄原汁或番茄濃縮汁代替！</div>`;
    h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E7%95%AA%E8%8C%84%E5%8E%9F%E6%B1%81" target="_blank" rel="noopener">🛒 日本番茄汁</a>`;
    h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E7%95%AA%E8%8C%84%E6%BF%83%E7%B8%AE%E6%B1%81" target="_blank" rel="noopener">🛒 日本番茄濃縮汁</a>`;}
  if(t.includes('醬油')){
    note+=`<div class="buynote">調味時，推薦選用成分簡單、無化學添加的醬油。我們自家這款醬油原料極簡，沒有看不懂的化學名詞，只留下最純粹的甘醇，讓每天的健康餐桌美味又毫無負擔。</div>`;
    if(t.replace(/醬油膏/g,'').includes('醬油'))h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E8%96%84%E9%B9%BD%E9%86%AC%E6%B2%B9" target="_blank" rel="noopener">🛒 屏大薄鹽醬油</a>`;
    if(t.includes('醬油膏'))h+=`<a class="buybtn" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E9%86%AC%E6%B2%B9%E8%86%8F" target="_blank" rel="noopener">🛒 屏大醬油膏</a>`;}
  return h?note+`<div class="buyrow">${h}</div>`:'';}
function gcEvent(n){try{window.goatcounter&&goatcounter.count&&goatcounter.count({path:'食譜/'+n,title:n,event:true});}catch(e){}}
function openModal(i){const r=DB.recipes[i];gcEvent(r.name);
  const ingHtml=r.ingFull?tagize(r.ingFull):(r.ing.map(x=>`<span class="tag">${x}</span>`).join('')||'<span style="color:#999">（待補）</span>');
  const left = r.yt
    ? `<div class="mimg mvid"><iframe src="https://www.youtube.com/embed/${r.yt}" title="${r.name}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>${r.ytNote?`<div class="vnote">ℹ️ ${r.ytNote}</div>`:''}</div>`
    : `<div class="mimg">${r.img?`<img src="${r.img}" alt="${r.name}">`:`<div class="ph">${r.name}</div>`}</div>`;
  let h=`${left}<div class="mbody"><div class="mcat">${r.cat}</div><h2>${r.name}</h2>`;
  h+=`<h4>食材</h4><div class="tags">${ingHtml}</div>`;
  if(r.sea) h+=`<h4>調味料</h4><div class="tags">${tagize(r.sea)}</div>`;
  if(r.steps&&r.steps.length) h+=`<h4>作法</h4><ol class="steps">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
  else h+=`<div class="pending">📝 完整步驟陸續整理中，敬請期待</div>`;
  h+=buyBtns((r.ingFull||'')+','+(r.sea||'')+','+r.ing.join(','),r.name);
  if(r.tip) h+=`<div class="tip">💡 ${r.tip}</div>`;
  h+=relatedHtml(r,false);
  h+=`<div class="follow"><p>❤️ 喜歡這道料理？追蹤送你營養吃看更多食譜！</p><div class="socials">${SOCIAL_MODAL}</div></div></div>`;
  const mEl2=document.getElementById('modal');mEl2.classList.remove('longmode');mEl2.innerHTML=h;
  document.getElementById('overlay').classList.add('show');}
function seekTo(id,s){const f=document.querySelector('.modal iframe');if(f){f.src=`https://www.youtube.com/embed/${id}?start=${s}&autoplay=1`;}}
function closeModal(){document.getElementById('overlay').classList.remove('show');document.querySelectorAll('.modal iframe').forEach(f=>f.src='')}
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal()};
q.oninput=render;render();
window.addEventListener('scroll',()=>{document.getElementById('totop').classList.toggle('show',window.scrollY>600)});
</script>
<script data-goatcounter="https://nutrisunny.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
