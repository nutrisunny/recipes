<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>送你營養吃｜家常食譜</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  :root{
    --cream:#f8f2e8; --card:#fff; --ink:#50412f; --muted:#9c8b76;
    --rose:#d98fa4; --rose-d:#c26f88; --tan:#e0b877; --line:#ede3d3;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
       background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  header{background:linear-gradient(135deg,#f6dde1,#f9ecdd);padding:24px 18px 20px;text-align:center}
  header .logo{width:88px;height:88px;border-radius:50%;box-shadow:0 4px 14px rgba(120,80,60,.18);background:#fff}
  header h1{margin:10px 0 2px;font-size:25px;font-weight:800;color:var(--ink)}
  header p{margin:0;font-size:13px;color:#7d6b58}
  .search-wrap{max-width:520px;margin:16px auto 0;position:relative}
  .search-wrap input{width:100%;padding:12px 16px 12px 42px;border:none;border-radius:30px;
       font-size:15px;box-shadow:0 4px 16px rgba(120,80,60,.14);outline:none;background:#fff}
  .search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.4}
  .modeswitch{display:flex;gap:8px;justify-content:center;padding:16px 12px 6px;background:var(--cream)}
  .msbtn{border:1.5px solid var(--rose);background:transparent;color:var(--rose-d);font-size:15px;
       font-weight:700;padding:9px 26px;border-radius:24px;cursor:pointer;transition:.15s}
  .msbtn.active{background:var(--rose);color:#fff}
  .sgrouptitle{max-width:1100px;margin:20px auto 2px;padding:0 16px;font-size:15px;font-weight:800;color:var(--rose-d)}
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .vthumb{aspect-ratio:1;position:relative;background:#e9e2d6}
  .vthumb img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
  .vplay{position:absolute;right:9px;bottom:9px;display:flex;align-items:center;justify-content:center}
  .vplay span{width:40px;height:40px;border-radius:50%;background:rgba(220,20,20,.92);
       display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .vplay svg{width:19px;height:19px;fill:#fff;margin-left:2px}
  .bar{position:sticky;top:0;z-index:20;background:var(--cream);border-bottom:1px solid var(--line);
       padding:10px 12px;display:flex;gap:8px;overflow-x:auto}
  .pill{flex:0 0 auto;border:1.5px solid var(--rose);color:var(--rose-d);background:transparent;
       padding:7px 15px;border-radius:20px;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s}
  .pill.active{background:var(--rose);color:#fff;border-color:var(--rose)}
  .count{max-width:1100px;margin:14px auto 0;padding:0 16px;color:var(--muted);font-size:13px}
  .grid{max-width:1100px;margin:10px auto 40px;padding:0 16px;
       display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;
       box-shadow:0 2px 10px rgba(120,80,60,.08);transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(120,80,60,.16)}
  .thumb{aspect-ratio:1;background:#f0ede3;position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
       font-size:22px;font-weight:800;color:var(--rose-d);background:repeating-linear-gradient(45deg,#f3f0e6,#f3f0e6 10px,#eee9db 10px,#eee9db 20px)}
  .badge{position:absolute;top:8px;left:8px;background:rgba(217,143,164,.94);color:#fff;
       font-size:11px;padding:3px 9px;border-radius:12px}
  .vbadge{position:absolute;top:8px;right:8px;background:rgba(220,20,20,.94);color:#fff;
       font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px}
  .modal .mvid{padding:14px;background:#faf7ef;flex-direction:column;gap:8px;justify-content:center}
  .modal .mvid iframe{height:min(74vh,600px);width:auto;max-width:100%;aspect-ratio:9/16;border:0;border-radius:10px}
  .vnote{font-size:12.5px;line-height:1.5;color:var(--rose-d);background:#fff;
       border:1px solid var(--line);border-radius:8px;padding:7px 10px;width:100%}
  .longbtn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;
       padding:11px 16px;border-radius:12px;background:#fff;border:1.5px solid var(--rose);
       color:var(--rose-d);font-size:14px;font-weight:700;transition:.15s}
  .longbtn:hover{background:var(--rose);color:#fff}
  .buynote{margin-top:14px;font-size:13.5px;color:#8a6a2f;line-height:1.6;font-weight:600}
  .buyrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .buybtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:16px;
       background:#fdf6e8;border:1.5px solid var(--tan);color:#8a6a2f;font-size:13px;font-weight:700;transition:.15s}
  .buybtn:hover{background:var(--tan);color:#fff}
  .card .body{padding:11px 13px 13px}
  .card h3{margin:0 0 5px;font-size:16px;font-weight:700}
  .card .ing{font-size:12px;color:var(--muted);line-height:1.5;
       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .overlay{position:fixed;inset:0;background:rgba(60,45,35,.55);display:none;z-index:50;
       align-items:center;justify-content:center;padding:16px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:860px;width:100%;max-height:90vh;overflow:auto;
       display:grid;grid-template-columns:1fr 1fr}
  .modal .mimg{background:#fff;display:flex;align-items:center;justify-content:center}
  .modal .mimg img{width:100%;height:auto;aspect-ratio:1;object-fit:contain;display:block}
  .modal .mimg .ph{min-height:280px;width:100%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:var(--rose-d)}
  .modal .mbody{padding:24px 24px 28px}
  .modal .mcat{color:var(--tan);font-size:13px;font-weight:800;filter:brightness(.85)}
  .modal h2{margin:6px 0 14px;font-size:26px}
  .modal h4{margin:18px 0 8px;font-size:14px;color:var(--muted);letter-spacing:1px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:#fbeef1;color:var(--rose-d);padding:6px 12px;border-radius:14px;font-size:14px}
  .steps{margin:8px 0 0;padding-left:22px;font-size:14.5px;line-height:1.85;color:var(--ink)}
  .steps li{margin-bottom:7px;padding-left:2px}
  .steps li::marker{color:var(--rose-d);font-weight:700}
  .tip{margin-top:14px;padding:10px 13px;background:#eef6ee;border:1px solid #d2e7d2;border-radius:10px;font-size:13px;color:#4d7a4d;line-height:1.6}
  .pending{margin-top:12px;padding:9px 13px;background:#faf3ea;border:1px dashed #e2cfa8;border-radius:10px;font-size:13px;color:#a2865c}
  .video{position:relative;padding-top:56.25%;margin-top:8px;border-radius:12px;overflow:hidden;background:#000}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .follow{margin-top:20px;padding:14px;background:#fbf3ea;border:1px solid #f0e2cd;border-radius:14px}
  .follow p{margin:0 0 10px;font-size:13px;color:#8a6d4f;font-weight:600}
  .socials{display:flex;flex-wrap:wrap;gap:8px}
  .s-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;
       color:#fff;font-size:13px;font-weight:600}
  .s-btn svg{width:16px;height:16px}
  .s-fb{background:#1877f2}.s-yt{background:#ff0000}.s-line{background:#06c755}
  .s-btn:hover{opacity:.9}
  .close{position:absolute;top:20px;right:22px;background:#fff;border:none;width:38px;height:38px;
       border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(60,45,35,.2);z-index:60}
  footer{background:#efe0d0;color:var(--ink);text-align:center;padding:26px 16px}
  footer .flogo{width:56px;height:56px;border-radius:50%;box-shadow:0 2px 8px rgba(120,80,60,.2)}
  footer h3{margin:8px 0 4px;font-size:17px}
  footer .socials{justify-content:center;margin:12px 0 10px}
  footer .credit{font-size:12px;color:#8a7862;margin-top:6px}
  @media(max-width:640px){.modal{grid-template-columns:1fr}header h1{font-size:22px}}
</style>
</head>

<script>
const DB = {"recipes": [{"id": "MEAT-01", "name": "九層塔雞丁", "cat": "肉類", "ing": ["雞肉餅", "洋蔥", "蒜頭", "辣椒", "九層塔", "葵花油"], "img": "MEAT-01.jpg", "ingFull": "洋蔥 50g、蒜頭 20g、辣椒 5g、九層塔 20g、葵花油 10ml", "sea": "鹽巴 適量、味醂 5ml、白胡椒粉 適量", "steps": ["將雞肉餅取出退冰。", "洋蔥、蒜頭、辣椒切末。", "熱鍋後加入油,加入蒜頭、辣椒、洋蔥爆香。", "加入雞肉餅炒熟,再加入全部調味料。", "起鍋前,加入九層塔即可。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "MEAT-02", "name": "宮保雞丁", "cat": "肉類", "ing": ["雞胸肉", "乾辣椒", "蒜頭", "雞蛋", "青蔥段", "辣油", "醬油膏", "白醋", "胡椒", "九層塔"], "img": "MEAT-02.jpg", "ingFull": "雞胸肉（去皮）300g、蛋白 40g（1顆)、青蔥 30g、乾辣椒 30g、蒜頭 20g、芥花油 10ml", "sea": "黑胡椒粉 適量、鹽巴 適量、醬油膏 10ml、辣油 5ml、白醋 20ml", "steps": ["雞胸肉去皮切小塊，加入黑胡椒、蛋白、鹽巴抓醃均勻，靜置3小時。", "青蔥、乾辣椒切段。", "熱鍋後加入油，以小火將蒜頭、乾辣椒煸香，盛起備用。", "放入雞胸肉，拌炒至八分熟，加入蒜頭、乾辣椒，加入醬油膏、辣油拌炒。", "起鍋前，加入蔥段與少許白醋即可盛盤。"], "tip": "雞胸肉抓醃後靜置一晚，可使雞肉更軟嫩。乾辣椒泡水軟化後擦乾，以小火煸炒，可讓香氣更足夠。", "yt": "", "ytNote": ""}, {"id": "MEAT-03", "name": "椒鹽腰內肉", "cat": "肉類", "ing": ["腰內肉", "雞蛋", "青蔥", "薑", "蒜頭", "辣椒", "玄米油"], "img": "MEAT-03.jpg", "ingFull": "腰內肉 300g、雞蛋 55g（1 顆）、青蔥 30g、薑 10g、蒜頭 20g、辣椒 5g、玄米油 10ml", "sea": "鹽巴 適量、白胡椒粉 適量", "steps": ["青蔥、薑、蒜、辣椒切成末，腰內肉切薄片。", "將雞蛋與鹽巴攪打均勻，放入腰內肉抓醃。", "熱鍋加油，炒熟腰內肉後盛起備用。", "以蒜末、薑末、辣椒末爆香，再放入腰內肉拌炒。", "起鍋前加入蔥末與白胡椒粉提香即可。"], "tip": "腰內肉在「半解凍」狀態時最好切，能輕鬆切薄、熟得更切得夠薄，口感也會更嫩。", "yt": "w0vwdIXyfC8", "ytNote": ""}, {"id": "MEAT-04", "name": "涼拌牛腱", "cat": "肉類", "ing": ["滷牛腱", "蒜頭", "辣椒", "青蔥", "香菜"], "img": "MEAT-04.jpg", "ingFull": "滷牛腱 300g、青蔥 30g、蒜頭 20g、香菜 20g、辣椒 10g", "sea": "醬油膏 適量、香油 10ml、黑胡椒粉 適量", "steps": ["將滷牛腱退冰後切成片狀。", "蒜頭切片，辣椒、青蔥切絲，香菜切段。", "將所有食材盛盤，加入醬油膏、黑胡椒、香油調味即可。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "MEAT-05", "name": "涼拌雞絲", "cat": "肉類", "ing": ["雞胸肉", "蒜頭", "洋蔥", "香菜", "腐竹"], "img": "MEAT-05.jpg", "ingFull": "雞胸肉 300g、洋蔥 80g、腐竹 80g、香菜 20g、蒜頭 5g、辣椒 2g", "sea": "醬油膏 20ml、辣油（或香油）10ml、白胡椒粉 適量", "steps": ["將雞胸肉浸泡在鹽水中約20分鐘。", "水煮滾後關火，放入雞胸肉，加蓋燜熟。", "蒜頭、香菜、辣椒切末；洋蔥切絲泡冰水；腐竹煮熟備用。", "將雞胸肉撕絲，加入所有食材與調味料，拌勻即可。"], "tip": "腐竹、豆皮可依個人喜好替換，也能加入小黃瓜絲或綠竹筍絲增添口感。", "yt": "97XWfwbMK1I", "ytNote": ""}, {"id": "MEAT-06", "name": "炒牛肚", "cat": "肉類", "ing": ["牛肚", "豆芽菜", "薑", "蒜頭", "青蔥", "辣椒", "玄米油"], "img": "MEAT-06.jpg", "ingFull": "牛肚 400g、豆芽菜 100g、薑40g、蒜頭 20g、青蔥 40g、辣椒 5g、玄米油 10ml", "sea": "米酒 15ml、醬油膏 15ml、白醋 5ml、白胡椒粉 適量", "steps": ["青蔥切段，薑切片，蒜頭、辣椒切末。", "煮一鍋水，放入薑片、米酒、牛肚，煮約一小時，將牛肚煮軟並去除腥味，煮好放涼切成薄片。", "熱鍋後加入油，放入薑、蒜末、辣椒爆香，放入牛肚炒至微乾，加醬油膏拌炒一下，轉小火，加入豆芽菜拌炒。", "起鍋前，加入醋、胡椒粉、蔥段拌炒，即可盛盤。"], "tip": "牛肚的烹煮時間可依個人喜歡的口感調整。煮好可放冰箱冷凍備用，也可以用滷的，想吃時拿出來炒，快速方便。", "yt": "", "ytNote": ""}, {"id": "MEAT-07", "name": "炒雞胗", "cat": "肉類", "ing": ["雞胗", "蒜片", "醬油", "薑", "辣椒", "醬油膏", "油"], "img": "MEAT-07.jpg", "ingFull": "酪梨油 15ml、雞胗 400g、蒜片 20g、辣椒 5g、薑 10g", "sea": "醬油膏 30ml、醬油 20ml、白胡椒粉 適量", "steps": ["煮一鍋滾水，加入兩匙鹽，放入雞胗燙煮約 45 分鐘。", "蒜頭、薑切片備用。", "熱鍋加入油，放入蒜片、薑片、辣椒爆香，再加入雞胗拌炒。", "加入醬油、醬油膏拌炒入味，最後加入白胡椒粉即可。", "雞胗一定要處理乾淨。口感可依喜好調整燙煮時間，也可以燉軟後再切片拌炒。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "MEAT-08", "name": "牛肉捲餅", "cat": "肉類", "ing": ["滷牛腱", "小黃瓜", "紅蘿蔔", "蒜苗", "香菜", "雞蛋", "高筋麵粉", "牛奶"], "img": "MEAT-08.jpg", "ingFull": "滷牛腱 200g、小黃瓜 20g、紅蘿蔔 40g、蒜苗 10g、香菜20g、雞蛋110g(2顆)、高筋麵粉 15g、牛奶 30ml", "sea": "", "steps": ["將滷牛腱退冰,再切成片狀。", "小黃瓜、紅蘿蔔、蒜苗切絲,香菜切末。", "雞蛋打散,加入牛奶、麵粉攪拌勻勻。", "將不沾鍋熱鍋,不用加油,利用刷子將步驟 3 的麵糊在鍋子內刷上薄薄的一層,以小火慢煎煎熟,盛起備用。5將牛腱、小黃瓜、紅蘿蔔、蒜苗、香菜鋪在蛋皮上,捲起即可享用。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "MEAT-09", "name": "甜椒豬腱", "cat": "肉類", "ing": ["滷豬腱", "青蔥", "甜椒", "洋蔥", "初榨橄欖油"], "img": "MEAT-09.jpg", "ingFull": "滷豬腱 300g、洋蔥 50g、甜椒 60g、青蔥 30g", "sea": "初榨橄欖油 5ml、鹽巴 適量、白胡椒粉 適量", "steps": ["滷好的豬腱退冰、切片。", "洋蔥、甜椒切絲，青蔥切段。", "熱鍋加油，炒香洋蔥後，加入甜椒與蔥段拌炒。", "加入豬腱片炒熱，撒上鹽巴與胡椒調味，即可上桌！"], "tip": "建議週末一次滷好豬腱肉，分裝冷凍保存，忙碌時切片快炒就能搞定晚餐。炒時油不用多，一點點就足夠。", "yt": "", "ytNote": ""}, {"id": "MEAT-10", "name": "番茄牛腱", "cat": "肉類", "ing": ["滷牛腱", "牛番茄", "洋蔥", "青蔥", "初榨橄欖油"], "img": "MEAT-10.jpg", "ingFull": "滷牛腱 400g、牛番茄 150g、洋蔥 50g、青蔥 30g、初榨橄欖油 10ml", "sea": "鹽巴 適量、味醂 10ml", "steps": ["牛番茄切大塊、洋蔥切絲、青蔥切蔥花、滷牛腱切片。", "熱鍋後加入橄欖油，放入洋蔥炒至熟透。", "加入牛番茄炒至糊狀，再放入牛腱拌炒。", "加入鹽巴、味醂調味，起鍋前撒上蔥花即可。"], "tip": "這道料理也能加入蒟蒻麵，簡單又快速完成一餐。有碳水、有蛋白質、有蔬菜，營養均衡又不失美味。", "yt": "", "ytNote": ""}, {"id": "MEAT-11", "name": "番茄雞肉丸", "cat": "肉類", "ing": ["番茄", "洋蔥", "雞肉", "嫩豆腐", "香菜"], "img": "MEAT-11.jpg", "ingFull": "雞肉餅 400g、香菜 20g、番茄 400g、初榨橄欖油 10ml、洋蔥 70g", "sea": "鹽巴 適量", "steps": ["洋蔥、番茄切碎。", "將雞肉餅捏成小團，做成雞肉丸。", "熱鍋加入油，放入洋蔥炒軟，再加入番茄炒至糊化。", "加入鹽巴調味，放入雞肉丸煮至熟透。", "起鍋前撒上香菜即可。", "也可以直接用小火慢煮番茄與洋蔥，省時又快速。"], "tip": "雞肉丸是利用雞肉餅變化而來，不添加澱粉，外型雖不規則，但能減少碳水攝取。搭配富含茄紅素的番茄，營養更升級。常備雞肉餅製作起來快速又方便，是忙碌時也能安心享受的低脂美味。", "yt": "p4Idh9_z0sY", "ytNote": ""}, {"id": "MEAT-12", "name": "蘿蔔燉牛肉", "cat": "肉類", "ing": ["水", "牛肉", "蘿蔔", "薑", "蔥", "鹽"], "img": "MEAT-12.jpg", "ingFull": "", "sea": "", "steps": [], "tip": "", "yt": "", "ytNote": ""}, {"id": "MEAT-13", "name": "豆皮雞捲", "cat": "肉類", "ing": ["雞胸肉", "洋蔥", "紅蘿蔔", "雞蛋", "青蔥段", "香菜", "薄豆皮", "玄米油"], "img": "MEAT-13.jpg", "ingFull": "雞胸肉 200g、薄豆皮 80g、雞蛋 55g（1顆）、洋蔥 50g、青蔥 30g、紅蘿蔔 20g、香菜 20g、玄米油 10ml", "sea": "鹽巴 適量、黑胡椒粉 適量", "steps": ["將雞胸肉以食物調理機絞碎備用。", "洋蔥、紅蘿蔔、青蔥切成末。", "熱鍋後加入油，加入步驟2的食材拌炒爆香，再加入蛋液、雞胸肉拌炒，最後加入鹽巴、黑胡椒調味。", "將乾的薄豆皮鋪平，放上步驟3的食材，再包覆捲起。", "熱鍋後加入油，以小火慢煎豆皮雞捲至熟即可。"], "tip": "因為用油量較少，要有耐心以小火煎熟，並且一直翻面，避免燒焦。或是蓋上鍋蓋，加速燜熟速度。", "yt": "", "ytNote": ""}, {"id": "MEAT-14", "name": "豆皮雞胸肉", "cat": "肉類", "ing": ["雞胸肉", "豆皮", "熟毛豆", "雞蛋", "青蔥", "紅蘿蔔", "葵花油"], "img": "MEAT-14.jpg", "ingFull": "雞胸肉 200g、青蔥 30g、豆皮 80g、紅蘿蔔 30g、熟毛豆 50g、葵花油 10ml、雞蛋 55g（1顆）", "sea": "鹽巴 適量、白胡椒粉 適量、鹽麴 20ml、味醂 5ml", "steps": ["雞胸肉用鹽麴抓醃，靜置約1～2小時。", "豆皮切大塊，紅蘿蔔切小塊，青蔥切成蔥花。", "將豆皮沾上加鹽調味過的蛋液。", "熱鍋加少許油，以小火慢煎豆皮至微焦，盛起備用。", "再次熱鍋，加入少許油，放入雞胸肉與紅蘿蔔拌炒至熟。", "加入毛豆、豆皮拌炒，最後以白胡椒粉、味醂調味，起鍋前撒上蔥花。"], "tip": "為了控制油量，記得用小火慢煎，用時間換出金黃酥香的口感。", "yt": "", "ytNote": ""}, {"id": "MEAT-15", "name": "雞肉豆腐煲", "cat": "肉類", "ing": ["雞肉餅", "嫩豆腐", "洋蔥", "紅蘿蔔", "青蔥", "蒜頭", "辣椒", "蒜苗", "玄米油"], "img": "MEAT-15.jpg", "ingFull": "雞肉餅 200g、嫩豆腐 400g、蒜頭 15g、洋蔥 50g、紅蘿蔔 20g、蒜苗 20g、青蔥 20g、辣椒 3g、玄米油 10ml、鹽巴 適量", "sea": "", "steps": ["將雞胸＋雞腿肉打成泥，與蒜頭、洋蔥、紅蘿蔔、蒜苗、蔥花拌勻，捏成雞肉餅。", "煎鍋加油，將雞肉餅煎至雙面金黃。", "加入嫩豆腐一同燉煮（可再加少許水），悶煮至入味即可。"], "tip": "雞肉餅可多做一點冷凍備用；嫩豆腐料理時輕推勿攪拌，保持口感完整。", "yt": "", "ytNote": ""}, {"id": "MEAT-16", "name": "雞肉餅", "cat": "肉類", "ing": ["雞胸肉", "蝦仁", "三星蔥", "蒜苗", "紅蘿蔔", "蒜頭", "洋蔥", "高麗菜", "薑", "雞蛋"], "img": "MEAT-16.jpg", "ingFull": "", "sea": "鹽 10克、胡椒 2克", "steps": ["雞胸肉去皮、蝦仁去砂，用攪拌棒絞碎。", "加入鹽、蒜、紅蘿蔔、洋蔥、蒜苗、蔥、高麗菜、胡椒、全蛋、香油，揉成圓餅狀（可自行捏成喜歡的形狀）。"], "tip": "蝦仁切小塊比較有口感。每片約110g，總熱量95kcal、蛋白質17g、脂肪1.3g、碳水化合物3g。", "yt": "", "ytNote": ""}, {"id": "MEAT-17", "name": "雞胸肉蛋捲", "cat": "肉類", "ing": ["雞胸肉", "紅蘿蔔", "雞蛋", "香菜", "牛奶", "鹽巴"], "img": "MEAT-17.jpg", "ingFull": "雞胸肉(去皮) 200g、紅蘿蔔 20g、雞蛋 55g(1顆)、香菜 20g、牛奶 10ml；【蛋皮】雞蛋 110g(2顆)、玉米粉 5g、牛奶 10ml、初榨橄欖油 10ml", "sea": "鹽巴 適量", "steps": ["製作蛋皮：玉米粉與牛奶拌勻後加入蛋液，小火煎成薄蛋皮備用。", "雞胸肉、紅蘿蔔、香菜與蛋、牛奶、鹽拌勻。", "熱鍋加油，炒至半熟盛起。", "將蛋皮鋪平，包入雞肉餡後捲起。", "乾煎至蛋皮微焦、內餡熟透即可上桌！"], "tip": "蛋皮要加一點點澱粉才不易破，但不要太多；內餡炒到半熟再包，口感才會剛剛好。", "yt": "", "ytNote": ""}, {"id": "MEAT-18", "name": "香滷牛腱", "cat": "肉類", "ing": ["牛腱", "洋蔥", "薑", "辣椒", "玄米油"], "img": "MEAT-18.jpg", "ingFull": "牛腱 600g、辣椒 3g、洋蔥 50g、玄米油 10ml、薑 10g", "sea": "豆瓣醬 10ml、醬油 60ml", "steps": ["牛腱以熱水汆燙後，洗淨備用。", "洋蔥切絲、薑切片、辣椒切末。", "熱鍋後加入油，放入薑片、辣椒、洋蔥、豆瓣醬爆香，再加入醬油、牛腱炒至有醬香味，加水以大火煮滾後轉小火，滷至熟透約1小時。"], "tip": "", "yt": "80aFjfoLgiY", "ytNote": ""}, {"id": "MEAT-19", "name": "香煎雞腿", "cat": "肉類", "ing": ["雞腿", "鹽巴", "黑胡椒"], "img": "MEAT-19.jpg", "ingFull": "", "sea": "鹽巴 適量、黑胡椒粉 適量", "steps": ["在雞腿表面劃上直刀、橫刀，方便受熱均勻。", "熱鍋不用加油，將雞腿皮面朝下放入鍋中，加蓋以中火慢煎至雞皮微焦，再翻面。", "煎至熟透後，撒上鹽巴、黑胡椒粉即可。"], "tip": "蓋上鍋蓋可以加快熟成速度，雞腿肉也會更軟嫩。", "yt": "", "ytNote": ""}, {"id": "MEAT-20", "name": "香滷豬腱肉", "cat": "肉類", "ing": ["滷豬腱", "薑", "洋蔥", "辣椒", "青蔥", "蒜頭", "初榨橄欖油"], "img": "MEAT-20.jpg", "ingFull": "豬腱肉 400g、薑 15g、洋蔥 80g、辣椒 5g、青蔥 30g、蒜頭 10g、初榨橄欖油 10ml", "sea": "醬油 40ml、醬油膏 15ml、豆瓣醬 5ml、米酒 150ml", "steps": ["豬腱肉以熱水汆燙後,撈起備用。", "洋蔥切塊,青蔥、辣椒切末、薑切片。", "熱鍋後加入油,加入蔥末、薑片、蒜末、洋蔥爆香,再加入辣椒、醬油、醬油膏、豆瓣醬炒香。", "加入整塊豬腱肉拌炒一下,讓醬香入味後,加入米酒與適量的水,蓋上鍋蓋,以中火滷燉約 40 分鐘即完成。", "食用前,再切片盛盤。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-01", "name": "乾煎紅喉", "cat": "海鮮魚類", "ing": ["紅喉", "葡萄籽油"], "img": "SEA-01.jpg", "ingFull": "紅喉 300g、葡萄籽油 15ml", "sea": "鹽巴 適量", "steps": ["將紅喉洗淨後,以紙巾擦乾,在兩面的魚背上斜劃一刀,抹上少許鹽巴,靜置 30 分鐘。", "熱鍋後加入油,將紅喉煎至雙面呈現微微的金黃色澤。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-02", "name": "乾煎肉鯽魚", "cat": "海鮮魚類", "ing": ["刺鯧", "玄米油", "鹽巴"], "img": "SEA-02.jpg", "ingFull": "刺鯧（肉鯽魚）300g、玄米油 5ml", "sea": "鹽巴適量（約魚重的1%～2%）", "steps": ["肉鯽魚洗淨後用紙巾吸乾水分，魚身輕劃兩刀，雙面抹鹽靜置15分鐘。", "熱鍋後將油倒在紙巾上擦拭鍋底（省油更健康）。", "放魚以中小火煎至一面焦黃再翻面，轉小火蓋鍋悶煎至雙面熟透。"], "tip": "魚身水分擦乾是不破皮的關鍵；等魚肉定型再翻面，外皮才會酥脆。", "yt": "", "ytNote": ""}, {"id": "SEA-03", "name": "乾煎鱈魚", "cat": "海鮮魚類", "ing": ["鱈魚", "蒜頭", "青蔥", "香菜", "辣椒", "葵花油"], "img": "SEA-03.jpg", "ingFull": "鱈魚 300g、蒜頭 20g、青蔥 20g、香菜 20g、辣椒 5g(個人喜好添加)、葵花油 10ml", "sea": "鹽巴 適量", "steps": ["將鱈魚切成大約 6×10 公分的大小,蒜頭、青蔥、香菜、辣椒切成末。", "熱鍋後加入油,將鱈魚煎至雙面微焦,撒上鹽巴調味,即可盛盤。", "將蒜頭、青蔥、香菜、辣椒鋪在鱈魚上。。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-04", "name": "毛豆蝦仁炒蛋", "cat": "海鮮魚類", "ing": ["毛豆", "蝦仁", "雞蛋", "香菜", "蔥", "蒜頭", "洋蔥"], "img": "SEA-04.jpg", "ingFull": "毛豆 200g、蝦仁 300g、洋蔥 70g、香菜 40g、青蔥 40g、雞蛋 4顆、蒜頭 5g（六人份）", "sea": "醬油膏 4g、鹽巴 1g", "steps": ["毛豆加鹽汆燙30～40分鐘撈起（可依喜好切碎）。", "蝦仁去殼去腸泥；洋蔥、蒜頭、香菜切末，青蔥切蔥花。", "雞蛋打勻，加醬油膏與鹽巴拌勻。", "熱鍋加少許油，蝦仁炒至五分熟盛起。", "同鍋加油，洋蔥炒軟，加蒜末、蔥花、香菜炒香。", "加毛豆與蝦仁拌勻，倒入蛋液，中火炒至蛋熟起鍋。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-05", "name": "泰式干貝", "cat": "海鮮魚類", "ing": ["干貝", "芥花油", "香菜", "辣椒", "檸檬", "魚露", "砂糖"], "img": "SEA-05.jpg", "ingFull": "干貝 300g、芥花油 15ml、📘 泰式醬汁、蒜頭 15g（切末）、香菜 40g（切末）、辣椒 5g（切末）、檸檬汁 30ml、魚露 3ml、砂糖 10g", "sea": "鹽巴、黑胡椒 適量", "steps": ["製作泰式醬汁：將蒜末、香菜末、辣椒末混合檸檬汁、魚露、砂糖拌勻備用。", "干貝退冰、擦乾水分，表面灑上鹽與黑胡椒。", "熱鍋下油，用中火將干貝煎至微金黃色，再翻面煎至約八分熟。", "起鍋盛盤，淋上泰式醬汁即可享用。"], "tip": "干貝用乾煎的方式保留鮮甜滋味，記得只煎七八分熟，最能品嚐到嫩度！如果趕時間，也可以簡單汆燙後淋上醬汁就很好吃～", "yt": "", "ytNote": ""}, {"id": "SEA-06", "name": "涼拌章魚", "cat": "海鮮魚類", "ing": ["章魚", "小黃瓜", "蒜頭", "薑", "辣椒"], "img": "SEA-06.jpg", "ingFull": "章魚 400g、小黃瓜 100g、薑 20g、辣椒 10g、蒜頭 20g", "sea": "萬用醋 40ml、香油 10ml", "steps": ["煮一鍋熱水加少許鹽，放入整隻章魚汆燙至熟撈起。", "小黃瓜切片，蒜頭切末，辣椒與薑切絲。", "章魚與所有食材混合，加萬用醋、香油拌勻即可。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-07", "name": "清炒蝦仁", "cat": "海鮮魚類", "ing": ["蝦仁", "青蔥", "鹽"], "img": "SEA-07.jpg", "ingFull": "蝦仁 400g、青蔥 30g、初榨橄欖油 10ml", "sea": "鹽巴適量", "steps": ["蝦子開背、去殼、去腸泥；青蔥切蔥末備用。", "熱鍋加橄欖油，先放青蔥末煸香，再加蝦仁大火炒熟，撒鹽即可。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "SEA-08", "name": "清蒸鱸魚", "cat": "海鮮魚類", "ing": ["海鱸魚", "辣椒", "青蔥", "薑", "葵花油", "鹽", "米酒", "醬油膏", "白胡椒"], "img": "SEA-08.jpg", "ingFull": "海鱸魚 300g、辣椒 10g、青蔥 20g、薑 20g、葵花油 10ml", "sea": "鹽巴 適量、米酒 適量、醬油膏 30ml、白胡椒粉 適量", "steps": ["青蔥、辣椒、薑切成絲，泡在冰水中備用。", "鱸魚片用薑片、鹽巴、白胡椒粉、米酒、醬油膏、葵花油快速醃漬5分鐘。", "將鱸魚放入蒸鍋中，蒸約7分鐘。", "鱸魚蒸熟後，放上步驟1的材料即可。"], "tip": "醃鱸魚時，可以稍微在魚表面劃刀，幫助入味。", "yt": "", "ytNote": ""}, {"id": "SEA-09", "name": "蒜蓉鮮蚵", "cat": "海鮮魚類", "ing": ["蚵仔", "蒜頭", "香菜", "油膏", "香油", "黑醋"], "img": "SEA-09.jpg", "ingFull": "鮮蚵 400g、蒜頭 20g、香菜 40g", "sea": "醬油膏 15ml、黑醋 15ml、香油 10ml", "steps": ["將蒜頭、香菜切末，加入醬油膏、香油、黑醋攪拌均勻。", "煮一鍋水，水滾後放入洗淨的蚵仔，然後關火，燜3分鐘左右即可撈起。", "將蚵仔盛盤，淋上步驟1的醬汁即可。"], "tip": "蚵仔的熟度決定這道料理的美味度，用燜的方式可以避免過熟。", "yt": "", "ytNote": ""}, {"id": "SEA-10", "name": "薑絲炒花枝", "cat": "海鮮魚類", "ing": ["花枝", "薑", "辣椒", "蒜頭", "青蔥", "鹽巴", "米酒", "葵花油"], "img": "SEA-10.jpg", "ingFull": "花枝 300g、蒜頭 20g、青蔥 30g、辣椒 20g、薑 80g", "sea": "鹽巴 3ml、米酒 10ml、葵花油 10ml", "steps": ["花枝切大塊；辣椒、薑切絲；青蔥切段；蒜頭切片備用。", "熱鍋加油，先放薑絲、蒜片、辣椒爆香，再加花枝快速拌炒。", "加米酒、鹽巴調味，最後放蔥段拌炒即可起鍋。"], "tip": "花枝下鍋前用熱水快速汆燙3～5秒，更容易熟透、避免過熟變硬。", "yt": "tQVtsXSOy0k", "ytNote": ""}, {"id": "SEA-11", "name": "醋燒旗魚", "cat": "海鮮魚類", "ing": ["旗魚", "雞蛋", "醬油", "黑醋", "薑", "鹽", "胡椒", "蒜苗", "洋蔥"], "img": "SEA-11.jpg", "ingFull": "旗魚 300g、全蛋 60g、蒜苗 75g、洋蔥 60g、薑 10g（四人份）", "sea": "洋蔥醬油 5ml、黑醋 5ml、胡椒少許、鹽少許", "steps": ["旗魚切薄片，以蛋白、胡椒、鹽醃15分鐘。", "熱鍋加5ml油，將旗魚煎至半熟。", "加洋蔥、黑醋、洋蔥醬油、醬油膏拌炒調味。", "起鍋前加蒜苗快速拌炒即可。"], "tip": "旗魚切薄一點更容易熟，口感更滑嫩。", "yt": "", "ytNote": ""}, {"id": "SEA-12", "name": "韭黃炒文蛤肉", "cat": "海鮮魚類", "ing": ["文蛤肉", "韭黃", "紅蘿蔔", "薑", "辣椒", "青蔥", "葡萄籽油"], "img": "SEA-12.jpg", "ingFull": "文蛤肉 400g、辣椒 10g(依個人喜好添加)、韭黃 200g、青蔥 20g、紅蘿蔔 20g、葡萄籽油 15ml、薑 20g", "sea": "鹽巴 適量、醬油膏 10ml", "steps": ["韭黃切小段,紅蘿蔔、薑、辣椒、青蔥切絲。", "文蛤快速汆燙,燙至半熟撈起,取出肉備用。", "熱鍋後加入油,加入韭黃、紅蘿蔔、薑絲、青蔥拌炒熟後,加入鹽巴調味,盛盤備用。", "熱鍋後加入油,放入文蛤肉炒熟,加入 ml、水 150ml", "sea": "醬油 50ml、味醂 75ml", "steps": ["在冷水中放入常溫蛋,煮至水滾後(約 5 分鐘)關火,蓋上鍋蓋燜 10 分鐘左右。撈起放涼後再剝殼。", "洋蔥、辣椒切末。", "熱鍋加入油,放入辣椒、洋蔥爆香,加入醬油、味醂炒香,放入雞蛋,拌炒醬香入味。", "接著加入 150ml 的水,燉煮 30 分鐘,關火,再浸泡 30分鐘使其入味。", "炒醬香時要用小火慢炒,避免炒過頭產生苦味。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "EGG-03", "name": "滷豆干", "cat": "豆蛋", "ing": ["豆干", "洋蔥", "辣椒", "蒜頭", "蒜苗", "香菜", "玄米油", "醬油", "醬油膏"], "img": "EGG-03.jpg", "ingFull": "豆干 300g、洋蔥 30g、辣椒 3g、蒜頭 20g、蒜苗 30g、香菜 20g", "sea": "玄米油 10ml、醬油膏 10ml、醬油 20ml", "steps": ["煮一鍋滾水，放入豆干稍微燙一下，放涼後切成塊狀。", "將辣椒、蒜頭、香菜切末；蒜苗切小段；洋蔥切絲。", "熱鍋後加入油，放辣椒、蒜頭爆香，加洋蔥拌炒至熟透，再放豆干煸炒至微焦，加醬油膏、醬油，蓋上鍋蓋以小火滷至收乾，起鍋前加蒜苗、香菜即可。"], "tip": "滷豆干時鍋蓋要蓋上，讓豆干膨脹起來吸附醬汁；買回來先以滾水燙過再冷藏，約可保存三～四天。", "yt": "", "ytNote": ""}, {"id": "EGG-04", "name": "炒豆皮", "cat": "豆蛋", "ing": ["豆皮", "蒜苗", "香菜", "蒜頭", "辣椒"], "img": "EGG-04.jpg", "ingFull": "豆皮 250g、蒜苗 30g、香菜 30g、蒜頭 5g、辣椒 2g、玄米油 10ml", "sea": "鹽巴 適量、醬油膏 10ml（也可以替換成醬油）", "steps": ["1將豆皮切絲，辣椒、蒜頭、香菜切末，蒜苗切小段。", "2熱鍋後加入油，放入辣椒、蒜頭爆香，加入豆皮，以小火耐心煸炒至微焦。", "3起鍋前加入鹽巴、醬油膏、蒜苗、香菜"], "tip": "在炒豆皮時，油量多會比較好炒，但由於要控制油量，ㄧ定要有耐心以小火慢炒的方式，才能好吃不會過油，豆皮料理多樣化，可以試著改變形狀來變化，除了切細絲，也可以切成塊狀；除了乾炒外，想要品嘗濕潤一點的口感，可以加入少許水分拌炒，甚至可以紅燒或是燉滷，自行變化。　購買時，選擇第一層豆漿凝結的豆皮，品質會最好、最嫩", "yt": "", "ytNote": ""}, {"id": "EGG-05", "name": "珠蔥煎蛋", "cat": "豆蛋", "ing": ["珠蔥", "雞蛋", "紅蘿蔔", "洋蔥"], "img": "EGG-05.jpg", "ingFull": "珠蔥 100g(取蔥白)、雞蛋 4顆 250g、紅蘿蔔 10g、洋蔥 50g", "sea": "鹽 2g、水 20cc、醬油膏 10cc", "steps": ["珠蔥、洋蔥、紅蘿蔔切碎。", "蛋去殼加入醬油膏、鹽、水，將蛋打勻。", "熱鍋後加入5cc油，將洋蔥、紅蘿蔔炒透再加入珠蔥炒香。", "將炒過的食材加入打好的蛋液拌勻。", "再加5cc油，煎至金黃色即可。"], "tip": "煎的同時稍微拌炒避免焦掉，也比較快熟。", "yt": "", "ytNote": ""}, {"id": "EGG-06", "name": "番茄炒蛋", "cat": "豆蛋", "ing": ["牛番茄", "雞蛋", "青蔥", "葵花油"], "img": "EGG-06.jpg", "ingFull": "牛番茄 300g、雞蛋 220g(4 顆)、青蔥 40g、葵花油 15ml", "sea": "鹽巴 適量、味醂 10ml", "steps": ["牛番茄切塊,雞蛋打勻,青蔥切段。", "在熱鍋中加油,倒入蛋液,將蛋炒至半熟盛起。", "鍋中放入番茄炒至糊狀,加入少許水,煮至番茄稍微熟軟,加入炒蛋拌勻。", "起鍋前,加入鹽巴、味醂調味,撒上青蔥即完成。"], "tip": "", "yt": "", "ytNote": ""}, {"id": "EGG-07", "name": "紅燒臭豆腐", "cat": "豆蛋", "ing": ["臭豆腐", "紅蘿蔔", "木耳", "洋蔥", "熟毛豆", "香菜", "蒜頭", "辣椒", "高湯", "葵花油"], "i   h+=`<h4>食材</h4><div class="tags">${ingHtml}</div>`;
  if(r.sea) h+=`<h4>調味料</h4><div class="tags">${tagize(r.sea)}</div>`;
  if(r.steps&&r.steps.length) h+=`<h4>作法</h4><ol class="steps">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
  else h+=`<div class="pending">📝 完整步驟陸續整理中，敬請期待</div>`;
  h+=buyBtns((r.ingFull||'')+','+(r.sea||'')+','+r.ing.join(','),r.name);
  if(r.tip) h+=`<div class="tip">💡 ${r.tip}</div>`;
  h+=`<div class="follow"><p>❤️ 喜歡這道料理？追蹤送你營養吃看更多食譜！</p><div class="socials">${SOCIAL_MODAL}</div></div></div>`;
  document.getElementById('modal').innerHTML=h;
  document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal()};
q.oninput=render;render();
</script>
</body>
</html>
