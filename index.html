: ["蝦仁處理乾淨，加一點太白粉比較好成型。", "加入薑（去腥）、魚露、蔥花、蛋白（不加蛋黃）、少許鹽巴，攪拌摔打到有黏性。", "水果玉米煮熟後剝下玉米粒，拌入蝦泥。", "表面沾裹麵包粉，增加顆粒口感。", "用模具塑形（可先冷凍定型較好脫模），下鍋乾煎至兩面金黃。", "起鍋前撒點白胡椒更香。"], "tip": "假日可先做好冷凍備用，早上煎一下就能吃；裹麵包粉能增加酥脆口感。", "long": "https://youtu.be/RIAViIl_J-8", "wide": false, "desc": "蝦仁高蛋白又低脂，冷凍備餐早上煎一下就上桌", "chapters": [], "views": 6600, "zones": ["高蛋白"]}, {"name": "洋蔥炒三菇", "img": "VID-03.jpg", "yt": "9fBsNrBKSF4", "cat": "蔬菜", "ing": "香菇、洋菇、杏鮑菇、洋蔥、鹽巴、黑胡椒、油", "steps": ["三種菇（香菇、洋菇、杏鮑菇）切好備用。", "熱鍋後慢一點加油（約一湯匙），先爆香洋蔥。", "放入菇類拌炒，把菇的水味炒掉、湯汁炒乾一點（乾燒）。", "加鹽巴、黑胡椒調味即可起鍋。"], "tip": "菇不怕冷凍，可一次炒多一點分裝冷凍，要吃時加熱即可；菇類也算蔬菜，補充膳食纖維。", "long": "https://youtu.be/RIAViIl_J-8", "wide": false, "desc": "三種菇一次滿足，膳食纖維豐富又耐冷凍", "chapters": [], "views": 2000, "zones": ["新手"]}, {"name": "鮪魚豆腐毛豆", "img": "VID-04.jpg", "yt": "w76wyNKPJiI", "cat": "豆蛋", "ing": "板豆腐（較乾、無染色）、毛豆、鮪魚、鹽巴、白胡椒、紅辣椒、洋蔥醬", "steps": ["板豆腐切塊，加一點點鹽巴提味，下鍋炒一下讓它入味。", "加入毛豆一起拌炒。", "加入鮪魚（本身帶鹹味）拌炒，把湯汁炒乾、增加香氣（炒過更香，不用再加調味料）。", "加白胡椒與一點紅辣椒拌勻。", "最後拌入洋蔥醬（靈魂）即完成。"], "tip": "豆腐、毛豆、鮪魚都是優質蛋白質，可冷凍備用；配饅頭時份量控制約 60g（等於半碗飯）。", "long": "https://youtu.be/RIAViIl_J-8", "wide": false, "desc": "三種優質蛋白一鍋炒香，備餐族的省時好菜", "chapters": [], "views": 19000, "zones": ["新手", "高蛋白"]}, {"name": "古早味豆花", "img": "VID-05.jpg", "yt": "yU1OzKmCLMY", "cat": "百卡點心", "ing": "黃豆 半斤(300g)、水 3000cc、豆花粉 約54g、冷開水 約200cc、二砂糖 約300g、黑糖 少許、熟紅豆", "steps": ["黃豆前一天泡水泡軟，半斤黃豆配約3000cc水打成漿，用布袋擠出豆漿。", "豆漿以爐火煮滾，過程要顧火並適時攪拌，以免燒焦噗鍋。", "豆花粉約54克用冷開水調勻，放在大容器底部。", "將剛煮滾的豆漿從高處一口氣沖入豆花粉水中，靜置不要移動，等待凝固。", "另起鍋以慢火將二砂糖加水煮至溶解成糖水，可加少許黑糖增添風味。", "豆花凝固後舀入碗中，淋上糖水、加上蜜紅豆即完成。"], "tip": "調豆花粉一定要用冷開水；沖漿後表面泡泡先撈掉，成品才平整。豆花每100克約37大卡、蛋白質約3.2克，熱量關鍵在糖水與配料，控制體重可改用羅漢果糖，配料選愛玉、仙草、白木耳等低熱量選項。", "long": "https://youtu.be/4Dp8XTH2QQA", "wide": false, "desc": "安媽手作的濃醇豆香，甜度自己掌握更安心", "chapters": [], "views": 361, "zones": []}, {"name": "古早味蚵嗲", "img": "VID-06.jpg", "yt": "PbGQExysDjo", "cat": "海鮮魚類", "ing": "在來米 半斤(300g)、黃豆 半斤(300g)、水 約4杯(每杯240cc)、麵粉 約8湯匙、蚵仔、高麗菜、韭菜、薑", "steps": ["在來米與黃豆各半斤先泡水4小時，加約4杯水用果汁機打成米漿。", "米漿中一湯匙一湯匙加入麵粉（共約8湯匙），拌勻成濃稠麵糊。", "高麗菜切細絲、韭菜切段，蚵仔拌入薑末去腥；餡料不加鹽巴、保持乾燥。", "蚵嗲杓先浸入熱油中燙熱，舀一層麵糊鋪底，依序放上高麗菜、韭菜與蚵仔，再蓋一層麵糊拍平。", "放入油鍋以中油溫炸至定型，蚵嗲脫杓後翻面炸至兩面金黃酥脆。", "起鍋瀝油，趁熱食用。"], "tip": "高麗菜要切得很細才會脆；餡料千萬不能加鹽，出水就不酥。蚵仔加薑是安媽去腥的祕方。油溫不要太高，第一顆失敗屬正常，調降油溫再炸即可。", "long": "https://youtu.be/QRglIXlC5Dc", "wide": false, "desc": "外皮酥脆餡料飽滿，市場排隊味在家重現", "chapters": [], "views": 551, "zones": ["澎湃"]}, {"name": "古早味油飯", "img": "VID-07.jpg", "yt": "rCAqbqJb4Bc", "cat": "全穀雜糧", "ing": "糯米、蒟蒻米、香菇、紅蔥頭、魷魚、豬肉、蝦米、油 適量、醬油膏 適量", "steps": ["糯米先浸泡約三小時，與蒟蒻米一起入蒸籠蒸熟備用。", "香菇、紅蔥頭、魷魚切好，豬肉切片備用。", "起鍋倒油，先下紅蔥頭爆香，再放香菇炒出香氣。", "加入豬肉與魷魚拌炒至香味釋出。", "將蒸熟的米飯倒入鍋中，與配料拌炒均勻。", "加入醬油膏調味炒至上色即完成，不需再加鹽。"], "tip": "傳統油飯一碗近500大卡，用糯米搭配蒟蒻米可大幅降低熱量。糯米屬支鏈澱粉較易脹氣，腸胃不適者可改用白米。吃油飯記得控制份量，搭配蛋白質與蔬菜才均衡。", "long": "https://youtu.be/EPySjLhLTA8", "wide": false, "desc": "蒟蒻米混糯米，熱量大減仍有古早香", "chapters": [], "views": 415, "zones": ["澎湃"]}, {"name": "古早味糖葫蘆", "img": "VID-08.jpg", "yt": "q3RUknbFFbg", "cat": "百卡點心", "ing": "白砂糖 350g、水 220cc、麥芽糖 適量、檸檬汁 少許、蘋果、楊桃、芭樂、竹籤 數支", "steps": ["水果切好，每支竹籤串約3顆備用。", "鍋中放入白砂糖350克、水220cc與麥芽糖，開火熬煮。", "熬煮過程不要攪拌，只稍微撥動，以免反砂結顆粒。", "煮至糖漿滴入冷水會凝固牽絲即可關火。", "將水果串放入糖漿沾裹一半即可，不要沾太多。", "取出放涼，糖衣凝固變硬即完成。"], "tip": "判斷糖漿：滴一點到冷水裡能凝固牽絲就是好了。熬糖千萬不要攪拌，會反砂；麥芽糖放太多會黏牙。糖衣屬精緻糖，一天建議不超過兩支。", "long": "https://youtu.be/x7IUXvWbSAQ", "wide": false, "desc": "亮晶晶的糖衣脆殼，咬一口回到廟口童年", "chapters": [], "views": 1400, "zones": []}, {"name": "紅龜粿", "img": "VID-09.jpg", "yt": "JuoEk0jTEYE", "cat": "全穀雜糧", "ing": "糯米粿糰(粿粞)、甜菜根汁、大頭菜乾、豬肉、蝦米、紅蔥頭、油 適量、胡椒 少許、粽葉或香蕉葉 數片", "steps": ["粿粞做法：糯米泡水後磨成米漿，裝入粿袋以重物壓一天一夜脫水成「粿粞」；取一小塊先下滾水煮到浮起（俗稱粿婆），再揉回粿粞中拌勻，粿糰才有黏性不鬆散。", "甜菜根打成汁，揉入糯米粿糰染色，依汁量調出深淺不同的粉紅色。", "製作鹹餡：大頭菜切絲抓鹽擠出水分，日曬約兩天至脆，切碎備用。", "起油鍋炒軟豬肉，加入蝦米與紅蔥頭爆香，下大頭菜乾拌炒、加胡椒調味，炒到收乾。", "取染色粿糰壓平，包入餡料收口捏合。", "放入龜形粿印壓出花紋後脫模。", "底部墊粽葉或香蕉葉，入蒸籠蒸熟即完成。"], "tip": "天然染料用甜菜根汁取代人工色素，剩的甜菜根還能打果汁。餡料用自曬大頭菜乾取代一般菜脯米，更脆更香。", "long": "https://youtu.be/ZUMFtucbsRw", "wide": false, "desc": "甜菜根染的天然紅，年節粿香不靠色素", "chapters": [], "views": 1600, "zones": ["澎湃"]}, {"name": "草仔粿", "img": "VID-10.jpg", "yt": "r3eU24U4zZ4", "cat": "全穀雜糧", "ing": "糯米粿糰(粿粞)、鼠麴草、大頭菜乾、豬肉、蝦米、紅蔥頭、油 適量、胡椒 少許、粽葉或香蕉葉 數片", "steps": ["粿粞做法：糯米泡水後磨成米漿，裝入粿袋以重物壓一天一夜脫水成「粿粞」；取一小塊先下滾水煮到浮起（俗稱粿婆），再揉回粿粞中拌勻，粿糰才有黏性不鬆散。", "鼠麴草先煮過剁碎，揉入糯米粿糰中；煮過顏色偏黑，蒸起來粿皮會呈青色。", "製作鹹餡：大頭菜切絲抓鹽擠水，日曬約兩天至脆，切碎備用。", "起油鍋炒軟豬肉，加蝦米與紅蔥頭爆香，下大頭菜乾拌炒、加胡椒調味，炒到收乾。", "取青色粿糰壓平包入餡料，收口確實捏合。", "底部墊粽葉（在家可用香蕉葉），入蒸籠蒸熟即可。"], "tip": "草仔粿的青色來自鼠麴草，跟艾草是不同的草，用鼠麴草才道地。天氣好大頭菜乾曬兩天就脆、氣味又香。", "long": "https://youtu.be/ZUMFtucbsRw", "wide": false, "desc": "鼠麴草的青草香，才是道地的古早滋味", "chapters": [], "views": 266, "zones": ["澎湃"]}, {"name": "粉圓冰", "img": "VID-11.jpg", "yt": "0pWxXAtkFko", "cat": "百卡點心", "ing": "地瓜粉 300g、水 適量(粉水約2:1)、煮熟綠豆、糖 適量、冰", "steps": ["地瓜粉與水以約2:1混合（比例依當天溫濕度微調）。", "用手朝同一方向輕柔搓動並過篩，讓粉在篩中滾成圓粒。", "已成型的小粉圓先篩出，其餘繼續搓，重複至全部成型。", "煮一鍋水，水滾後放入粉圓。", "煮到粉圓浮起、呈透明即熟，小顆會先浮起。", "撈起粉圓，加入煮好的綠豆、糖水與冰即完成。"], "tip": "篩子要選金屬、孔徑剛好：孔太小變西米露、太大易裂。搓的力道要輕柔，太用力粉圓會壞。糖先炒過再煮才是古早味。傳統原味只用地瓜粉加水，煮熟呈透明。", "long": "https://youtu.be/j0hg9RgAvoA", "wide": false, "desc": "手搓粉圓Q彈透亮，一碗冰涼的兒時記憶", "chapters": [], "views": 968, "zones": []}, {"name": "古早味綠豆湯", "img": "VID-12.jpg", "yt": "3EN4kyuh9qs", "cat": "百卡點心", "ing": "綠豆、水 適量(稍微淹過綠豆)", "steps": ["綠豆洗淨後泡水2至3小時。", "泡好瀝乾，用乾鍋乾炒把水分炒乾，讓豆皮和豆仁不分離。", "放入電鍋，加水稍微淹過綠豆（像煮飯的水量），煮到開關跳起。", "若還不夠熟，添水再煮一次。", "煮好放涼，綠豆一顆一顆、綿密而不破即完成。"], "tip": "先乾炒把水分炒乾，是綠豆「綿而不破、皮仁不分離」的關鍵。水量像煮飯一樣稍微淹過就好。放涼後可搭配粉圓和糖水做成粉圓綠豆冰。", "long": "https://youtu.be/j0hg9RgAvoA", "wide": false, "desc": "先炒再煮的祕訣，綿而不破湯色清甜", "chapters": [], "views": 390, "zones": ["新手", "懶人"]}, {"name": "粉粿", "img": "VID-13.jpg", "yt": "TqJRmlao2d8", "cat": "百卡點心", "ing": "南瓜 100g(蒸熟打泥)、水 500cc、地瓜粉 130g、冷水 200cc、黑糖 25g、砂糖 適量", "steps": ["南瓜100克蒸熟打成泥，加500cc水入鍋大火煮滾。", "地瓜粉130克加200cc冷水攪拌均勻成粉水。", "鍋中南瓜水大滾後轉中火，粉水慢慢倒入同時快速攪拌。", "轉小火持續快速攪拌，煮至凝結成透亮Q彈的粉粿。", "起鍋倒入容器放涼定型，切塊備用。", "糖漿：黑糖25克與砂糖小火炒香，加少量水煮成糖漿，食用時淋上。"], "tip": "七彩粉粿的顏色全來自天然食材：南瓜(黃)、紫薯(紫)、綠茶(綠)、黑芝麻(黑)、紅蘿蔔汁(橘)、甜菜根(紅)，做法相同。粉水一定要用冷水調開，倒入滾水後要快速攪拌才不結塊。糖先炒過才香。", "long": "https://youtu.be/QdZ0amKYX_s", "wide": false, "desc": "南瓜染出琥珀黃，天然食材做的七彩粉粿", "chapters": [], "views": 420, "zones": []}, {"name": "愛玉", "img": "VID-14.jpg", "yt": "qRd9CWsktUM", "cat": "百卡點心", "ing": "愛玉籽 1g、礦泉水 50至80cc(依此比例放大份量)", "steps": ["依比例準備礦泉水：每1克愛玉籽配50至80cc水；水太多會太稀、太少會太硬。", "確認容器與雙手皆無油脂，油脂會影響凝固。", "愛玉籽裝入棉布袋，浸入礦泉水中反覆搓揉。", "搓至水明顯變濃稠、果膠不斷滲出即可。", "靜置待其自然凝固。", "凝固後切塊，加冰塊與糖水即可食用。"], "tip": "凝固關鍵在水質：一定要用含礦物質的礦泉水，不能用一般的水。全程器具與雙手不能沾油。愛玉本身熱量極低，是吃冰最安全的配料之一。", "long": "https://youtu.be/QdZ0amKYX_s", "wide": false, "desc": "熱量極低的天然凍品，夏天吃冰的安心選擇", "chapters": [], "views": 10000, "zones": ["懶人"]}, {"name": "鳳梨冰", "img": "VID-15.jpg", "yt": "fNHiiGcfDwU", "cat": "百卡點心", "ing": "鳳梨 1顆、糖 適量", "steps": ["挑外皮較紅的鳳梨，削皮後把黑色果目削乾淨，以免咬舌。", "將鳳梨切成小塊。", "加糖醃漬拌勻，糖量憑手感斟酌，糖足夠味道才甘甜。", "將糖漬鳳梨放在剉冰上一起吃，就是古早味鳳梨冰。"], "tip": "果皮較紅的鳳梨較熟較甜；四到六月的鳳梨最甜。黑色果目一定要削乾淨。偏甜的點心，一次別吃太多。", "long": "https://youtu.be/6iyL3QHEglQ", "wide": false, "desc": "當季鳳梨加糖醃漬，酸甜滋味最消暑", "chapters": [], "views": 12000, "zones": ["新手", "懶人"]}, {"name": "乾煎蚵仔麵線", "img": "VID-16.jpg", "yt": "mw6LCYR5rGA", "cat": "海鮮魚類", "ing": "麵線、蚵仔、豆芽菜、青蔥、薑、醬油 適量、醬油膏 適量、魚露、油蔥酥 適量", "steps": ["蔥、薑下鍋稍微爆香。", "加入蚵仔，再放入麵線，把麵線壓扁乾煎。", "加入醬油、醬油膏與魚露調味。", "放入豆芽菜拌炒。", "再補一些新鮮蚵仔，味道不足可再加點醬油膏。", "最後加入油蔥酥即完成。"], "tip": "麵線下鍋後要壓扁乾煎，煎出焦香才好吃。", "long": "", "wide": false, "desc": "麵線壓扁煎出焦香，鹹香夠味的老派吃法", "chapters": [], "views": 902, "zones": []}, {"name": "杏鮑菇蚵仔麵線", "img": "VID-17.jpg", "yt": "7oX3ItJV-9Q", "cat": "海鮮魚類", "ing": "蚵仔、杏鮑菇、紅蘿蔔、筍絲、白蘿蔔、洋蔥、雞骨、柴魚片、青蔥、薑、麵粉、油蔥酥 適量、鹽 適量", "steps": ["白蘿蔔、洋蔥、雞骨直接下鍋，柴魚片以布包起，一起熬高湯。", "杏鮑菇切成極薄的片再切絲，乾鍋不加油翻炒到出水縮小。", "加入高湯、紅蘿蔔與筍絲，以油蔥酥、鹽調味。", "蚵仔裹上麵粉，蔥薑爆香後把蚵仔煎熟。", "湯頭略微勾芡，放入蚵仔即完成。"], "tip": "低糖版祕密：用切得極薄的杏鮑菇絲取代麵線，口感相近熱量更低；勾芡不要勾太多。", "long": "", "wide": false, "desc": "杏鮑菇絲取代麵線，減醣也能喝到懷念味", "chapters": [], "views": 8300, "zones": []}, {"name": "年糕", "img": "VID-18.jpg", "yt": "sg3bK296SVM", "cat": "全穀雜糧", "ing": "糯米、糖 適量", "steps": ["糯米先泡水，泡好後磨米（可用果汁機打成米漿）。", "米漿裝入粿袋，用重物壓乾水分，放置一天成為粿粞。", "粿粞加糖，攪拌至稠稠的狀態。", "將粿糰壓平壓扁，入鍋蒸熟即完成。"], "tip": "粿糰要壓得越扁越好，受熱均勻比較容易蒸熟。", "long": "", "wide": false, "desc": "自磨米漿慢慢蒸透，過年就要這一味", "chapters": [], "views": 8700, "zones": ["澎湃"]}, {"name": "潤餅", "img": "VID-19.jpg", "yt": "eTCPKBwBDfE", "cat": "全穀雜糧", "ing": "【餅皮】麵粉 300g、水 450cc、鹽 少許、南瓜 50g；【內餡】雞胸肉、洋蔥、蒜泥、水梨泥、蘋果泥、醬油、辣椒、蛋、豆乾、紅蘿蔔", "steps": ["雞胸肉以洋蔥、蒜泥、水梨泥、蘋果泥、醬油、辣椒醃過，下鍋炒熟。", "煎蛋備用；豆乾用煎蛋剩的油下鍋炒。", "紅蘿蔔下鍋炒，加一點水，一定要炒到軟。", "餅皮麵糊：麵粉300克、水450cc、鹽與南瓜50克打勻，醒麵30分鐘。", "平底鍋將麵糊煎成潤餅皮。", "餅皮包入各式餡料捲起即完成。"], "tip": "炒紅蘿蔔加點水炒到軟才好吃；麵糊要醒過再煎，餅皮才Q。", "long": "", "wide": false, "desc": "現煎Q皮包滿餡料，全家圍著捲最熱鬧", "chapters": [], "views": 300, "zones": ["澎湃"]}, {"name": "古早味鹹湯圓", "img": "VID-20.jpg", "yt": "VaquHeRRsDE", "cat": "全穀雜糧", "ing": "糯米、紫地瓜、南瓜、雞腿肉、雞皮 少許、紅蔥頭、金鉤蝦、香菇、醬油 少許、胡椒 少許、味醂 少許、青蒜 少許、香菜 少許、茼蒿、油 少許、鹽 少許", "steps": ["糯米磨成米漿後裝袋壓乾一天一夜，成為結實的粿粞。", "取一小塊粿粞放入滾水煮至浮起全熟（粿婆），趁熱揉回粿粞裡反覆搓揉，揉至產生黏性、成為光滑的粿糰。", "紫地瓜與南瓜分別蒸熟壓碎（南瓜水分多要先擠乾），各取部分粿糰揉入，染成紫色與黃色。", "熱鍋先煸雞皮逼出雞油，再補少許油，依序下紅蔥頭、金鉤蝦、香菇炒香，轉小火加醬油與胡椒炒勻。", "雞腿肉剁碎加入炒料中，加味醂與少許醬油拌勻成內餡。", "取小塊粿糰包入內餡，收口捏緊搓圓，放入滾水煮至浮起撈出。", "茼蒿汆燙後拌入少許炒料鋪底，將鹹湯圓擺上即完成。", "另一種吃法：不包餡的小湯圓煮熟後，用剩餘炒料小火乾炒拌勻，起鍋前加青蒜與香菜，就是餡料在外的乾湯圓。"], "tip": "包餡湯圓要包小顆、皮留厚一點才有口感也不易破；加醬油務必轉小火才不會焦苦；乾炒湯圓做完馬上吃最Q；南瓜選水分少的栗子南瓜比較好染色。", "long": "", "wide": true, "desc": "天然染色的雙色湯圓，一碗湯暖到心底", "chapters": [{"s": 112, "t": "01:52", "label": "準備做鹹湯圓"}, {"s": 150, "t": "02:30", "label": "水煮粿粹"}, {"s": 348, "t": "05:48", "label": "炒鹹湯圓餡料"}, {"s": 528, "t": "08:48", "label": "蔬果天然染色"}, {"s": 633, "t": "10:33", "label": "包鹹湯圓"}, {"s": 742, "t": "12:22", "label": "湯圓下鍋煮炒"}], "views": 95306, "zones": ["澎湃"]}, {"name": "玉米椰奶甜湯圓", "img": "VID-21.jpg", "yt": "VaquHeRRsDE", "cat": "百卡點心", "ing": "糯米、玉米粒、椰奶", "steps": ["糯米磨成米漿後裝袋壓乾一天一夜，成為結實的粿粞。", "取一小塊粿粞放入滾水煮至浮起全熟（粿婆），趁熱揉回粿粞裡搓揉至產生黏性、成為光滑的粿糰。", "取小塊粿糰搓成小湯圓。", "玉米粒打成漿（取其天然甜味，不需另煮糖水），加入椰奶拌勻成湯底。", "另起滾水煮湯圓至浮起，撈入玉米椰奶湯底拌一下即完成。"], "tip": "全程用玉米的天然甜味取代糖水，清爽清甜；湯圓可用蒸熟的紫地瓜、南瓜染色更好看；湯圓是碳水，搭配蛋白質與蔬菜一起吃更均衡。", "long": "", "wide": true, "desc": "玉米天然甜取代糖水，減糖甜湯清爽不膩", "chapters": [{"s": 933, "t": "15:33", "label": "調玉米湯底"}, {"s": 973, "t": "16:13", "label": "加入椰奶"}, {"s": 1003, "t": "16:43", "label": "煮甜湯圓"}, {"s": 1032, "t": "17:12", "label": "組合試吃"}], "views": 95306, "zones": []}, {"name": "米糕粥", "img": "VID-22.jpg", "yt": "6SgfsgNOoyo", "cat": "百卡點心", "ing": "糯米、綠豆蒜、糖 適量、水 適量、米酒 少許、油條 1條（可省略）", "steps": ["糯米與綠豆蒜分別泡水備用。", "糯米洗淨放入鍋中，用熱水蒸約30分鐘至熟。", "另取鍋將糖加少許水煮成糖水。", "蒸好的糯米與綠豆蒜一起下鍋，倒入糖水拌勻煮滾。", "湯汁不足再補熱水，邊煮邊攪拌至滾沸濃稠即可。", "食用時依喜好加少許米酒與油條一同品嚐。"], "tip": "米糕粥越燙越好吃，趁熱享用風味最佳。屬高碳水點心（100克約280大卡，油條一條約300大卡），建議控制份量，搭配蛋白質與蔬菜才均衡。", "long": "", "wide": true, "desc": "熱呼呼的糯米甜粥，趁燙喝最對味", "chapters": [{"s": 83, "t": "01:23", "label": "介紹材料"}, {"s": 103, "t": "01:43", "label": "糯米下鍋蒸"}, {"s": 608, "t": "10:08", "label": "下糖調味"}, {"s": 641, "t": "10:41", "label": "米糕開鍋"}, {"s": 694, "t": "11:34", "label": "拌煮成粥"}, {"s": 803, "t": "13:23", "label": "加油條享用"}], "views": 114903, "zones": []}, {"name": "碗粿", "img": "VID-23.jpg", "yt": "VzOABemIb4g", "cat": "全穀雜糧", "ing": "在來米 1斤(600g)、水 約11碗(每碗240cc)、馬蹄粉、鹽 少許、菜脯、紅蔥頭、豬肉、蛋、醬油膏 少許", "steps": ["在來米先泡水，泡好後加水用調理機打成米漿。", "米漿加入馬蹄粉與少許鹽，以小火慢煮並不停攪拌至濃稠。", "菜脯切碎用熱鍋不加油乾煸炒香；另起鍋爆香紅蔥頭，加豬肉與菜脯拌炒，加少許醬油膏調味上色。", "空碗先倒蓋放入蒸鍋蒸熱，讓水氣散出，碗內才不會積水。", "米漿倒入碗中，放上炒料、豬肉與蛋，入鍋蒸約30分鐘。", "筷子輕戳確認蒸熟後取出，搭配蒜蓉醬（蒜頭打碎＋醬油膏＋冷開水調勻）或甜辣醬食用。"], "tip": "菜脯一定要先乾煸炒香，香氣才出得來；空碗先倒蓋蒸熱去水氣是安媽的祕訣；米漿加馬蹄粉可增加Q度。", "long": "", "wide": true, "desc": "菜脯乾煸炒香，安媽祕訣蒸出綿Q碗粿", "chapters": [{"s": 56, "t": "00:56", "label": "切菜脯備料"}, {"s": 169, "t": "02:49", "label": "在來米打漿"}, {"s": 251, "t": "04:11", "label": "小火煮米漿"}, {"s": 429, "t": "07:09", "label": "煸炒紅蔥肉料"}, {"s": 538, "t": "08:58", "label": "倒漿入碗蒸"}, {"s": 789, "t": "13:09", "label": "碗粿出爐"}], "views": 338270, "zones": ["澎湃"]}, {"name": "糯米腸", "img": "VID-24.jpg", "yt": "YW73JTp89l4", "cat": "全穀雜糧", "ing": "長糯米 1斤、豬大腸(腸衣) 1副、花生 適量（前一晚泡水）、紅蔥頭、植物油 適量、醬油 適量、鹽 少許、麵粉（洗腸用）、棉線 數條", "steps": ["紅蔥頭切碎，起油鍋爆香成油蔥，炒到收乾備用。", "豬大腸以麵粉內外搓洗乾淨（麵粉能帶走油脂），沖淨後剪成適當長段。", "泡過一晚的花生放入電鍋，內鍋加水蓋過花生蒸至鬆軟，可加少許鹽後瀝乾。", "糯米洗淨泡水約三小時後瀝乾，加入花生、油蔥與醬油拌勻，調味不要太鹹。", "大腸一端套上漏斗，將糯米餡慢慢灌入、邊灌邊往內擠，灌約六七分滿、前後留空間，兩端棉線綁緊。", "水滾後先放腸子一端讓腸衣受熱縮起，再整條下鍋，分批煮至糯米熟透。", "撈起放涼吹冷後切段，搭配小黃瓜、酸菜或醬料食用。"], "tip": "糯米只能灌六七分滿，煮熟會膨脹，太滿會破；灌米時漏斗不要拔起、把米往內擠；要分批煮，新舊混煮分不清哪條熟；用麵粉洗大腸比用鹽乾淨；煮好放涼吹冷口感更Q。", "long": "", "wide": true, "desc": "手工灌米慢火煮透，市場口的懷念滋味", "chapters": [{"s": 59, "t": "00:59", "label": "切豬油爆香"}, {"s": 188, "t": "03:08", "label": "洗豬大腸"}, {"s": 301, "t": "05:01", "label": "電鍋煮花生"}, {"s": 372, "t": "06:12", "label": "拌糯米調味"}, {"s": 436, "t": "07:16", "label": "灌米入腸"}, {"s": 586, "t": "09:46", "label": "下鍋水煮"}], "views": 278525, "zones": ["澎湃"]}, {"name": "古早味肉粽", "img": "VID-25.jpg", "yt": "IOiQo5Y4g_c", "cat": "全穀雜糧", "ing": "圓糯米 4斤半（泡水3至4小時）、蒟蒻米（捏碎）、梅花豬肉與三層肉、金鉤蝦、乾香菇、紅蔥頭、花生、鹹蛋黃、粽葉、醬油 約4湯匙、鹽 少許、白胡椒 少許、油 少許", "steps": ["圓糯米泡水三至四小時後瀝乾，蒟蒻米捏碎與糯米拌勻。", "粽葉以滾水煮軟逐葉洗淨；金鉤蝦泡水五至十分鐘瀝乾；花生加少許鹽煮熟備用。", "乾香菇不加油，以乾鍋慢火煸炒至香氣釋出。", "少量油爆香紅蔥頭至濕潤狀，加醬油、鹽、白胡椒調味，與香菇、金鉤蝦拌勻成餡料。", "豬肉切塊炒香，加醬油滷至入味。", "糯米與油蔥餡料、花生拌勻，粽葉先鋪少量米，放入滷肉、香菇、鹹蛋黃、金鉤蝦，再蓋米壓緊包好綁緊。", "水滾後才下粽，大火煮約十分鐘轉中火，續煮約二十分鐘至熟。"], "tip": "蒟蒻米結塊務必捏碎才拌得勻；油蔥炒到濕潤即可不必酥脆，較能裹住餡料；包時兩側折緊以免漏餡。健康版重點：加蒟蒻米可減少約三成熱量（一般肉粽約500-600大卡）；糯米不易消化，一天以一顆為限，搭配蔬菜與蛋白質、醬料少沾。", "long": "", "wide": true, "desc": "加蒟蒻米減三成熱量，端午吃粽更無負擔", "chapters": [{"s": 82, "t": "01:22", "label": "泡米加蒟蒻"}, {"s": 272, "t": "04:32", "label": "爆香油蔥酥"}, {"s": 408, "t": "06:48", "label": "滷豬肉餡"}, {"s": 571, "t": "09:31", "label": "拌炒餡料"}, {"s": 623, "t": "10:23", "label": "包粽綁粽"}, {"s": 746, "t": "12:26", "label": "下鍋煮粽"}], "views": 525300, "zones": ["澎湃"]}, {"name": "古早味刈包", "img": "VID-26.jpg", "yt": "xlMiuWBOrZs", "cat": "全穀雜糧", "ing": "【刈包皮】中筋麵粉 400g、鮮奶 200g（可用水替代）、天然酵母 適量（35度C溫水攪散）、糖 適量、油 10cc；【滷五花肉】三層肉 1塊、米酒 適量、冰糖 適量、洋蔥、醬油 約30cc、醬油膏 約10cc、胡椒粉 少許；【炒酸菜】酸菜 適量、糖 少許；【配料】花生粉 適量、香菜、自製洋蔥醬", "steps": ["製作刈包皮：中筋麵粉過篩，酵母以約35度C溫水攪散，加入鮮奶、糖與油10cc（鮮奶分次慢慢加，視麵糰乾濕調整），揉成光滑麵糰。", "麵糰蓋布醒麵發酵至明顯變大；放冰箱低溫發酵，麵皮會更細緻。", "發好的麵糰擀開後捲起以免空氣跑入，切對半再各分三等份，逐一擀成薄片，表面抹油防沾黏，對折成刈包皮。", "麵皮放入蒸籠先不開火再醒一次，等明顯發起、水滾冒蒸氣後計時蒸12分鐘，關火燜5分鐘再開蓋。", "滷五花肉：三層肉加米酒汆燙去腥，切成適口塊狀。", "五花肉下鍋加點油煸炒逼出油脂，肉質才Q而緊實。", "加冰糖炒上色，放洋蔥炒香，加醬油約30cc與醬油膏約10cc、撒點胡椒粉，加水小火滷約30分鐘。", "炒酸菜：酸菜切碎，用滷肉煸出的油炒香，加一點糖調味。", "組裝：刈包皮夾入滷五花肉與炒酸菜，撒花生粉、放香菜，加一匙自製洋蔥醬即完成。"], "tip": "蒸好務必燜5分鐘再開蓋，皮才膨得漂亮。變化版南瓜刈包皮：中筋麵粉200克＋蒸熟南瓜200克＋砂糖4克＋酵母粉2克，南瓜水分不一要分次加。健康版內餡可改滷牛腱心（脂肪低）：壓力鍋以薑片、草果、紅棗、八角、甘草、月桂葉、洋蔥煸香，加冰糖醬油上壓約3分鐘。一個刈包約350至500大卡（皮約半碗飯），注意份量。", "long": "", "wide": true, "desc": "鬆軟麵皮夾滷肉酸菜，一口咬下滿滿台味", "chapters": [{"s": 240, "t": "04:00", "label": "調麵糰材料"}, {"s": 362, "t": "06:02", "label": "揉麵醒麵"}, {"s": 627, "t": "10:27", "label": "煸滷三層肉"}, {"s": 751, "t": "12:31", "label": "壓力鍋滷牛腱"}, {"s": 1096, "t": "18:16", "label": "切炒酸菜"}, {"s": 1384, "t": "23:04", "label": "醒發蒸刈包"}], "views": 146596, "zones": ["澎湃"]}, {"name": "青汁玉子燒", "img": "VID-27.jpg", "yt": "J13Ul3WzpP8", "cat": "豆蛋", "ing": "雞蛋 5顆、蛋黃 2顆、嫩豆腐、洋蔥、起司、青汁", "steps": ["打五顆蛋，將嫩豆腐捏碎後加入蛋液中拌勻。", "加入一點洋蔥增加口感，再加入會牽絲的起司。", "因為蛋白不易成型，再補兩顆蛋黃，讓蛋液更好定型。", "倒入鍋中煎，邊煎邊捲成玉子燒，成型即完成。"], "tip": "蛋白單獨煎不易成型，補蛋黃可以幫助定型。青汁在打蛋時一起加入蛋液拌勻即可。", "long": "", "wide": false, "desc": "豆腐入蛋更嫩滑，高蛋白早餐加點綠意", "chapters": [], "views": 2400, "zones": ["高蛋白"]}, {"name": "青汁豆腐漢堡排", "img": "VID-28.jpg", "yt": "72-WKAiDHYw", "cat": "肉類", "ing": "雞胸肉 300g、雞腿肉 150g、豆腐、蒜、紅蘿蔔、薑末 少許、三星蔥、洋蔥、起司、雞蛋 1顆、青汁", "steps": ["將300克雞胸肉與150克雞腿肉（比例2比1）打碎攪成泥。", "加入豆腐、蒜、紅蘿蔔與一點薑末拌勻。", "加入三星蔥、洋蔥、一點起司與一顆蛋，攪拌均勻。", "取適量整型成漢堡排狀，下鍋煎熟即完成。"], "tip": "加一點薑末可以去腥味；雞胸配雞腿2比1，口感嫩又不柴。青汁在拌肉泥時一起加入即可。", "long": "", "wide": false, "desc": "雞胸加豆腐的高蛋白排，嫩口低脂不怕柴", "chapters": [], "views": 2500, "zones": ["高蛋白"]}, {"name": "干貝山藥蒸蛋", "img": "VID-29.jpg", "yt": "CNhmANmD6Gg", "cat": "海鮮魚類", "ing": "雞蛋 2顆、山藥(磨成泥)、干貝 2至3顆、鹽巴 少許、昆布粉 少許、油 少許", "steps": ["山藥磨成泥備用，山藥可以增加蒸蛋的鮮甜味。", "打入兩顆蛋，加入山藥泥、少許鹽巴與昆布粉拌勻，昆布跟海鮮很合。", "干貝退冰後用手撕成小塊加入蛋液。", "玻璃容器先抹一層薄油防止沾黏，再倒入蛋液。", "電鍋先預熱，放入蛋液、蓋上鍋蓋蒸熟即完成。"], "tip": "安媽的做法不加水，口感比一般蒸蛋紮實；蛋液表面有泡泡沒關係，蒸過就會消失；電鍋先預熱蒸起來比較快。山藥是好的碳水，搭配干貝更鮮甜。", "long": "https://youtu.be/m1dG87V2DRI", "wide": false, "desc": "干貝鮮甜配好碳水山藥，電鍋一蒸就上桌", "chapters": [], "views": 4300, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "干貝櫛瓜堡", "img": "VID-30.jpg", "yt": "vfye0xzPMeU", "cat": "海鮮魚類", "ing": "干貝 5顆、櫛瓜(切片)、鹽巴 少許、白胡椒 少許、油 適量", "steps": ["熱鍋下油，鍋子一定要夠熱，放入五顆干貝（可做五個堡），加一點點鹽。", "不要一直翻面，煎好一面再翻另一面，水分才鎖得住。", "干貝不用煎太熟，中間留一點軟嫩度更好吃，起鍋前撒點白胡椒。", "同鍋再煎櫛瓜片，不與干貝同時煎；櫛瓜水分多很快就熟。", "把干貝疊在櫛瓜上組合成堡即完成，不用沾醬就很好吃。"], "tip": "鍋子不夠熱就鎖不住干貝的水分；中間保留軟嫩要用生食等級的干貝才可以；蛋白質加蔬菜的組合，請客端出來絕對不會剩。", "long": "https://youtu.be/m1dG87V2DRI", "wide": false, "desc": "熱鍋鎖住干貝水分，低脂清爽的優雅小點", "chapters": [], "views": 7900, "zones": ["新手", "高蛋白"]}, {"name": "干貝炒三鮮", "img": "VID-31.jpg", "yt": "fiLqyCAkjwo", "cat": "海鮮魚類", "ing": "干貝、蝦仁、透抽、櫛瓜、薑片、青蔥、辣椒、鹽巴 少許、昆布粉 少許、米酒 少許、油 適量", "steps": ["透抽先汆燙一下，炒出來才不會有白白的雜質，也比較快熟。", "干貝表面擦乾下鍋煎香，加少許鹽；煎干貝油量要比平常多一點，煎出的湯汁留著備用。", "熱鍋先下薑片提香，蔥白先下炒香，蔥綠留到最後。", "加入干貝、蝦仁、透抽與櫛瓜拌炒，再把剛剛煎干貝的湯汁倒進來。", "下蔥綠與辣椒，加少許鹽與昆布粉，這時火轉大一點快炒。", "起鍋前嗆一點米酒提香，一點點就好，即可起鍋。"], "tip": "干貝先煎過更香，煎出的湯汁是精華別倒掉；透抽先汆燙就不用炒太久；櫛瓜可以多放一點增加蔬菜量。高蛋白低脂的快炒，清爽不油膩。", "long": "https://youtu.be/m1dG87V2DRI", "wide": false, "desc": "高蛋白低脂快炒，海味鮮甜清爽不油膩", "chapters": [], "views": 3300, "zones": ["高蛋白"]}, {"name": "干貝烘蛋", "img": "VID-32.jpg", "yt": "Nf192XGaK4Q", "cat": "海鮮魚類", "ing": "干貝(每顆撕成約4份)、雞蛋 4顆、櫛瓜、洋蔥、甜椒、三星蔥、昆布粉 少許、鹽巴 少許、水或牛奶 少許、油膏 少許、油 適量", "steps": ["干貝先煎香，每顆撕成大約四份，才能真的吃到干貝；煎出的湯汁留著。", "用煎過櫛瓜的鍋子不用洗直接爆香洋蔥（油量不用太多），加入櫛瓜與少許鹽巴拌炒，再下甜椒略炒。", "打四顆蛋，加一點昆布粉與一點點鹽巴打勻。", "把炒好的料全部加進蛋液拌勻（是料加進蛋，不是蛋倒進料），再把煎干貝的湯汁加進來增添香氣。", "蛋液加一點水或牛奶，烘出來才不會太硬。", "熱鍋下油倒入蛋液，鋪上干貝，蓋鍋蓋燜烘，等水分收乾、定型熟透即可起鍋切塊。"], "tip": "煎干貝的湯汁加進蛋液是香氣關鍵；水或牛奶讓蛋更嫩，加多了就多燜一下等水分收乾；起鍋後放上蔥花、甜椒、淋一點點油膏，就是最澎湃的干貝烘蛋。", "long": "https://youtu.be/m1dG87V2DRI", "wide": false, "desc": "蛋液加點牛奶，烘出蓬鬆不硬的金黃厚蛋", "chapters": [], "views": 2000, "zones": ["高蛋白"]}, {"name": "干貝雞湯", "img": "VID-33.jpg", "yt": "GyExvzZAzPM", "cat": "湯品", "ing": "玉米雞 半隻、薑片、干貝(生食等級)、鹽巴 少許、米酒 少許、冷水 適量", "steps": ["雞肉先汆燙，汆燙的水倒掉，雞肉內殘留的內臟清乾淨，鍋子也要洗乾淨，湯喝起來才清。", "雞肉放回鍋中，直接加入冷水，薑片一開始就放進去一起煮。", "煮滾後把浮沫撈掉，慢慢熬煮至雞肉熟軟。", "湯面的雞油用吸油紙稍微瀝掉一點，湯更清爽。", "加少許鹽巴與米酒調味。", "干貝最後才放：湯保持滾沸時丟入燙一下，加蓋悶熟就好，不用再煮。"], "tip": "干貝最後下、用悶的才不會老；顏色偏黃的是母干貝；用乾干貝熬湯也可以；湯裡可以加菇類增加蔬菜量。冷水直接下鍋是安媽請教長輩的做法。", "long": "https://youtu.be/m1dG87V2DRI", "wide": false, "desc": "冷水下鍋的老智慧，熬出清甜甘醇的湯頭", "chapters": [], "views": 3400, "zones": ["高蛋白"]}, {"name": "咖哩醬", "img": "VID-34.jpg", "yt": "IJ9AOyZr2U0", "cat": "蔬菜", "ing": "洋蔥(用量多一點)、蒜末、春薑黃(整顆) 2～3顆、橄欖油 適量、印度咖哩粉 約50克(平常約15克即可)、醬油膏 約70～80克、雞高湯 適量、水 適量、馬鈴薯", "steps": ["整顆春薑黃壓碎備用，2～3顆就夠，太多會苦。", "鍋中下橄欖油，放入較多的洋蔥、一點蒜末與壓碎的春薑黃，溫度控好不要太高，把洋蔥炒到透軟即可，不必炒到焦化。", "轉很小的火，下咖哩粉（安媽今天做三份共用約50克，一般家庭約15克就夠），再補一點橄欖油炒香，薑黃一定要有油、小火慢炒才不會焦苦。", "加入約70～80克醬油膏拌炒，其他調味料都可以不用加。", "分次慢慢加入雞高湯煮滾，覺得太鹹再補一點水，讓醬汁熬煮一會兒。", "熬好後把渣渣過濾掉，用果汁機把醬打細，再加入煮熟的馬鈴薯一起打成泥拌回醬中，不夠濃稠可再補一顆馬鈴薯，煮滾後醬汁自然變濃即完成。"], "tip": "全程小火是關鍵，下咖哩粉後火一大就會焦苦；不用太白粉勾芡，改用馬鈴薯泥讓醬自然濃稠；咖哩粉本身已含薑黃、陳皮、馬芹、葫蘆巴、肉豆蔻、肉桂、茴香、紅辣椒、薑、丁香、八角、小豆蔻、甘草、黑胡椒等辛香料，買調好的即可。", "long": "https://youtu.be/1uDM4c5BY14", "wide": false, "desc": "洋蔥炒透加馬鈴薯泥打稠，不勾芡的家常咖哩醬", "chapters": [], "views": 1200, "zones": []}, {"name": "雞腿咖哩飯", "img": "VID-35.jpg", "yt": "XHJYaHsBC58", "cat": "肉類", "ing": "雞腿排、蒟蒻米 2包、蛋、洋蔥、蔥花、鹽巴 適量、黑胡椒 少許、醬油膏 適量", "steps": ["熱鍋下蛋與洋蔥炒香，加入兩包蒟蒻米拌炒，並加一點點鹽巴；蒟蒻米開封即可食，炒熱入味很快就能起鍋。", "起鍋前撒黑胡椒、加少許醬油膏調味，最後撒上蔥花盛盤。", "雞腿排雞皮擦乾、皮朝下入鍋，不加油直接乾煎，逼出雞皮本身的油脂。", "煎到雞皮焦香出油後翻面，加一點鹽巴調味。", "蓋上鍋蓋燜一下讓雞腿熟透，盛盤淋上咖哩醬享用。"], "tip": "蒟蒻米永遠一顆一顆不會成型、也不會黏鍋，很適合炒飯；兩包約70大卡，同量白飯約280大卡；想熱量更低可把雞腿換成雞胸，稍微煎一下就好。", "long": "https://youtu.be/1uDM4c5BY14", "wide": false, "desc": "蒟蒻米炒飯配乾煎去油雞腿，低油也能吃咖哩飯", "chapters": [], "views": 2200, "zones": ["新手", "高蛋白"]}, {"name": "海鮮咖哩飯", "img": "VID-36.jpg", "yt": "UBhYjwEYQmc", "cat": "海鮮魚類", "ing": "野生草蝦 7隻、花枝、蒟蒻麵、米酒 少許、咖哩醬 適量", "steps": ["蝦頭不要丟掉，留著一起煎更鮮香；花枝切段並劃刀斷筋，受熱才會捲得漂亮又Q。", "海鮮加一點點米酒抓拌去腥，不需要其他調味料。", "鍋中不加油直接乾煎蝦子，用煎的比水煮香很多。", "花枝快速煎過，肉一熟就起鍋，不要煎太熟才不會老。", "蒟蒻麵拌入咖哩醬變成咖哩麵，放上蝦子與花枝即完成，不必再加鹽，沾咖哩醬的味道就很夠。"], "tip": "海鮮要跟信用好的店家買、避免泡過藥水的貨，夠新鮮本身就好吃；蒟蒻麵平常沒什麼味道，吸了咖哩醬就變成咖哩麵，整道都是白肉海鮮加蒟蒻麵，熱量是三道中最低的。", "long": "https://youtu.be/1uDM4c5BY14", "wide": false, "desc": "鮮蝦花枝不加油乾煎，高蛋白的咖哩好搭檔", "chapters": [], "views": 1100, "zones": ["高蛋白"]}, {"name": "蔬食咖哩飯", "img": "VID-37.jpg", "yt": "2P2t8NLXXZI", "cat": "蔬菜", "ing": "皇帝豆、蛋 1顆、豆皮、茭白筍、四季豆、美白菇、甜椒、糯米椒、起司、橄欖油 適量、鹽巴 適量、冰塊", "steps": ["水滾後加一點點鹽，四季豆與茭白筍下鍋汆燙，燙好立刻泡冰塊水冰鎮，口感才會脆。", "豆皮不加油下鍋煎到脆脆香香，加一點鹽巴調味，也可以改用氣炸鍋直接炸酥。", "糯米椒最吃油，用較多橄欖油煎久一點才會軟；甜椒稍微煎過後加一點水半煎煮，軟得比較快，放涼後把外膜剝掉更好入口；美白菇一樣炒熟加一點點鹽。", "皇帝豆是這道的碳水來源，煮熟後打成泥，混入一顆蛋增加蛋白質。", "皇帝豆泥稍微塑形成餅，小火煎到定型，起鍋前刨上起司增添香氣。", "全部食材盛盤，淋上咖哩醬即完成。"], "tip": "這道有用洋蔥、蒜等五辛，屬蔬食不是全素，吃全素可把五辛拿掉；每樣食材都要加一點點鹽，風味才出得來；皇帝豆屬澱粉類、蛋白質含量也不低，用豆泥蛋餅取代白飯當碳水，有人習慣配飯也可以。", "long": "https://youtu.be/1uDM4c5BY14", "wide": false, "desc": "四季豆、豆皮、糯米椒一次上桌，蔬菜滿滿的咖哩組合", "chapters": [], "views": 1100, "zones": []}, {"name": "天貝壽司", "img": "VID-38.jpg", "yt": "08BGBKU-zLY", "cat": "豆蛋", "ing": "黑豆天貝、大頭菜、市售調味豆皮（豆皮壽司用）、香菜（可省略）、鹽 少許", "steps": ["大頭菜切絲，加少許鹽抓至出水，再把水分確實擰乾備用。", "黑豆天貝切碎一點，下鍋炒熟；不必另外加調味料，因為豆皮本身已有甜甜的調味。", "將炒好的天貝碎與大頭菜絲拌成內餡，喜歡的話加一點香菜。", "把內餡填進市售調味豆皮裡包好即完成。"], "tip": "安媽說天貝上黑黑的點不是髒污，是黑豆的皮和發酵菌的孢子，可以安心吃；豆皮直接買人家調好味的最方便，內餡就不用再調味，大頭菜記得擰乾餡料才不會濕軟。", "long": "https://youtu.be/v-L77kTAtYM", "wide": false, "desc": "黑豆天貝入餡的植物蛋白壽司，清爽又有飽足感", "chapters": [], "views": 969, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "天貝三杯", "img": "VID-39.jpg", "yt": "rFTrd1FyzEc", "cat": "豆蛋", "ing": "天貝、蘑菇、薑、辣椒、九層塔、醬油膏 適量、胡椒粉 適量", "steps": ["蘑菇先下鍋乾炒；洗過的蘑菇會出水，要耐心炒到水分收乾。", "天貝比照蘑菇的大小切塊，先下鍋煸香；沒有煎過香氣就出不來。", "以中火爆香薑與辣椒，大火也可以。", "加入天貝與蘑菇拌炒，下約一杯醬油膏與胡椒粉調味，份量依天貝多寡增減。", "起鍋前放入九層塔略拌，煮到入味即完成。"], "tip": "安媽的素食三杯不加麻油、不加酒也不加糖，只靠薑、辣椒、胡椒粉、醬油膏和最後下的九層塔提味，調味越簡單越好；天貝是發酵食材，一定要先煸香才會香。不吃薑、辣的人可自行調整。", "long": "https://youtu.be/v-L77kTAtYM", "wide": false, "desc": "植物蛋白天貝與蘑菇的三杯風味，鹹香夠味又下飯", "chapters": [], "views": 1700, "zones": ["新手", "高蛋白"]}, {"name": "天貝涼拌", "img": "VID-40.jpg", "yt": "OujqPeP_YD4", "cat": "豆蛋", "ing": "鷹嘴豆天貝、小黃瓜、櫻桃蘿蔔、鴻喜菇、蛋（可省略）、芝麻醬 適量", "steps": ["小黃瓜與櫻桃蘿蔔切絲備用。", "鴻喜菇不放油，以中火耐心乾煸出香氣。", "鷹嘴豆天貝不必加油，直接下鍋煎炒到表面酥香，煎起來就像肉排一樣。", "有吃蛋的話，可加水煮蛋，或把蛋煎成蛋皮後切絲；不吃蛋直接省略。", "全部材料放一起，淋上現成芝麻醬拌勻即完成。"], "tip": "芝麻醬用市售現成的直接淋就好，安媽說「芝麻醬就好了，很簡單」，沒有另外調製；天貝煎越酥越香越好吃；鴻喜菇乾煸要有耐心，中火就好，小火太小煸不出香氣。", "long": "https://youtu.be/v-L77kTAtYM", "wide": false, "desc": "鷹嘴豆天貝配時蔬淋芝麻醬，清爽涼拌輕鬆上桌", "chapters": [], "views": 732, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "南瓜馬鈴薯", "img": "VID-41.jpg", "yt": "IPjQnQnPmGc", "cat": "全穀雜糧", "ing": "南瓜、馬鈴薯、起司、鹽 適量、黑胡椒 適量", "steps": ["南瓜與馬鈴薯切小塊，入鍋蓋上鍋蓋蒸約15分鐘。", "筷子戳得進去就代表熟了，取出放涼備用。", "熱鍋，將蒸熟的南瓜與馬鈴薯下鍋煎一下，加鹽巴讓味道吃進去，稍微炒一下就好。", "加入起司與黑胡椒增加風味，拌勻即完成。"], "tip": "先蒸再煎，煎的過程能讓鹽巴入味；起司可以補充鈣質又增添風味。南瓜和馬鈴薯是優質澱粉，很適合當便當的主食配菜；帶便當時一份約可裝到150公克。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "南瓜馬鈴薯先蒸後煎，起司黑胡椒提味的優質澱粉", "chapters": [], "views": 2800, "zones": ["新手"]}, {"name": "煎里肌肉", "img": "VID-42.jpg", "yt": "1q5BCHXm1cg", "cat": "肉類", "ing": "里肌肉、洋蔥末、辣椒 2根、蒜末、蛋 1顆、粉（太白粉或地瓜粉）約10克、米酒 適量、味醂 適量、赤藻糖醇 少許、黑胡椒 適量、醬油膏 少許、鹽 少許、油 適量", "steps": ["里肌肉挑最嫩的部位，先把肥油切除，切約兩公分厚，稍微拍一拍。", "加入洋蔥末、辣椒、蒜末、米酒（去腥）、味醂與少許赤藻糖醇（增加甜味）、黑胡椒、一點點醬油膏和鹽巴醃肉，調出甜甜鹹鹹的味道。", "打入一顆蛋，再加約10克的粉（太白粉或地瓜粉）抓勻，讓肉質更滑口，醃至入味。", "下鍋前把肉表面的醃料擦乾，味道已經吃進肉裡了。", "熱鍋下油，將里肌肉煎熟，肉片不厚很快就熟。"], "tip": "煎之前把表面醃料擦乾再下鍋，煎出來才會乾爽焦香、不易焦黑；擦掉醃料不用擔心沒味道，醃的時候味道已經吃進去了。加一顆蛋和約10克粉是讓肉更滑口的關鍵，量不用多；帶便當肉類一份約秤90公克。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "拍鬆醃透的里肌肉排，擦乾再煎才焦香，便當主菜首選", "chapters": [], "views": 5500, "zones": ["新手", "高蛋白"]}, {"name": "醬燒麵腸", "img": "VID-43.jpg", "yt": "cG4q29jatx8", "cat": "豆蛋", "ing": "麵腸、蒜末、蒜苗、香菜、辣椒、醬油膏 約2至3匙、胡椒 適量、水 少許、油 適量", "steps": ["麵腸買回來用手剝成小塊，不用刀切，炒的時候更快熟。", "熱鍋下油，這道菜油量可以多一點，放入麵腸煸香，要煸到酥酥脆脆，沒煸酥口感會像麵粉。", "下辣椒與一點點蒜末炒香。", "加入醬油膏約兩到三匙，火轉小一點，不要太大，可加一點點水讓醬汁均勻。", "下蒜苗與香菜，撒上胡椒，拌一拌即完成。"], "tip": "麵腸製作時麵粉已經洗掉，其實是含蛋白質的食材，很適合當便當的植物性蛋白配菜；醬油膏是這道菜的靈魂，覺得味道不夠可以加到兩、三匙；不吃辣的話辣椒不加也可以。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "手剝麵腸煸得酥香，醬油膏是靈魂，蒜苗香菜添香氣", "chapters": [], "views": 12000, "zones": ["新手"]}, {"name": "清炒筍絲", "img": "VID-44.jpg", "yt": "FHSucT0RQm0", "cat": "蔬菜", "ing": "綠竹筍、蒜末、辣椒、蔥花、鹽 適量、醬油膏 適量、胡椒粉 適量、油 適量", "steps": ["綠竹筍先整支放入滾水煮到熟透，撈起放涼。", "將竹筍切成細絲備用。", "熱鍋加油，下蒜末與辣椒稍微爆香，不吃辣的話辣椒不加也可以。", "下筍絲拌炒，加鹽巴與醬油膏調味。", "起鍋前下蔥花與一點胡椒粉拌勻即完成。"], "tip": "竹筍要先煮熟再切絲下鍋炒，炒起來比較快也更入味；辣椒可依口味省略。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "先煮再炒的綠竹筍絲，清脆爽口的便當清爽配菜", "chapters": [], "views": 8500, "zones": ["新手"]}, {"name": "清炒蔬菜", "img": "VID-45.jpg", "yt": "bSdtcM4a4DQ", "cat": "蔬菜", "ing": "白花椰菜、綠花椰菜、玉米筍、紅蘿蔔、鹽 適量、油 適量", "steps": ["水煮滾後加點鹽巴，白花椰與綠花椰下鍋汆燙，時間不要太久，滾起來就好，菜才會保持綠色。", "紅蘿蔔同樣汆燙，滾了就撈起來。", "撈起後沖冷水讓蔬菜降溫，口感會更清脆。", "玉米筍太長，切成斜片。", "熱鍋下油，先下玉米筍與紅蘿蔔，再下白花椰與綠花椰。", "加一點鹽巴拌炒，滾起來就完成。"], "tip": "汆燙時間短、燙完沖冷水降溫，蔬菜才會翠綠又清脆；加紅蘿蔔是為了配色，便當打開來繽紛，吃的時候心情愉快。便當蔬菜可以兩道混搭，例如花椰菜配菇類，兩樣加起來約150公克。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "雙色花椰配玉米筍紅蘿蔔，配色繽紛的便當常備菜", "chapters": [], "views": 10000, "zones": ["新手"]}, {"name": "清炒高麗菜", "img": "VID-46.jpg", "yt": "FcW9M8z2Lbs", "cat": "蔬菜", "ing": "高麗菜、蒜、辣椒、鹽 適量、油 適量", "steps": ["高麗菜的梗較厚不好入口，先切成細絲。", "高麗菜連同梗絲先用鹽巴抓醃一下，讓它脫水，避免下鍋炒時出水。", "熱鍋下油，放入辣椒與蒜炒香。", "下高麗菜快炒至熟，抓醃的鹽味已經吃進去，起鍋前不必再另外加調味料，炒勻即可起鍋。"], "tip": "菜梗切細絲就不浪費又好吃；高麗菜直接炒容易出水，先用鹽巴抓醃脫水再炒，成品比較乾爽，放進便當不易濕軟，而且抓醃的鹽就是這道菜的調味，不用再加鹽。", "long": "https://youtu.be/c-cegMyW5QM", "wide": false, "desc": "鹽巴先抓醃再快炒，高麗菜清脆不出水的小撇步", "chapters": [], "views": 10000, "zones": ["新手"]}, {"name": "四色菜", "img": "VID-47.jpg", "yt": "6tcoF2X82TE", "cat": "蔬菜", "ing": "杏鮑菇、玉米筍、紅蘿蔔、四季豆、辛香料、辣椒（可加可不加）、油 少許、鹽 適量、醬油膏 適量、胡椒粉 適量、水 適量", "steps": ["杏鮑菇先切丁，以乾鍋煸炒，煸到出水備用。", "玉米筍和紅蘿蔔先汆燙好備用。", "鍋中下少許油（安媽強調油量很少就好），以辛香料爆香，先下紅蘿蔔用油炒過，再下四季豆和玉米筍拌炒。", "下鹽巴調味讓味道吃進去，加一點水後蓋上鍋蓋燜一下。", "開蓋後再加一點鹽巴幫助入味，並加一點點醬油膏。", "撒一點胡椒粉，也可以下辣椒，試一下軟度和熟度。", "最後把煸好的杏鮑菇混入鍋中所有蔬菜拌炒均勻即完成。"], "tip": "杏鮑菇要切丁後用乾鍋煸到出水才香；全程油量很少；調味是鹽、醬油膏加一點胡椒粉（不是糖）。這道滿滿一鍋都是蔬菜，加進便當顏色會很繽紛。", "long": "https://youtu.be/i1e-SYQncKk", "wide": false, "desc": "四種蔬菜一鍋炒，低熱量密度又讓便當顏色超繽紛", "chapters": [], "views": 9600, "zones": []}, {"name": "櫻花蝦炒飯", "img": "VID-48.jpg", "yt": "Wu_6H2O4BXA", "cat": "全穀雜糧", "ing": "櫻花蝦、白飯、蒟蒻米、雞蛋、蔥白、蔥花、油 適量、醬油 一湯匙、醬油膏 適量、鹽 適量", "steps": ["櫻花蝦不加油，先下鍋以小火乾煸出香氣，取出另外放備用。", "鍋中下一點油，先把蛋炒好盛起備用（家常做法油不用多，蛋先起鍋就好）。", "再補一點油，下蔥白爆香。", "下白飯拌炒，再加入蒟蒻米一起炒勻。", "把剛炒好的蛋加回鍋中拌炒。", "加一湯匙醬油和一點醬油膏調味；醬油膏偏甜，不夠鹹再撒鹽調整鹹度。", "加入蔥花略拌炒即可起鍋。", "帶便當時櫻花蝦另外包成一小包，要吃之前再拌入，才會保持酥香。"], "tip": "飯煮得乾一點，炒起來才會粒粒分明；白飯混入高膳食纖維的蒟蒻米可以降低整體熱量。可以一次把一週份炒好，按每天要吃的份量一包一包分裝冷凍，要吃再復熱；便當飯量抓約六分滿。", "long": "https://youtu.be/i1e-SYQncKk", "wide": false, "desc": "櫻花蝦小火煸香再拌入，混蒟蒻米纖維更高的粒粒炒飯", "chapters": [], "views": 10000, "zones": []}, {"name": "蒜炒秀珍菇", "img": "VID-49.jpg", "yt": "SLOUtenjR94", "cat": "蔬菜", "ing": "秀珍菇、蒜末、辣椒、蔥、蒜苗、香菜（可加可不加）、鹽 少許、醬油膏 兩湯匙、白胡椒 適量、油 適量", "steps": ["秀珍菇用手撕成適口大小。", "熱鍋後不加油，直接下秀珍菇乾炒；炒到出水後繼續炒，一定要炒到完全乾、沒有水分。", "這時再加油，把蒜末撥到鍋邊爆香，接著下辣椒；油下去之後菇也比較不會黏鍋底。", "先加一點鹽巴，再下兩湯匙醬油膏拌炒，把菇煸到香、煸到透。", "起鍋前再補一點點醬油膏，下蔥、蒜苗和白胡椒拌炒均勻，香氣就出來了。", "最後的調味依個人口味增減，香菜加不加都可以。"], "tip": "第一個步驟不要先加油，秀珍菇要先乾炒到完全沒有水分，醬汁才吸得進去；用手撕的口感比較好。安媽說煸到香、煸到透的菇比較耐放，很適合當一週的常備便當菜。", "long": "https://youtu.be/i1e-SYQncKk", "wide": false, "desc": "秀珍菇先乾炒逼出水分，蒜香醬香吸好吸滿超下飯", "chapters": [], "views": 2200, "zones": []}, {"name": "鹽麴里肌肉", "img": "VID-50.jpg", "yt": "suRv5OBmI8o", "cat": "肉類", "ing": "豬里肌肉片、蒜末、蛋白、辣椒（不吃辣可不加）、辛香料（蒜苗）、鹽麴 適量、米酒 適量、黑胡椒 適量、醬油膏 適量、油 少許", "steps": ["豬里肌切薄片，並把筋斷掉。", "用鹽麴、米酒、蒜末、蛋白、黑胡椒和一點點醬油膏抓醃，醃約半小時到一小時會比較入味。", "醃好的肉片排開，放入烤箱以180度烤5分鐘即可；肉片薄不用烤太久，沒有烤箱用平底鍋也可以，油量一點點就好。", "另起鍋以少許油下辣椒，和烤好的肉片一起爆炒到香氣出來，再下蒜苗等辛香料煸香。", "最後再加一點點醬油膏拌炒均勻即完成，復熱或蒸過也不會水水的。", "一次做好可以裝小盒或保鮮袋分裝冷凍，帶便當直接取一份復熱，可以吃一個禮拜左右。"], "tip": "鹽麴（米麴）可以軟化肉質、增加鹹味；里肌切薄片先斷筋、醃半小時到一小時更入味；180度5分鐘就OK、油量一點點就好。這道沒有湯湯水水，分裝冷凍最適合帶便當。", "long": "https://youtu.be/i1e-SYQncKk", "wide": false, "desc": "鹽麴醃過的豬里肌軟嫩入味，烤箱五分鐘就能上桌", "chapters": [], "views": 5600, "zones": ["高蛋白"]}, {"name": "雞肉燥", "img": "VID-51.jpg", "yt": "c-cegMyW5QM", "cat": "肉類", "ing": "雞胸肉（去皮）、雞腿肉（去皮）、油蔥酥、辣椒（可加可不加）、米酒 少許、白胡椒 少許、醬油 適量、醬油膏 適量、鹽 少許", "steps": ["雞胸肉與雞腿肉都去皮，雞胸肉剁碎，雞腿肉切小塊，先抓醃備用。", "熱鍋下油，放入油蔥酥爆香。", "下雞腿肉與雞胸肉煎炒至變色。", "加入一匙醬油與醬油膏，拌炒上色。", "試味後若鹹味不夠，補一點鹽，再淋少許米酒去腥。", "撒上白胡椒，喜歡吃辣可加一點辣椒。", "蓋上鍋蓋燜煮收汁即完成。"], "tip": "安媽提醒雞胸和雞腿都要去皮再剁碎，肥油去除口感不膩；帶便當的菜要煮熟透再冷凍，複熱時中心溫度達70度以上就不用擔心隔夜菜。", "long": "", "wide": true, "desc": "去皮雞胸雞腿剁碎炒油蔥酥，香噴噴的便當拌飯神器", "chapters": [{"s": 517, "t": "08:37", "label": "材料介紹"}, {"s": 543, "t": "09:03", "label": "抓醃雞肉"}, {"s": 573, "t": "09:33", "label": "下鍋煎炒"}, {"s": 587, "t": "09:47", "label": "醬油調味"}, {"s": 629, "t": "10:29", "label": "蓋鍋收汁"}], "views": 371489, "zones": ["高蛋白"]}, {"name": "豆乾炒雞腿肉", "img": "VID-52.jpg", "yt": "c-cegMyW5QM", "cat": "肉類", "ing": "豆乾、雞腿肉、洋蔥、青蔥、蒜頭、辣椒、醬油膏 適量、米酒 少許、鹽 少許", "steps": ["雞腿肉切絲備用。", "熱鍋加油，放入豆乾煸香至表面微焦。", "加入蒜末、辣椒與洋蔥炒香。", "下雞腿肉拌炒，加入醬油膏與少許米酒調味。", "蓋上鍋蓋稍微燜煮，讓豆乾吸收味道。", "開蓋試味，補一點鹽和醬油膏，因為豆乾比較難入味。", "起鍋前撒上青蔥拌勻即完成。"], "tip": "安媽說豆乾入味比較難，要先煸香再燜煮，最後補一點醬油膏讓味道吃進去；一樣煮熟透冷凍保存，複熱透了帶便當才安心。", "long": "", "wide": true, "desc": "豆乾煸得香、雞腿肉嫩，鹹香下飯的便當常備菜", "chapters": [{"s": 551, "t": "09:11", "label": "材料介紹"}, {"s": 569, "t": "09:29", "label": "雞腿切絲"}, {"s": 647, "t": "10:47", "label": "熱鍋煸豆乾"}, {"s": 665, "t": "11:05", "label": "下雞腿調味"}, {"s": 692, "t": "11:32", "label": "加鹽入味"}], "views": 371489, "zones": ["高蛋白"]}, {"name": "滷牛筋", "img": "VID-53.jpg", "yt": "Q_kRzGiL6NU", "cat": "肉類", "ing": "牛筋 3斤、蔥、薑片、洋蔥、花椒、蒜頭、米酒 適量、豆瓣醬 適量、醬油 3湯匙、醬油膏 少許、昆布粉 適量、油 適量", "steps": ["牛筋約三斤，先與蔥、薑片、花椒和米酒一起汆燙去腥，燙好後切段，鍋子才放得下。", "熱鍋加油，下薑、蔥、洋蔥爆香，再下蒜頭，香氣出來後下豆瓣醬。", "加入約三湯匙醬油（安媽用的小湯匙約10cc）和一點醬油膏，讓醬香滾出來；醬油膏本身有甜味，安媽拿它當糖用，不另加冰糖。", "牛筋下鍋翻拌，先沾裹醬料，再倒入米酒，醬汁才會多。", "加入昆布粉，湯頭會更鮮甜。", "要蓋鍋蓋前一定要先把瓦斯關掉再蓋，不然米酒的火會竄上來，安媽曾被燒到頭髮眉毛。", "用快鍋（壓力鍋）燜煮縮短時間；開蓋後筷子插得進去就完成，若想更軟可開蓋再續煮，上桌前撒蔥花、拌點辣椒更香。"], "tip": "下米酒後蓋鍋蓋前一定要先關瓦斯，避免火竄上來。滷好吃不完可以冷凍，要吃的時候蒸熱就好。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "滷得軟Q入味的牛筋，年菜滷味首選，越嚼越香。", "chapters": [], "views": 7400, "zones": ["澎湃"]}, {"name": "滷牛腱", "img": "VID-54.jpg", "yt": "kqb03O54VkM", "cat": "肉類", "ing": "牛腱、蒜頭、蔥、豆瓣醬 適量、醬油 適量、米酒 適量、胡椒粉 適量、油 適量", "steps": ["汆燙好的牛腱先用叉子搓一搓刺破表面，比較好入味。", "加少許醬油和一點米酒，提早醃漬一下。", "熱鍋加油，爆香蒜頭和蔥，再下豆瓣醬；安媽沒有加八角之類的香料，作法和滷牛筋一樣。", "放入醃好的牛腱，轉小火稍微煎一下更入味。", "加入醬油和胡椒粉，並把醃漬的醬汁和米酒倒進來。", "小火燉滷約40分鐘即完成，滷好可切片包著生菜吃。"], "tip": "過年期間可以先滷好冷凍保存，要吃時加熱切片就能上桌，包著生菜吃也很方便。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "先滷起來冷凍備著，切片就能上桌的高蛋白年菜。", "chapters": [], "views": 2000, "zones": ["澎湃", "高蛋白"]}, {"name": "香辣牛肚", "img": "VID-55.jpg", "yt": "4c2vV5JX3TY", "cat": "肉類", "ing": "牛肚、洋蔥、薑、花椒、蒜末、香菜、紅辣椒、辣油 適量、醬油膏 少許、鹽 少許、烏醋 適量", "steps": ["牛肚先汆燙很久，把腥味去掉。", "鍋中放洋蔥和薑就好，可以加一點花椒煸出香氣，再加少許醬油膏和一點鹽巴，倒入很多的水。", "放入牛肚滷煮一個多小時；不用滷太鹹，因為之後還要再拌味。", "軟硬度自己調整：用筷子戳戳看，戳得下去就可以，喜歡更軟就再煮一下。", "滷汁腥味較重，直接倒掉不要留用。", "滷好的牛肚斜切成片，此時已稍微有味道。", "加入蒜末、醬油膏、烏醋、香菜、辣油和紅辣椒絲拌勻，香辣牛肚就完成了。"], "tip": "牛肚的滷水腥味比較重，滷完直接倒掉不要用。滷的時候不要太鹹，味道留給最後的拌料。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "滷透再拌蒜末烏醋香菜，香辣開胃的涮嘴前菜。", "chapters": [], "views": 732, "zones": []}, {"name": "滷鮑魚", "img": "VID-56.jpg", "yt": "5p5HVoO2gwA", "cat": "海鮮魚類", "ing": "鮑魚、蒜頭、薑、蔥白、辣椒、醬油 3湯匙、醬油膏 2湯匙、烏醋 少許、米酒 適量、白胡椒 少許、昆布粉 適量", "steps": ["鮑魚買回來一定要清洗，用不要的牙刷把表面刷乾淨（安媽買了8顆智利鮑魚，其中4顆另外拿去燉雞湯）。", "用肉槌拍打鮑魚，把組織拍斷拍軟、拍成鮑魚片狀；較硬的部位可以用力敲，軟的部位輕輕拍就好。", "拍好的鮑魚先汆燙一下，燙的水不要。", "熱鍋爆香蒜頭、薑，蔥白水分較多先下，辣椒不加也可以。", "轉小火，加入三湯匙醬油和兩湯匙醬油膏，再加一點烏醋提香；下醬油時火要關小，醬香才不會燒苦。", "放入鮑魚翻拌，先讓它沾滿醬汁，再倒入米酒；覺得味道淡可以再補一點醬油。", "加入一點白胡椒和昆布粉，蓋上鍋蓋滷約半小時即完成。"], "tip": "下醬油的時候火要關小，醬香才不會燒苦。鮑魚先用肉槌拍過再滷，組織斷了口感才軟。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "醬香油亮的滷鮑魚，年菜桌上最有面子的一道。", "chapters": [], "views": 814, "zones": ["澎湃"]}, {"name": "鮑魚蛤蜊雞湯", "img": "VID-57.jpg", "yt": "ojVnmL2n8nw", "cat": "湯品", "ing": "全雞 1隻、鮑魚 4顆、蛤蜊、薑、金華火腿、青菜、鹽 適量、米酒 適量", "steps": ["全雞先把雞胸肉取下另外用，因為雞胸不耐久煮、容易柴。", "雞肉汆燙一下，並把多餘的油脂整理掉，湯頭會比較清澈。", "水滾後放入薑去腥，加金華火腿提鮮，再把整隻雞放進來燉煮。", "放入4顆拍軟、汆燙過的鮑魚一起燉，湯頭會有濃濃鮑魚味，安媽稱它鮑魚雞湯。", "雞煮好就先撈起來，不要燉太久，肉才不會柴；接著加鹽調味。", "放入蛤蜊煮至開口，湯更鮮甜；起鍋前加一點米酒，也可以加些青菜。"], "tip": "雞胸肉先拿掉不久煮，肉才不會柴。這鍋湯還可以拿來汆燙干貝，不用調味就很鮮。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "加了蛤蜊更鮮甜的清燉雞湯，湯頭清澈又清甜。", "chapters": [], "views": 2300, "zones": ["澎湃"]}, {"name": "烤豬小排", "img": "VID-58.jpg", "yt": "Y0v08QAIrkI", "cat": "肉類", "ing": "豬小排、蒜頭、醬油 適量、醬油膏 適量", "steps": ["豬小排先把多餘的油脂剪掉。", "用蒜頭、醬油和醬油膏醃漬入味；醬油膏當糖用，安媽習慣不放太多調味料。", "送進烤箱，以200度先烤15分鐘。", "翻面後溫度調高一點，再烤15分鐘。", "最後這一面再烤5分鐘上色即完成。"], "tip": "油脂先剪掉再烤，吃起來比較不油膩。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "剪去多餘油脂再烤，外香裡嫩的蒜香烤豬小排。", "chapters": [], "views": 789, "zones": ["新手", "懶人"]}, {"name": "蔥香煎蝦仁", "img": "VID-59.jpg", "yt": "4efjYp0lxLI", "cat": "海鮮魚類", "ing": "蝦仁、蛋白、蔥、昆布粉 適量、鹽 少許、白胡椒 少許、米酒 少許、油 1湯匙", "steps": ["蝦仁加入蛋白抓醃，口感會比較脆。", "加昆布粉增加鮮甜味，昆布粉不太鹹，鹽只要加一點點就好。", "再加一點點白胡椒提味，倒一點米酒去腥，用手抓勻醃一下。", "熱鍋放一湯匙油，下蝦仁煎到變色捲起就好，速度很快。", "起鍋前加入蔥段拌一拌即完成。"], "tip": "昆布粉本身有鹹鮮味，加了就不用放太多鹽。選好的食材就不需要太多調味料。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "蛋白抓醃的脆口蝦仁，快煎幾分鐘就香噴噴上桌。", "chapters": [], "views": 2800, "zones": ["新手", "高蛋白"]}, {"name": "烤花枝", "img": "VID-60.jpg", "yt": "JKW2WuBL7Rc", "cat": "海鮮魚類", "ing": "花枝 1尾、薑、鹽 適量、昆布粉 適量、油 少許", "steps": ["花枝整尾不切，準備用烤的，不需要過多調味料。", "頭部攤開，嘴巴可以拿出來。", "抹上鹽和薑醃一下；海鮮用薑去腥最合，糖則用昆布粉取代，昆布跟海鮮很搭。", "再加一點油，烤起來表面才不會太乾。", "整尾送去烤到熟即可，就像炭烤魷魚一樣香；頭部比較厚，要烤久一點。"], "tip": "昆布跟海鮮很合，用昆布粉調味很方便；花枝頭部比較厚、熟得慢，可以多烤一下。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "整尾烤的花枝，簡單調味就像炭烤魷魚般涮嘴。", "chapters": [], "views": 1300, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "水煮香嫩豬心", "img": "VID-61.jpg", "yt": "E_SdGaaKdwo", "cat": "肉類", "ing": "豬心、鹽巴適量", "steps": ["豬心內部的血水一定要挖乾淨，可以剖開比較好處理，並把管膜剪掉。", "豬心冷水下鍋，水裡加一點鹽巴一起煮。", "煮大約20分鐘，用筷子插入檢查有沒有熟透。", "煮好後不要馬上撈起來，讓豬心繼續泡在湯裡，要吃之前再撈起來。"], "tip": "豬心先撈起來會乾掉不好吃，泡在湯裡到上桌前再撈，才能保持軟嫩。", "long": "", "wide": false, "desc": "冷水慢煮二十分鐘，豬心軟嫩不乾柴的家常滋味。", "chapters": [], "views": 5600, "zones": ["新手", "高蛋白"]}, {"name": "洋蔥醬雞胸肉", "img": "VID-62.jpg", "yt": "jF1SjrSCZH4", "cat": "肉類", "ing": "雞胸肉、洋蔥、雞蛋、胡椒 少許、醬油 適量、鹽巴 少許、油 適量", "steps": ["雞胸肉切薄片，用蛋白、蛋黃、胡椒和少許鹽巴抓醃，醃久一點口感會更嫩。", "洋蔥下鍋，炒到變色。", "加入醬油，持續翻炒讓洋蔥出甜味，完成後盛盤備用。", "熱鍋加適量的油，把雞胸肉薄片下鍋煎，切薄片很快就熟。", "煎好的雞胸肉搭配洋蔥醬一起吃。"], "tip": "雞胸肉切薄片比較快熟，鹽巴不要加太多，洋蔥醬本身炒出來就有甜味。", "long": "", "wide": false, "desc": "洋蔥炒出自然甜做醬，配嫩煎雞胸片，高蛋白低負擔。", "chapters": [], "views": 2100, "zones": ["新手", "高蛋白"]}, {"name": "毛豆碎煎嫩蝦", "img": "VID-63.jpg", "yt": "cHJ6YVvNUSU", "cat": "海鮮魚類", "ing": "蝦仁、毛豆、雞蛋、味醂 適量、米酒 適量、鹽巴 少許、黑胡椒 少許、油 少許", "steps": ["蝦仁用蛋白、蛋黃、味醂、米酒和一點點鹽巴抓醃，去腥又能讓口感更嫩。", "毛豆買回來先煮熟，加鹽巴。", "煮熟的毛豆再下鍋炒，加鹽巴和黑胡椒調味。", "炒好的毛豆加一點油打成泥，油不要放太多。", "熱鍋煎蝦仁，煎一下之後關火燜熟即可。", "蝦仁盛盤，沾著毛豆泥一起吃。"], "tip": "蝦仁是蛋白質很容易熟，關火用餘溫燜熟就好，才不會老。", "long": "", "wide": false, "desc": "嫩煎蝦仁沾自製毛豆泥，高蛋白又清爽的年菜組合。", "chapters": [], "views": 1300, "zones": ["高蛋白"]}, {"name": "手工香滷透抽", "img": "VID-64.jpg", "yt": "P8LYAIRXcfU", "cat": "海鮮魚類", "ing": "軟絲（透抽）、薑、辣椒、醬油膏適量、米酒適量", "steps": ["軟絲先切花刀讓它展開，遇熱才比較不會縮起來，成品也比較美。", "鍋中先爆香薑和辣椒。", "加入醬油膏和米酒，小火煮出醬香氣。", "軟絲下鍋滷，兩面翻一下讓它均勻裹上醬香。", "蓋上蓋子小火燜一下就完成了。"], "tip": "軟絲遇熱會Q縮，下鍋前一定要先切花刀展開，賣相才漂亮。", "long": "", "wide": false, "desc": "薑香醬油膏小火慢滷，軟絲Q彈入味的手工年菜。", "chapters": [], "views": 1300, "zones": ["高蛋白"]}, {"name": "豆皮佐大頭菜", "img": "VID-65.jpg", "yt": "OlqJtbuvOXk", "cat": "豆蛋", "ing": "豆皮、大頭菜、辣椒、鹽巴適量、味醂適量、油適量", "steps": ["豆皮撐開備用，等一下要用來捲。", "豆皮用鹽巴和味醂稍微醃一下，比較有味道。", "熱鍋加油，把豆皮下鍋煎香。", "大頭菜切細，用鹽巴抓一抓，再用乾淨的布或盤子壓一壓去水，晾乾。", "下鍋炒辣椒和大頭菜，再加一點鹽巴調味。", "用煎好的豆皮捲上大頭菜就完成。"], "tip": "大頭菜用鹽巴抓過再壓乾水分，吃起來才會爽脆。", "long": "", "wide": false, "desc": "煎香豆皮捲上爽脆大頭菜，植物蛋白加膳食纖維。", "chapters": [], "views": 1900, "zones": []}, {"name": "松露香煎干貝", "img": "VID-66.jpg", "yt": "J0a2oZxJCG0", "cat": "海鮮魚類", "ing": "干貝、松露醬、油適量", "steps": ["干貝退冰後一定要擦乾，有水氣就沒辦法煎得恰恰又漂亮。", "熱鍋加油，油量可以自己調整，油多一點會比較香。", "干貝下鍋煎到表面恰恰上色，生食等級的干貝不要煎太久。", "起鍋後在上面點上松露醬就完成。"], "tip": "重點就是干貝一定要擦乾再下鍋，才能煎出漂亮的焦香表面。", "long": "", "wide": false, "desc": "干貝擦乾煎出焦香恰恰，點上松露醬的簡單華麗菜。", "chapters": [], "views": 1200, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "安媽醬滷牛腱", "img": "VID-67.jpg", "yt": "oxVKZQChpOo", "cat": "肉類", "ing": "牛腱、洋蔥、薑、蒜頭、辣椒、豆瓣醬適量、醬油3湯匙（10cc小湯匙）、醬油膏適量、米酒適量、胡椒粉少許、昆布粉少許、油適量", "steps": ["牛腱先汆燙去腥（安媽汆燙牛肉時會加蔥、薑片、花椒和米酒一起燙），燙好備用。", "滷之前用叉子把牛腱整顆搓刺幾下，把表面刺破比較好入味，再淋一點醬油和米酒提早醃一下。", "熱鍋加油，先爆香洋蔥、薑、蒜頭和辣椒，炒出香氣。", "轉小火加入豆瓣醬，豆瓣醬一定要用油炒過才香。", "加入約3湯匙醬油（安媽用的是10cc的小湯匙）和一點醬油膏拌炒，讓醬香滾出來；醬油膏本身就有甜味，可以當糖用，不必再加冰糖。", "醃好的牛腱下鍋稍微煎一下，讓表面上色更入味。", "加米酒不加水，可以再加一點昆布粉讓湯汁更鮮甜，轉小火慢滷約40分鐘到入味，豆瓣醬會讓湯汁更綿密濃郁。"], "tip": "豆瓣醬務必用油炒過、醬油要炒出醬香，全程用米酒不加水，滷汁才香濃；下過米酒後要蓋鍋蓋前，一定要先把火關掉再蓋，避免酒精燒起來。", "long": "https://youtu.be/lmRIEMsevH0", "wide": false, "desc": "豆瓣醬香配純米酒慢滷，牛腱入味、湯汁濃郁下飯。", "chapters": [], "views": 2800, "zones": ["澎湃", "高蛋白"]}, {"name": "捲捲蔬菜鍋", "img": "VID-68.jpg", "yt": "6SeYjYs2990", "cat": "湯品", "ing": "山東大白菜1顆、豆皮、高麗菜、各色火鍋蔬菜、薑、麻油適量、高湯適量、鹽適量", "steps": ["山東大白菜頭部削掉，葉子就能一片一片剝下來，不用整顆下鍋。", "白菜葉下鍋汆燙，頭（梗）朝下先燙，因為梗比較厚，稍微燙熟就好。", "燙好的白菜葉放進冰水冰鎮一下，口感才會脆。", "用白菜葉把各色蔬菜包起來捲好，切對半；也可以改用豆皮捲，顏色和食材自己搭配。", "熱鍋下一點麻油煸薑做湯底，火不要太大，因為麻油很怕高溫。", "鍋底鋪上高麗菜，先稍微炒一下，等一下煮了會沉下去。", "把捲捲蔬菜切面朝上排進鍋裡，加入高湯。", "一定要加鹽巴調味，蓋上鍋蓋煮到蔬菜熟軟即可。"], "tip": "白菜燙好要冰鎮才脆口；捲料顏色可以自己搭配；因為都是蔬菜湯底一定要加鹽巴才夠味；蔬菜捲沾一點芝麻醬吃更好吃。", "long": "https://youtu.be/MOHYhvQJcQ0", "wide": false, "desc": "白菜豆皮捲起繽紛蔬菜，麻油煸薑湯底暖呼呼上桌。", "chapters": [], "views": 1700, "zones": ["澎湃"]}, {"name": "杏鮑菇干貝", "img": "VID-69.jpg", "yt": "pW8nbxg4DOo", "cat": "蔬菜", "ing": "大根杏鮑菇、薑、辣椒、香菜或九層塔、胡椒粉少許、香菇素蠔油適量、醬油膏適量、鹽少許、油適量", "steps": ["大根杏鮑菇切成三等份（干貝也有分2L、2S等尺寸，切大切小都行）。", "每塊表面切直刀、橫刀的十字花刀，口感才會像干貝。", "乾鍋不放油，先把杏鮑菇下鍋乾炒，把菇味炒到不見，煎到表面焦焦的。", "加一點點鹽巴讓它先吸收鹹味，這樣等一下香菇素蠔油就不用加那麼多。", "加一點油，把杏鮑菇煎得更香。", "下薑片煎香，再加辣椒（不敢吃辣可以不加）。", "加一點點醬油膏（香菇素蠔油）拌炒讓味道吃進去，即可起鍋；可搭配香菜或九層塔、撒點胡椒粉。"], "tip": "先用乾鍋乾炒把菇味炒掉、煎到焦焦再加油煎會更香；中途先加一點鹽入味，素蠔油就可以少放；吃素不用蒜，改用薑增香。", "long": "https://youtu.be/MOHYhvQJcQ0", "wide": false, "desc": "杏鮑菇切花刀乾煎出干貝口感，素蠔油提味超下飯。", "chapters": [], "views": 1400, "zones": []}, {"name": "福袋", "img": "VID-70.jpg", "yt": "dCN1U5NoOf0", "cat": "蔬菜", "ing": "高麗菜（取大片葉子）、薑、香菇、豆乾、豆皮、素肚、蒟蒻麵、豆芽菜、紅蘿蔔、香菜梗、玉米、鹽適量、胡椒粉少許", "steps": ["挑大片的高麗菜葉汆燙一下，不用燙太熟，燙好放進加了冰塊的冷水冰鎮，才會脆口不易破。", "起鍋炒內餡：下薑增加香氣，香菇先下鍋煸香。", "豆乾（選沒染色的）也煸香，再放豆皮、素肚炒香。", "加入切碎的蒟蒻麵增加QQ口感，再下豆芽菜增加脆口。", "先下鹽巴，再加紅蘿蔔拌炒；味道不要調太重，因為等一下要沾玉米醬，最後加一點胡椒粉。", "香菜梗汆燙軟當繩子；高麗菜葉較硬的梗稍微修掉比較好包。", "用高麗菜葉把餡料包進來，以香菜梗綁成福袋；直接吃就可以，再蒸一下會更軟。", "玉米煮熟後打成泥，下鍋炒並加一點鹽巴做成玉米醬，鋪底或沾福袋吃。"], "tip": "高麗菜不用燙太熟、燙完冰鎮才脆又好包；餡料調味要淡一點，靠玉米醬補味；餡料五色俱全（綠紅黑白黃），象徵各種植化素福氣滿滿。", "long": "https://youtu.be/MOHYhvQJcQ0", "wide": false, "desc": "高麗菜包滿餡料綁成福袋，配玉米醬象徵福氣滿滿。", "chapters": [], "views": 1100, "zones": ["澎湃"]}, {"name": "花菇鮑魚", "img": "VID-71.jpg", "yt": "rXpXjeMwL08", "cat": "蔬菜", "ing": "新鮮大朵花菇、粉適量、香菇素蠔油適量、油適量、胡椒少許", "steps": ["花菇去梗處理乾淨（梗不要丟，可以留著熬湯）。", "用水汆燙花菇，燙完泡冷水洗一下，稍微把水分擠乾。", "在菇面切直刀、橫刀的花刀，外型和口感才像鮑魚。", "花菇裹粉：不用整顆裹滿，重點裹在切面邊邊就好，油炸時邊邊才會酥，整顆裹粉會太多。", "熱鍋加油，下鍋炸到酥脆（這道一定要用炸的，用炒的就不像）。", "起鍋撒一點胡椒即完成，吃的時候直接沾香菇素蠔油。"], "tip": "要買新鮮大朵的花菇才漂亮；汆燙後泡冷水、擠乾水分再裹粉；這道是全桌熱量最高但最好吃的一道，粉只裹邊邊可以少吃點粉。", "long": "https://youtu.be/MOHYhvQJcQ0", "wide": false, "desc": "花菇切花刀裹粉酥炸，口感神似鮑魚的素食年菜。", "chapters": [], "views": 917, "zones": []}, {"name": "豆皮壽司", "img": "VID-72.jpg", "yt": "D2Kd__7B6DA", "cat": "豆蛋", "ing": "豆皮、雞蛋、嫩豆腐、毛豆、鹽適量、胡椒粉少許、油適量", "steps": ["毛豆先打碎備用。", "熱鍋下油（安媽直接用剛炸素干貝的油），把雞蛋和嫩豆腐下鍋炒散、炒得乾一點，炒起來像蛋炒飯的料。", "加鹽巴調味。", "毛豆最後下鍋，稍微拌炒滾一下就好，太早下去炒會變色。", "撒一點胡椒粉拌勻，餡料完成。", "把炒好的餡料包進豆皮裡，稍微蒸一下更好，不蒸直接吃也可以。"], "tip": "毛豆太早下鍋炒會變色，一定要最後下、稍微拌炒就好；豆腐選嫩豆腐比較好吃；用炸過素干貝的油炒餡更香也不浪費。", "long": "https://youtu.be/MOHYhvQJcQ0", "wide": false, "desc": "豆皮包進雞蛋豆腐毛豆餡，蛋白質滿滿的一口料理。", "chapters": [], "views": 1300, "zones": ["高蛋白"]}, {"name": "毛豆凍", "img": "VID-73.jpg", "yt": "Z7WAenp7WA4", "cat": "豆蛋", "ing": "毛豆130克、吉利T 35克、水600cc、鹽少許", "steps": ["毛豆先煮熟，打成泥備用。", "毛豆泥下鍋炒香，讓水分蒸發一些，口感會更紮實，並加一點鹽調味。", "吉利T 35克搭配600cc的水，水滾後下吉利T，煮到透明、沒有顆粒。", "把毛豆泥加進吉利T液中拌勻，倒入容器。", "先放涼，再進冷藏冰到凝固定型即可。"], "tip": "吉利T要煮到完全透明、沒有顆粒，成品才會漂亮；35克配600cc的比例做出來偏硬、比較好切。", "long": "", "wide": false, "desc": "毛豆打成泥做成凍，高蛋白又清爽的年菜冷盤。", "chapters": [], "views": 1000, "zones": []}, {"name": "皮蛋肉燥", "img": "VID-74.jpg", "yt": "E1Xj8wa9kXI", "cat": "豆蛋", "ing": "無染色豆乾、皮蛋6顆、馬鈴薯、醬油1湯匙、醬油膏適量、辣椒、黑胡椒粉少許、鹽少許、油適量、九層塔", "steps": ["熱鍋加油爆香，先煸無染色豆乾，加一點點鹽讓它入味。", "另起一鍋，馬鈴薯也用油煸過，兩鍋都煸好後混在一起拌炒。", "下皮蛋（一盒剛好六顆），炒出一點濕潤感。", "加醬油一湯匙和醬油膏，再加辣椒、黑胡椒粉調味。", "起鍋前加九層塔拌一下，再補一點點油，成品更油亮好吃。"], "tip": "趕時間可以用兩個鍋同時煸豆乾和馬鈴薯（豆乾選無染色的）；起鍋前補一點油，肉燥才會亮。安媽說有辣比較好吃。", "long": "", "wide": false, "desc": "豆乾煸香配上皮蛋，鹹香夠味的蔬食肉燥好下飯。", "chapters": [], "views": 1100, "zones": ["新手"]}, {"name": "麵腸排骨肉", "img": "VID-75.jpg", "yt": "yd6RJ0xpAXk", "cat": "豆蛋", "ing": "麵腸、青椒、香菜、九層塔、薑末、醬油 適量、醬油膏 適量、味醂 適量、胡椒 少許、鹽巴 少許、高湯 適量、油 少許", "steps": ["麵腸對切後用手撕開，加醬油、醬油膏、味醂、胡椒、薑末和水抓醃，至少醃30分鐘。", "醃好的麵腸放進氣炸鍋，稍微撐開、抓一點油，220度先烤15分鐘。", "上色不夠的話再烤10分鐘，烤到外皮帶點乾香的感覺。", "另起鍋切一點青椒配色拌炒，加黑胡椒、鹽巴、醬油膏和高湯調成醬汁。", "烤好的麵腸下鍋裹上醬汁，盛盤搭配香菜和九層塔即完成。"], "tip": "麵腸要先撕開才容易入味，至少醃30分鐘；氣炸前撐開、抓一點油，口感更像排骨。", "long": "", "wide": false, "desc": "麵腸醃過氣炸再裹黑胡椒醬汁，口感像極排骨。", "chapters": [], "views": 1100, "zones": []}, {"name": "蔬菜湯", "img": "VID-76.jpg", "yt": "mIJ5ZEOeYYE", "cat": "湯品", "ing": "白蘿蔔、紅蘿蔔、豆皮切片、香菇、猴頭菇2塊、味噌適量、昆布粉適量、糖少許", "steps": ["水開後先下紅蘿蔔和白蘿蔔，這兩樣耐煮要先煮。", "香菇先煸到微微焦香再下鍋，可以增加湯的香氣。", "湯料差不多熟了，加入切片豆皮和兩塊猴頭菇。", "取部分白蘿蔔打成蘿蔔泥，加回湯裡讓湯頭更濃郁。", "最後才放味噌，再用昆布粉和糖調整味道即可。"], "tip": "味噌最後才放，香氣才不會煮掉；香菇煸過再煮，湯頭更香。做特製蔬食版雞腿剩下的甘蔗段也可以放進湯裡，湯頭更清甜。", "long": "", "wide": false, "desc": "紅白蘿蔔加味噌昆布粉，湯頭清甜爽口的蔬菜湯。", "chapters": [], "views": 857, "zones": ["新手"]}, {"name": "滷豆皮", "img": "VID-77.jpg", "yt": "2x3lCjpKw-k", "cat": "豆蛋", "ing": "豆皮、薑、昆布、醬油適量、高湯或水適量、油少許", "steps": ["豆皮買回來先改刀，切成適口大小。", "熱鍋加油，把豆皮表皮稍微煎香，滷起來比較不會爛糊。", "火不能太大，豆皮本身油脂多，一下就容易焦。", "加一點薑，下醬油後轉小火，先加高湯把味道煮出來。", "味道起來後再補湯或水，就可以開大火滷。", "最後加入昆布一起滷，入味後起鍋。"], "tip": "醬油下鍋先小火煮出香氣，不要太早加水，味道才起得來；昆布是安媽的秘密武器。", "long": "", "wide": false, "desc": "豆皮先煎香再滷，加昆布提鮮，簡單下飯的家常味。", "chapters": [], "views": 1200, "zones": []}, {"name": "天貝吐司", "img": "VID-78.jpg", "yt": "Bct5YJ3Xa9w", "cat": "豆蛋", "ing": "天貝、櫛瓜、番茄、雞蛋、酸黃瓜、酪梨、橄欖油少許、鹽巴少許、黑胡椒少許、昆布粉 適量", "steps": ["天貝先煎到香，加一點點鹽巴，讓外皮上色入味。", "櫛瓜用刷子刷上少許油、加一點鹽巴，烤一下。", "煎一顆蛋，撒一點昆布粉提味，備用。", "酪梨壓成泥，加橄欖油、鹽巴、黑胡椒調成酪梨醬。", "以天貝當吐司底，依序疊上櫛瓜、番茄、雞蛋、酸黃瓜，最後放上酪梨醬即完成。"], "tip": "天貝要先煎香上色，當底才夠味、有口感。", "long": "", "wide": false, "desc": "用天貝取代吐司，疊上蔬菜和酪梨醬的開放式吃法。", "chapters": [], "views": 651, "zones": ["新手", "高蛋白"]}, {"name": "特製蔬食版雞腿", "img": "VID-79.jpg", "yt": "9Ph1sOStfJU", "cat": "豆蛋", "ing": "豆皮、麵腸、豆乾、金針菇、香菜、白飯、甘蔗段（當雞骨）、太白粉 適量、鹽巴 少許、昆布粉 適量、油 少許", "steps": ["先做內餡：麵腸先煸香，和豆乾一起加鹽巴、昆布粉和一點油拌料。", "金針菇煸過後，和其他餡料一起拌勻。", "加一點香菜，再加入白飯拌勻，飯是黏性的來源，一定要加。", "餡料整形時撒上太白粉幫助定型。", "把甘蔗段當雞骨插入，外層用豆皮包起來塑成雞腿形狀。", "放進氣炸鍋烤約20分鐘，15分鐘時可先開來確認上色狀況。"], "tip": "餡料一定要加飯才有黏性，不然包不起來；用氣炸取代油炸，用油量少很多。", "long": "", "wide": false, "desc": "金針菇豆乾餡包進豆皮氣炸，造型逼真的蔬食雞腿。", "chapters": [], "views": 681, "zones": ["澎湃"]}, {"name": "素肚蒸蛋", "img": "VID-80.jpg", "yt": "JYyOhgJ_WBU", "cat": "豆蛋", "ing": "素肚、雞蛋、紅蘿蔔絲、醬油膏 適量、昆布粉 適量、鹽巴 少許", "steps": ["素肚先用一點醬油膏稍微醃漬一下。", "醃好的素肚送進氣炸鍋氣炸，比油炸省下很多油。", "蒸蛋部分把蛋液打勻，加一點點紅蘿蔔絲、昆布粉和鹽巴。", "下鍋蒸約10分鐘，做成口感偏硬實的蒸蛋。", "素肚氣炸好可以再沾醬，和蒸蛋一起上桌。"], "tip": "蒸蛋刻意做硬一點，比較好切好夾；素肚用氣炸取代油炸更省油。", "long": "", "wide": false, "desc": "素肚氣炸免油炸，搭配昆布粉蒸蛋，一次做兩樣。", "chapters": [], "views": 759, "zones": ["新手", "懶人", "高蛋白"]}, {"name": "豆皮水餃", "img": "VID-81.jpg", "yt": "SQcovlkyPGE", "cat": "豆蛋", "ing": "豆皮、高麗菜、大頭菜、紅蘿蔔、天貝、雞蛋、薑末、味噌 少許、胡椒 少許、鹽 少許、醬油膏 適量、昆布粉 適量", "steps": ["高麗菜先用鹽抓醃出水，擠乾備用。", "大頭菜、紅蘿蔔切好，和高麗菜一起當餡料蔬菜。", "下薑末和天貝拌炒，加一點點味噌炒出香氣。", "紅蘿蔔下鍋一起炒，加胡椒、一點鹽、醬油膏和昆布粉調味提鮮。", "蛋煎好切成絲，一起加進餡料裡拌勻。", "炒好的餡料包進豆皮裡，用牙籤固定封口。", "下鍋香煎到表面金黃、帶點微焦即可起鍋。"], "tip": "高麗菜一定要先用鹽抓醃出水；煎到帶點焦香會更香。", "long": "", "wide": false, "desc": "豆皮當餃子皮包蔬菜天貝餡，香煎出金黃焦香。", "chapters": [], "views": 799, "zones": []}, {"name": "醬香蒸全雞", "img": "VID-82.jpg", "yt": "3_SyYGaRzrQ", "cat": "肉類", "ing": "全雞1隻、蔥、薑片、洋蔥、醬油3湯匙、醬油膏2湯匙、米酒2湯匙、糖少許、胡椒粉少許、鹽少許", "steps": ["全雞內外洗乾淨，用鹽巴按摩雞身，讓肉質更軟嫩。", "以熱水淋燙雞皮讓表皮收縮，再放入冰塊水冰鎮，雞皮更Q。", "調醬：醬油3湯匙、醬油膏2湯匙、糖與胡椒粉少許、米酒2湯匙拌勻。", "醬料抹遍雞身內外，蔥、薑片與捏碎的洋蔥塞入雞肚，稍微醃一下入味。", "盤底鋪薑片放上全雞，移入電鍋，外鍋約三碗水蒸熟。", "開蓋確認沒有血水滲出即熟，再蓋回悶一下就完成。"], "tip": "燙皮後馬上冰鎮是雞皮Q彈的關鍵；喜歡八角可自行加入，安媽習慣不放。", "long": "", "wide": true, "desc": "電鍋就能蒸出醬香入味的全雞，年夜飯澎湃主菜。", "chapters": [{"s": 327, "t": "05:27", "label": "處理全雞"}, {"s": 377, "t": "06:17", "label": "燙皮冰鎮"}, {"s": 428, "t": "07:08", "label": "調醬抹雞"}, {"s": 825, "t": "13:45", "label": "鋪薑入電鍋"}, {"s": 1161, "t": "19:21", "label": "出爐檢查"}], "views": 154143, "zones": ["澎湃"]}, {"name": "豬肚雞湯", "img": "VID-83.jpg", "yt": "3_SyYGaRzrQ", "cat": "湯品", "ing": "全雞1隻、豬肚1個、薑片、當歸、雞骨高湯、米酒適量、鹽適量", "steps": ["豬肚洗乾淨後先汆燙煮過一次，延展性更好，才包得進整隻雞。", "將整隻雞塞入豬肚中，準備薑片、米酒與當歸。", "用雞骨熬的高湯煮滾，放入包好雞的豬肚持續燉煮。", "燉到豬肚軟爛、湯頭轉濃香後再調味。", "加鹽巴調味，當歸少量提香就好，最後加米酒即完成。"], "tip": "當歸放太多湯會變苦，少量提香就好；豬肚先煮過再包雞比較好操作。", "long": "", "wide": true, "desc": "整隻雞包進豬肚慢燉，湯頭清甜的經典圍爐湯品。", "chapters": [{"s": 770, "t": "12:50", "label": "豬肚包全雞"}, {"s": 795, "t": "13:15", "label": "加薑酒當歸"}, {"s": 812, "t": "13:32", "label": "高湯下鍋燉"}, {"s": 1119, "t": "18:39", "label": "確認軟爛"}, {"s": 1136, "t": "18:56", "label": "調味完成"}], "views": 154143, "zones": ["澎湃"]}, {"name": "蒟蒻米油飯", "img": "VID-84.jpg", "yt": "3_SyYGaRzrQ", "cat": "全穀雜糧", "ing": "蒟蒻米、白米、芋頭、金鉤蝦、乾香菇、油蔥酥、鮮蝦、醬油2湯匙、醬油膏適量、麻油少許、鹽適量、高湯", "steps": ["少量白米加蒟蒻米先煮成飯備用；熱鍋下炒過蔥頭的油，把金鉤蝦煸到香氣出來。", "加入泡開的乾香菇同炒，再下切小塊的芋頭一起煸香。", "配料炒香後，加醬油2湯匙、醬油膏與鹽巴調味拌炒。", "加入高湯，滴少許麻油增香，小火稍微燜一下。", "把炒好的配料連醬汁直接拌入蒟蒻米飯中拌勻。", "鮮蝦用蓋過蝦身的水量、小火加蓋燜約五分鐘，撈起冰鎮更Q。", "油飯裝入模型盛盤，鋪上燙好的鮮蝦即完成。"], "tip": "金鉤蝦與乾香菇一定要先煸香，油飯才夠香不生澀；麻油一點點就好，香氣才不搶味。", "long": "", "wide": true, "desc": "蒟蒻米做的清爽版油飯，蔥油香菇芋頭香氣十足。", "chapters": [{"s": 889, "t": "14:49", "label": "備料介紹"}, {"s": 901, "t": "15:01", "label": "煸香金鉤蝦"}, {"s": 945, "t": "15:45", "label": "下芋頭拌炒"}, {"s": 975, "t": "16:15", "label": "調味加高湯"}, {"s": 1045, "t": "17:25", "label": "拌入蒟蒻飯"}, {"s": 1621, "t": "27:01", "label": "裝模鋪蝦"}], "views": 154143, "zones": ["澎湃"]}, {"name": "西魯肉", "img": "VID-85.jpg", "yt": "3_SyYGaRzrQ", "cat": "蔬菜", "ing": "白菜、筍絲、蛋2顆、乾香菇、金鉤蝦、不隨意肌（瘦肉）、魚皮、紅蘿蔔、油蔥酥、鹽適量", "steps": ["起油鍋，兩顆蛋打散，蛋液從高處細細淋入熱油中，炸成金黃蛋酥撈起。", "泡開的乾香菇切一切，備妥筍絲、油蔥酥等配料。", "白菜鋪在鍋底，放上香菇、筍絲與油蔥酥。", "加入蛋酥與不隨意肌瘦肉，再放入汆燙過的魚皮。", "煮滾後加鹽調味，蓋上鍋蓋再滾煮一下讓白菜軟甜即完成。"], "tip": "蛋酥是西魯肉的靈魂，蛋液要從高處淋入熱油才會酥；魚皮先汆燙一下就會軟。", "long": "", "wide": true, "desc": "宜蘭辦桌經典，蛋酥白菜什錦燴煮，象徵團圓美滿。", "chapters": [{"s": 1192, "t": "19:52", "label": "介紹西魯肉"}, {"s": 1229, "t": "20:29", "label": "炸蛋酥"}, {"s": 1316, "t": "21:56", "label": "白菜鋪底"}, {"s": 1326, "t": "22:06", "label": "下蛋酥配料"}, {"s": 1353, "t": "22:33", "label": "調味燜煮"}], "views": 154143, "zones": ["澎湃"]}, {"name": "香菇滷蘿蔔", "img": "VID-86.jpg", "yt": "3_SyYGaRzrQ", "cat": "蔬菜", "ing": "白蘿蔔、新鮮香菇、娃娃菜、雞油、醬油適量、醬油膏適量、鹽少許", "steps": ["白蘿蔔切厚塊並把邊角修圓，滷起來更容易入味。", "鍋中放雞油與少許油，蘿蔔下鍋煎到表面恰恰上色。", "加一點鹽巴、醬油與醬油膏拌炒，讓味道巴上蘿蔔。", "放入新鮮香菇，再補一湯匙醬油膏與水，滷到入味。", "娃娃菜切一切快炒，加一點鹽與水稍微燜熟。", "滷好的蘿蔔香菇盛盤，搭配炒娃娃菜一起上桌。"], "tip": "蘿蔔邊修圓（日式關東煮做法）更入味；先煎出焦香再滷是好吃關鍵。", "long": "", "wide": true, "desc": "蘿蔔修圓邊先煎再滷，配香菇娃娃菜的好彩頭年菜。", "chapters": [{"s": 1368, "t": "22:48", "label": "蘿蔔修圓邊"}, {"s": 1408, "t": "23:28", "label": "煎蘿蔔"}, {"s": 1426, "t": "23:46", "label": "下醬油滷"}, {"s": 1455, "t": "24:15", "label": "加香菇"}, {"s": 1478, "t": "24:38", "label": "快炒娃娃菜"}], "views": 154143, "zones": []}, {"name": "香煎白鯧", "img": "VID-87.jpg", "yt": "3_SyYGaRzrQ", "cat": "海鮮魚類", "ing": "白鯧1隻(約15兩)、鹽適量、油適量", "steps": ["白鯧洗淨，先抹鹽醃入味，魚身劃刀比較快熟。", "熱鍋下油，白鯧下鍋香煎。", "耐心把兩面煎到恰恰金黃、香氣出來即可起鍋。"], "tip": "白鯧選小隻一點的比較好吃；一定要煎到表面赤香才起鍋。", "long": "", "wide": true, "desc": "過年必備的香煎白鯧，兩面赤香象徵年年有餘。", "chapters": [{"s": 1521, "t": "25:21", "label": "介紹白鯧"}, {"s": 1539, "t": "25:39", "label": "抹鹽劃刀"}, {"s": 1548, "t": "25:48", "label": "下鍋香煎"}, {"s": 1580, "t": "26:20", "label": "煎到恰恰"}], "views": 154143, "zones": ["新手", "高蛋白"]}, {"name": "天貝鬆", "img": "VID-88.jpg", "yt": "cdcOegzRj8k", "cat": "豆蛋", "ing": "鷹嘴豆天貝、黃豆天貝、乾香菇、薑、油適量、鹽適量、豆瓣醬少許", "steps": ["兩種天貝切碎，泡發的乾香菇切碎備用，香菇不必把水擠太乾。", "乾鍋不加油，先把香菇碎下鍋乾炒，讓水氣收乾、逼出菇香。", "加入一湯匙油（約10cc）與薑炒香，再下天貝碎一起煸炒。", "煸炒過程視乾度分次補少量油，天貝油量足才會有近似油炸的酥香。", "加鹽調味，起鍋前加一點豆瓣醬炒出醬香即完成。"], "tip": "乾香菇比新鮮香菇更香；全素以薑代蒜；鹽和油邊煸邊試味隨時調整。 延伸吃法：把天貝松填進蘑菇裡、放上蛋再烤熟，又是一道宴客小點。", "long": "", "wide": true, "desc": "兩種天貝切碎煸香如蝦松，過年餐桌的蔬食香鬆", "chapters": [{"s": 94, "t": "01:34", "label": "天貝切碎備料"}, {"s": 133, "t": "02:13", "label": "乾炒香菇碎"}, {"s": 152, "t": "02:32", "label": "加油炒薑"}, {"s": 183, "t": "03:03", "label": "加鹽調味"}, {"s": 202, "t": "03:22", "label": "下豆瓣醬"}], "views": 171845, "zones": ["新手", "高蛋白"]}, {"name": "火龍果彩色蛋", "img": "VID-89.jpg", "yt": "cdcOegzRj8k", "cat": "豆蛋", "ing": "水煮蛋、火龍果半顆", "steps": ["火龍果對切，取半顆刮出果肉，打成火龍果汁（一整顆會太多）。", "水煮蛋剝殼後直接放入火龍果汁中浸泡。", "泡到蛋白吃進顏色、染成粉紫紅色即可，還會帶點火龍果的微甜。", "上桌前把煸香的蛋黃加一點油打成滑順的乳化醬汁，在盤上畫盤裝飾，擺上彩色蛋呈現。"], "tip": "泡越久顏色越深；染色蛋的蛋白可拌進發財樹、蛋黃可煸成金沙醬，一蛋多用不浪費。", "long": "", "wide": true, "desc": "火龍果汁天然染色，粉紫喜氣的年節彩色蛋冷盤", "chapters": [{"s": 222, "t": "03:42", "label": "介紹蛋與火龍果"}, {"s": 254, "t": "04:14", "label": "火龍果榨汁"}, {"s": 283, "t": "04:43", "label": "泡汁染色"}, {"s": 1518, "t": "25:18", "label": "蛋黃醬畫盤"}], "views": 171845, "zones": ["新手", "高蛋白"]}, {"name": "三色蒟蒻海蜇皮", "img": "VID-90.jpg", "yt": "cdcOegzRj8k", "cat": "蔬菜", "ing": "蒟蒻麵條、大頭菜、小黃瓜、紅蘿蔔、香菜、芝麻、花生、醋 適量、鹽少許、薑黃胡椒粉少許、火龍果汁少許", "steps": ["大頭菜、小黃瓜、紅蘿蔔切絲，加少許鹽抓醃出水，再把水分擠乾保持脆口。", "蒟蒻麵條沖洗乾淨、瀝乾水分。", "蒟蒻與蔬菜絲一起泡入調好的糖醋汁拌勻入味。", "分成三份：一份原色、一份加火龍果汁染紅、一份直接加薑黃胡椒粉染黃拌勻。", "盛盤堆成三色三堆，撒上香菜、芝麻與花生增香即完成。"], "tip": "醋汁本身有糖有鹹不必再調味；蔬菜水分擠得越乾，口感越脆。", "long": "", "wide": true, "desc": "蒟蒻麵做的三色涼拌海蜇皮，酸甜爽脆的開胃冷盤", "chapters": [{"s": 302, "t": "05:02", "label": "蒟蒻麵介紹"}, {"s": 328, "t": "05:28", "label": "蔬菜切絲抓醃"}, {"s": 376, "t": "06:16", "label": "蒟蒻洗淨擠乾"}, {"s": 397, "t": "06:37", "label": "泡醋染色"}, {"s": 436, "t": "07:16", "label": "薑黃調色"}], "views": 171845, "zones": ["新手"]}, {"name": "發財樹", "img": "VID-91.jpg", "yt": "cdcOegzRj8k", "cat": "全穀雜糧", "ing": "雞蛋、鹹蛋黃、馬鈴薯、栗子南瓜、起司、小黃瓜、紅蘿蔔、油適量", "steps": ["鹹蛋黃下鍋煸乾煸香（金沙作法），加一湯匙油幫助煸出蛋黃油脂。", "染色蛋剩下的蛋白切細加入，不浪費。", "起司切碎加入，蒸熟的馬鈴薯壓碎一起拌入。", "蒸熟的栗子南瓜先把多餘水分確實擠乾再加入，以免整體太濕。", "加入擠乾水分的小黃瓜與紅蘿蔔，全部拌勻。", "把拌料堆塑成聖誕樹般的樹形，底部先做穩、層層堆高，最後用水果依自己喜好點綴裝飾即完成。"], "tip": "南瓜和小黃瓜水分務必擠乾成型才不會塌；不想煸鹹蛋黃可直接用美乃滋替代。", "long": "", "wide": true, "desc": "馬鈴薯南瓜金沙拌料堆成小樹，討喜的年節造型菜", "chapters": [{"s": 487, "t": "08:07", "label": "材料介紹"}, {"s": 523, "t": "08:43", "label": "煸鹹蛋黃"}, {"s": 590, "t": "09:50", "label": "加起司薯泥"}, {"s": 618, "t": "10:18", "label": "南瓜擠水拌入"}, {"s": 701, "t": "11:41", "label": "堆塑成樹"}], "views": 171845, "zones": ["澎湃"]}, {"name": "杏鮑菇鹹酥雞", "img": "VID-92.jpg", "yt": "cdcOegzRj8k", "cat": "蔬菜", "ing": "杏鮑菇、薑、辣椒、甜椒、紅椒、九層塔、鹽適量、黑胡椒適量、馬鈴薯粉 少許、香菇素蠔油適量、油適量", "steps": ["杏鮑菇順紋撕成絲，再拍打敲碎組織，做出雞肉般的纖維感。", "加少許鹽抓醃，撒黑胡椒，再加一點點馬鈴薯粉幫助黏合。", "把菇絲捏成一小塊一小塊，像鹹酥雞的大小。", "熱鍋加油，油溫夠後下鍋油炸至外酥內軟，起鍋前拉高油溫逼油更酥脆。", "另起鍋小火爆香薑（蔬食用薑，一般可用蒜），放回炸好的菇塊。", "加黑胡椒、甜椒、紅椒拌炒，最後下九層塔炒香即完成。"], "tip": "拍碎再捏合是仿雞肉口感的關鍵；炸完回鍋拌香料要用小火。放涼了也好吃。", "long": "", "wide": true, "desc": "杏鮑菇撕絲拍碎再油炸，口感神似鹹酥雞的蔬食炸物", "chapters": [{"s": 784, "t": "13:04", "label": "材料介紹"}, {"s": 815, "t": "13:35", "label": "撕絲拍碎"}, {"s": 863, "t": "14:23", "label": "調味加粉"}, {"s": 886, "t": "14:46", "label": "捏塊成型"}, {"s": 911, "t": "15:11", "label": "下鍋油炸"}, {"s": 995, "t": "16:35", "label": "回鍋拌香料"}], "views": 171845, "zones": []}, {"name": "蠔油香菇", "img": "VID-93.jpg", "yt": "cdcOegzRj8k", "cat": "蔬菜", "ing": "大朵香菇、薑、香菇素蠔油適量、水 適量、鹽少許、油適量、芝麻少許", "steps": ["大朵香菇先汆燙，表面刻十字花刀備用。", "香菇下鍋乾煎，加少許鹽幫助入味，讓香菇出水、煎出香氣。", "加一點油（影片中用炸杏鮑菇剩的油）與薑增香。", "倒入香菇素蠔油與水，小火滷煮讓香菇吸飽醬汁。", "收汁到醬色亮亮扒在香菇上，起鍋撒芝麻即完成。"], "tip": "香菇先煎過再滷更香；不吃辣可像影片一樣不加辣椒。", "long": "", "wide": true, "desc": "大朵香菇刻花先煎後滷，素蠔油醬香濃郁又亮眼", "chapters": [{"s": 1045, "t": "17:25", "label": "汆燙刻花介紹"}, {"s": 1060, "t": "17:40", "label": "下鍋乾煎"}, {"s": 1096, "t": "18:16", "label": "加油與薑"}, {"s": 1111, "t": "18:31", "label": "素蠔油滷煮"}, {"s": 1148, "t": "19:08", "label": "收汁撒芝麻"}], "views": 171845, "zones": ["新手"]}, {"name": "炒牛蒡", "img": "VID-94.jpg", "yt": "cdcOegzRj8k", "cat": "蔬菜", "ing": "牛蒡、辣椒、芝麻、香菇素蠔油適量、油適量、水少許", "steps": ["牛蒡切成細絲。", "熱鍋加油，小火將牛蒡絲下鍋慢慢拌炒出香氣。", "小火加入香菇素蠔油，分次慢慢加，先把醬香炒出來。", "加一點點水讓醬汁扒附在牛蒡絲上幫助入味、也讓牛蒡快熟，水不要太多。", "起鍋前加辣椒與芝麻拌勻即完成。"], "tip": "牛蒡屬澱粉較高的根莖蔬菜，吃這道可酌減飯量；醬燒太久顏色會偏深，注意火候。", "long": "", "wide": true, "desc": "牛蒡絲小火醬燒入味，香氣十足又耐吃的家常年菜", "chapters": [{"s": 1210, "t": "20:10", "label": "牛蒡切絲"}, {"s": 1222, "t": "20:22", "label": "小火下鍋炒"}, {"s": 1241, "t": "20:41", "label": "加素蠔油"}, {"s": 1264, "t": "21:04", "label": "加水扒醬"}, {"s": 1280, "t": "21:20", "label": "辣椒芝麻起鍋"}], "views": 171845, "zones": ["新手"]}, {"name": "腰果濃湯", "img": "VID-95.jpg", "yt": "cdcOegzRj8k", "cat": "湯品", "ing": "腰果、白蘿蔔、杏鮑菇、紅藜麥、薑、豆皮、水、昆布粉適量、鹽適量", "steps": ["腰果先炒香備用；杏鮑菇、白蘿蔔切丁。", "起鍋先炒薑，讓湯底更溫潤。", "下杏鮑菇丁與白蘿蔔丁拌炒出香氣，加水煮滾。", "炒香的腰果加水打成腰果漿，倒入湯中。", "加入紅藜麥同煮，期間要攪拌以免黏鍋。", "起鍋前以昆布粉、鹽調味，加些豆皮增添湯料，點綴紅綠配料即完成。"], "tip": "腰果先炒過再打漿湯頭更香；濃湯容易黏鍋底，要不時攪拌。", "long": "", "wide": true, "desc": "腰果打漿煮成溫潤濃湯，紅藜麥入湯料多順口", "chapters": [{"s": 1307, "t": "21:47", "label": "材料介紹"}, {"s": 1325, "t": "22:05", "label": "炒薑起鍋底"}, {"s": 1332, "t": "22:12", "label": "菇蘿蔔丁下鍋"}, {"s": 1358, "t": "22:38", "label": "腰果打漿"}, {"s": 1365, "t": "22:45", "label": "加紅藜麥煮"}, {"s": 1487, "t": "24:47", "label": "調味起鍋"}], "views": 171845, "zones": []}, {"name": "炸豆皮", "img": "VID-96.jpg", "yt": "cdcOegzRj8k", "cat": "豆蛋", "ing": "豆皮、雞蛋1顆、油4湯匙、辣油 少許", "steps": ["盤子上打一顆蛋，打散成蛋液。", "豆皮直接蘸裹蛋液，豆皮本身帶鹹味不必再調味。", "鍋中加約四湯匙油燒熱，下豆皮半煎炸。", "炸到外酥內軟、酥酥脆脆即可起鍋；不蘸蛋液直接炸也可以。", "可調一碗香菇素蠔油加水、淋一點辣油的蘸醬，搭配生菜一起吃。"], "tip": "油量放足豆皮才容易酥脆；蘸蛋液多一層蛋香，趕時間直接炸也行。", "long": "", "wide": true, "desc": "豆皮蘸蛋液半煎炸到金黃酥脆，簡單涮嘴的年節炸物", "chapters": [{"s": 1386, "t": "23:06", "label": "打蛋備蛋液"}, {"s": 1404, "t": "23:24", "label": "豆皮蘸蛋液"}, {"s": 1413, "t": "23:33", "label": "熱油下鍋"}, {"s": 1454, "t": "24:14", "label": "炸至外酥內軟"}, {"s": 1460, "t": "24:20", "label": "調素蠔油蘸醬"}], "views": 171845, "zones": []}, {"name": "花椰蒟蒻米炒飯", "img": "VID-97.jpg", "yt": "MOHYhvQJcQ0", "cat": "全穀雜糧", "ing": "蒟蒻米、花椰菜梗、洋蔥、雞蛋、紅蘿蔔、蔥花、橄欖油 適量、鹽適量、醬油少許、香菇素蠔油少許、胡椒粉少許", "steps": ["花椰菜梗切細丁，洋蔥、紅蘿蔔切丁，蔥花切好備用。", "熱鍋下橄欖油，油量可以稍多一點，先下蛋液炒散，蛋才會細緻。", "下洋蔥炒香，再加入花椰菜梗拌炒，菜梗很快就熟，口感脆脆甜甜。", "加入蒟蒻米，把水分炒乾一點。", "下紅蘿蔔丁，加鹽、醬油、香菇素蠔油調味拌炒均勻。", "起鍋前撒上蔥花與胡椒粉拌勻即完成；素食者可另炒一盤不加洋蔥、蔥花的版本。"], "tip": "油量稍多蛋才細緻；蒟蒻米下鍋後要炒乾一點才香。招待吃全素的親友時，另炒一盤不放洋蔥蔥花即為五辛素版本。", "long": "", "wide": true, "desc": "蒟蒻米加花椰菜梗炒飯，脆口清爽的減糖年菜主食", "chapters": [{"s": 166, "t": "02:46", "label": "菜梗備料"}, {"s": 193, "t": "03:13", "label": "熱油炒蛋"}, {"s": 214, "t": "03:34", "label": "洋蔥下鍋"}, {"s": 230, "t": "03:50", "label": "炒花椰菜梗"}, {"s": 249, "t": "04:09", "label": "下蒟蒻米"}, {"s": 264, "t": "04:24", "label": "調味起鍋"}], "views": 746907, "zones": []}, {"name": "豆皮毛豆福袋", "img": "VID-98.jpg", "yt": "MOHYhvQJcQ0", "cat": "豆蛋", "ing": "豆皮、毛豆、嫩豆腐、薑末、雞蛋、鹽適量、胡椒粉少許", "steps": ["毛豆先用調理機打碎備用。", "熱鍋加油先爆香薑末，下雞蛋與嫩豆腐炒散，把餡料炒得乾一點，質地像蛋炒飯的配料。", "加鹽調味，試一下味道。", "毛豆最後才下鍋稍微拌炒一下就好，太早下鍋顏色會變。", "起鍋前撒胡椒粉拌勻。", "用豆皮把炒好的餡料包起來成福袋狀，直接吃即可，稍微蒸一下口感更軟。"], "tip": "毛豆最後下鍋、稍微拌炒即可，太早下會變色。包好不蒸就能直接吃，想要更軟再蒸一下。 可依個人喜好沾玉米醬吃。", "long": "", "wide": true, "desc": "毛豆豆腐雞蛋炒香，豆皮一包就是福氣滿滿的年菜", "chapters": [{"s": 1046, "t": "17:26", "label": "餡料介紹"}, {"s": 1059, "t": "17:39", "label": "毛豆打碎"}, {"s": 1068, "t": "17:48", "label": "下鍋炒餡"}, {"s": 1118, "t": "18:38", "label": "拌入毛豆"}, {"s": 1136, "t": "18:56", "label": "豆皮包福袋"}], "views": 746907, "zones": ["高蛋白"]}, {"name": "蔬食佛跳牆", "img": "VID-99.jpg", "yt": "6vK58-P2cyQ", "cat": "湯品", "ing": "大白菜、娃娃菜、玉米、杏鮑菇、雞蛋、芋頭、花菇、香菇、蘑菇、豆皮、筍子、玉米筍、菱角、紅蘿蔔、蒟蒻、薑、辣椒、香菜、鹽適量、醬油膏適量、黑胡椒少許、味素 少許", "steps": ["芋頭切塊，與香菇、花菇分別下油鍋炸香，芋頭炸過才香也比較不會鬆散。", "杏鮑菇用錘子捶扁撕碎，加少許鹽讓水分釋出後擠乾，拌入雞蛋、醬油膏、鹽與黑胡椒醃漬，下鍋炸成素排骨酥。", "玉米粒熱鍋炒香後加少量水，用調理機攪碎做成玉米湯底。", "豆皮煎到酥脆、蘑菇乾炒出香氣（蘑菇不要洗），薑與辣椒煸香，筍子、蒟蒻、菱角、紅蘿蔔分別炒過，各食材分開處理才不會串味。", "取大湯鍋以大白菜鋪底，依序放入所有炸好、炒好的料，倒入玉米湯底，不夠的部分加水補足。", "開火煮滾後轉慢火，加鹽、黑胡椒與一點味素調味。", "起鍋前才放娃娃菜，煮到剛熟，最後撒香菜即完成。"], "tip": "每樣食材分開炸、炒鎖住各自風味；娃娃菜不耐煮，最後放才不會軟黃。", "long": "", "wide": true, "desc": "免中藥材，用玉米湯底堆出清甜蔬食大菜，年夜飯氣勢擔當。", "chapters": [{"s": 178, "t": "02:58", "label": "食材介紹"}, {"s": 290, "t": "04:50", "label": "炸芋頭香菇"}, {"s": 357, "t": "05:57", "label": "杏鮑菇素排骨"}, {"s": 451, "t": "07:31", "label": "炒玉米湯底"}, {"s": 630, "t": "10:30", "label": "組裝入鍋"}, {"s": 717, "t": "11:57", "label": "煮滾調味"}], "views": 103945, "zones": ["澎湃"]}, {"name": "芋頭天貝排骨", "img": "VID-100.jpg", "yt": "6vK58-P2cyQ", "cat": "豆蛋", "ing": "芋頭、天貝、紫蘇葉、鹽少許、醬油膏適量、胡椒粉少許", "steps": ["芋頭與天貝切片，下鍋用油慢慢煎香煎熟，天貝有豆味一定要煎透才香。", "煎的過程中撒少許鹽，讓比較難入味的天貝與芋頭先入底味。", "兩者煎得差不多時，加入醬油膏與胡椒粉調味。", "轉大火拌炒，讓每一片都均勻裹上醬香。", "紫蘇葉略煎過後，把芋頭疊上天貝用葉子包起來即完成；想更鬆軟可再入電鍋蒸一下。"], "tip": "天貝很吸油又有豆味，務必煎得香香的；紫蘇葉煎過香氣更足。", "long": "", "wide": true, "desc": "芋頭疊天貝煎出醬香素排骨，紫蘇葉一包年味十足。", "chapters": [{"s": 753, "t": "12:33", "label": "食材介紹"}, {"s": 763, "t": "12:43", "label": "煎芋頭天貝"}, {"s": 791, "t": "13:11", "label": "醬油膏調味"}, {"s": 823, "t": "13:43", "label": "紫蘇葉包捲"}], "views": 103945, "zones": ["新手"]}, {"name": "蘿蔔干貝", "img": "VID-101.jpg", "yt": "6vK58-P2cyQ", "cat": "蔬菜", "ing": "白蘿蔔、花菇、醬油膏適量、白胡椒少許", "steps": ["白蘿蔔切厚圓塊，兩面都切出格子刀紋做出干貝紋路；大條蘿蔔厚度不要切太厚。", "熱鍋加油、火候大一點，蘿蔔下鍋煎到兩面焦香、紋路浮現。", "加入花菇一起煎出香氣（白蘿蔔配黑花菇的黑白配）。", "加醬油膏與白胡椒，再加水淹過材料下去滷。", "滷到蘿蔔軟嫩入味後把湯汁收乾即完成。"], "tip": "兩面都切刀紋、大火煎到焦香，形狀與口感才像干貝；滷到收汁最入味。", "long": "", "wide": true, "desc": "菜頭切花刀煎滷成素干貝，配花菇黑白配，軟嫩入味。", "chapters": [{"s": 838, "t": "13:58", "label": "蘿蔔切干貝"}, {"s": 869, "t": "14:29", "label": "大火煎上色"}, {"s": 914, "t": "15:14", "label": "花菇下鍋"}, {"s": 927, "t": "15:27", "label": "調味加水滷"}, {"s": 956, "t": "15:56", "label": "收汁完成"}], "views": 103945, "zones": ["新手"]}, {"name": "起司麻糬福袋", "img": "VID-102.jpg", "yt": "6vK58-P2cyQ", "cat": "豆蛋", "ing": "豆皮、起司片、麻糬、板豆腐、雞蛋1顆、香菜梗、鹽少許、醬油膏適量", "steps": ["豆皮小心剝開成袋狀（容易破），先鋪入一片起司幫助黏著，再放一片麻糬。", "板豆腐捏碎、把水分擠掉，加少許鹽與一顆雞蛋拌勻成豆腐餡。", "把豆腐餡填入豆皮袋中，用香菜梗綁緊袋口做成福袋。", "福袋放入滾水中煮到熟透、麻糬變軟。", "起鍋沾醬油膏吃即完成。"], "tip": "起司片放最裡層能黏住易破的豆皮；水煮到麻糬軟Q最好吃，沾醬油膏最對味。", "long": "", "wide": true, "desc": "豆皮包起司麻糬與豆腐蛋餡，軟Q牽絲的討喜年菜福袋。", "chapters": [{"s": 1032, "t": "17:12", "label": "福袋食材"}, {"s": 1044, "t": "17:24", "label": "包起司麻糬"}, {"s": 1061, "t": "17:41", "label": "豆腐蛋內餡"}, {"s": 1073, "t": "17:53", "label": "香菜梗綁口"}, {"s": 1108, "t": "18:28", "label": "煎香加水煮"}], "views": 103945, "zones": []}, {"name": "蟹黃蟹肉", "img": "VID-103.jpg", "yt": "6vK58-P2cyQ", "cat": "豆蛋", "ing": "鹹蛋黃6顆、雞蛋黃6顆、蛋白、鹽少許、胡椒粉少許", "steps": ["鹹蛋黃6顆下鍋用油小火煸炒，炒到起泡冒香（金沙做法）。", "加入6顆雞蛋黃拌炒，炒出像蟹膏般的濃稠質地。", "加一點胡椒粉調味後先起鍋，這就是「蟹黃」。", "熱鍋下少許油，倒入蛋白快炒，很快熟就關火，加一點點鹽調味，即成「蟹肉」。", "蟹黃鋪在炒蛋白上即完成；蛋白清淡配鹹香蟹黃剛好不會太鹹。"], "tip": "鹹蛋黃一定要煸到冒泡才有金沙香；蛋白快炒即起，口感才嫩。", "long": "", "wide": true, "desc": "鹹蛋黃煸金沙作蟹黃，嫩炒蛋白當蟹肉，蛋料理變年菜。", "chapters": [{"s": 1168, "t": "19:28", "label": "食材介紹"}, {"s": 1178, "t": "19:38", "label": "煸鹹蛋黃"}, {"s": 1201, "t": "20:01", "label": "蛋黃炒蟹膏"}, {"s": 1226, "t": "20:26", "label": "快炒蛋白"}, {"s": 1262, "t": "21:02", "label": "起鍋完成"}], "views": 103945, "zones": []}, {"name": "彩色飯糰", "img": "VID-104.jpg", "yt": "6vK58-P2cyQ", "cat": "全穀雜糧", "ing": "白米、蒟蒻米、芋頭、天貝、紅蘿蔔、玉米筍、娃娃菜、櫛瓜、紫高麗菜、豆腐、蛋黃、香菜、昆布鹽、鹽少許、白胡椒少許、醬油膏適量", "steps": ["芋頭、天貝、紅蘿蔔、玉米筍切小丁，娃娃菜先汆燙後切碎，豆腐捏碎備用。", "所有配料丁下鍋炒出香氣，加鹽、白胡椒與一點醬油膏調味。", "加入蛋黃拌炒，再放入捏碎的豆腐一起炒。", "櫛瓜切絲下鍋補上綠色，最後放一點香菜，把整鍋料炒乾。", "蒟蒻米與白米一起煮成飯，拌入炒好的配料、紫高麗菜絲與昆布鹽增色調味。", "用手捏成圓形飯糰即完成；料多飯少容易散，捏緊一點。"], "tip": "蒟蒻米纖維高、混白米煮更有飽足感；配料要炒乾，飯糰才不會濕散。", "long": "", "wide": true, "desc": "蒟蒻米混白米拌彩色蔬菜丁，一顆吃進繽紛年節儀式感。", "chapters": [{"s": 1287, "t": "21:27", "label": "食材介紹"}, {"s": 1319, "t": "21:59", "label": "炒香配料"}, {"s": 1328, "t": "22:08", "label": "調味加蛋黃"}, {"s": 1352, "t": "22:32", "label": "櫛瓜絲下鍋"}, {"s": 1389, "t": "23:09", "label": "蒟蒻米飯"}, {"s": 1405, "t": "23:25", "label": "捏製飯糰"}], "views": 103945, "zones": []}, {"name": "早餐溫沙拉", "img": "VID-105.jpg", "yt": "UcZCSUtEvS4", "cat": "肉類", "ing": "雞胸肉半斤、嫩豆腐（嫩豆腐或雞蛋豆腐皆可）、蝦仁、雞蛋、地瓜、洋蔥、生菜、米酒少許、鹽少許、豆渣粉少許、芝麻醬適量、檸檬汁少許", "steps": ["雞胸肉半斤切對半（比較快熟），滾水加一點米酒去腥，下鍋滾約一分鐘後熄火，加蓋用燜的燜熟，確認沒有血水跑出來就撈起。", "嫩豆腐下鍋煎到上色，加一點鹽調味即可，不用太鹹，因為之後還會淋醬。", "蝦仁沾薄薄的豆渣粉和一點點鹽，直接用煎豆腐的鍋下去煎（不必再加油），很快就熟。", "地瓜連皮備好當優質碳水，皮的纖維更高。", "洋蔥切絲泡冰水去嗆味，和生菜一起放入碗中。", "加入雞胸肉、豆腐、蝦仁與地瓜，淋上芝麻醬（也可以加一點洋蔥醬）拌勻，最後再放上雞蛋（太早放會糊掉）；覺得味道不夠可以擠一點檸檬汁。"], "tip": "雞胸肉滾一分鐘就熄火燜熟最軟嫩不柴；豆腐下鍋前記得擦乾水分才不會油爆；洋蔥泡過冰水口感更清脆。", "long": "https://youtu.be/CQJntkPPNnw", "wide": false, "desc": "雞胸豆腐蝦仁配地瓜生菜，芝麻醬一拌開啟活力早晨。", "chapters": [], "views": 51000, "zones": ["新手", "高蛋白"]}, {"name": "滷肉竹筍便當", "img": "VID-106.jpg", "yt": "4mq8_QpDMMw", "cat": "肉類", "ing": "豬肉塊（梅花豬）、熟竹筍、韭菜花、洋蔥、蒜頭、辣椒、薑、糙米（可摻一點白米）、米酒少許、醬油3至4湯匙、醬油膏適量、味醂少許、鹽少許", "steps": ["豬肉塊加薑和一點米酒下滾水汆燙去血水腥味，撈起清洗乾淨並稍微擦乾，滷起來的湯汁才會清澈。", "肉塊不加油直接下鍋，小火慢慢煎逼出它自己的油脂，火不能太大、要有耐心。", "加入洋蔥、蒜頭、辣椒炒香，再加醬油約3到4湯匙和醬油膏，讓肉稍微收一下味道，顏色不夠可再補醬油。", "加一點味醂提甜，加了味醂就不用再加糖。", "放入已煮熟的竹筍和肉一起滷，加水蓋過食材，蓋上鍋蓋滷到入味；竹筍會吸湯汁，湯汁變少要再補水。", "另起鍋炒韭菜花，加一點水和鹽巴，炒熟就好。", "糙米摻一點白米煮飯裝盒，配上滷肉竹筍與韭菜花，午餐便當就完成了。"], "tip": "肉先煎過逼出自身油脂再滷，不必額外加太多油，香氣也更足；用味醂取代糖提甜，竹筍量多會吸湯汁，記得補水。", "long": "https://youtu.be/CQJntkPPNnw", "wide": false, "desc": "滷肉竹筍加炒韭菜花，配糙米飯的家常便當超下飯。", "chapters": [], "views": 41000, "zones": []}, {"name": "銀耳蛋花湯", "img": "VID-107.jpg", "yt": "J2yUySKe67w", "cat": "百卡點心", "ing": "白木耳、雞蛋1顆、糖少許", "steps": ["白木耳煮成銀耳湯，加一點點糖調成微糖。", "湯滾燙時直接打入一顆蛋，輕輕攪散成蛋花。", "略煮到蛋花凝固就完成；白木耳膳食纖維豐富，加顆蛋就能同時補到蛋白質，當長輩的下午茶小餐剛剛好。"], "tip": "家裡有白木耳時順手打顆蛋，就能同時吃到膳食纖維和蛋白質，想不到點心煮什麼時最簡單的一招。", "long": "https://youtu.be/CQJntkPPNnw", "wide": false, "desc": "微糖銀耳湯打入蛋花，有膳食纖維又有蛋白質的下午茶。", "chapters": [], "views": 18000, "zones": ["新手", "懶人"]}, {"name": "肉絲炒豆乾", "img": "VID-108.jpg", "yt": "97AQ7HH82g0", "cat": "豆蛋", "ing": "豆乾、肉絲（低脂部位）、辣椒、蔥白、鹽少許、醬油膏少許", "steps": ["鍋中下少量油（油量控制一下），先爆香辣椒、蔥白等辛香料。", "下肉絲（選油脂很低的部位）炒到變色。", "再下豆乾拌炒，加鹽巴調味。", "加一點水拌炒，讓豆乾入味。", "起鍋前加一點醬油膏增香，再放蔥段拌勻就完成了。"], "tip": "油量控制一下，加一點水幫助入味，清爽又下飯；帶便當少了一道蛋白質時，晚餐補這道最快。", "long": "https://youtu.be/CQJntkPPNnw", "wide": false, "desc": "蔥白辣椒爆香，豆乾肉絲控油快炒，家常又下飯。", "chapters": [], "views": 19000, "zones": ["新手"]}, {"name": "低熱量鹽酥雞", "img": "VID-109.jpg", "yt": "aeRn-QEylq0", "cat": "肉類", "ing": "雞胸肉、蒜頭、雞蛋1顆、麵粉、玉米粉（或太白粉）、四季豆、玉米筍、米酒少許、醬油適量、醬油膏適量、糖少許、胡椒粉少許、鹽少許、辣椒粉少許、九層塔、噴油少許", "steps": ["雞胸肉切小塊，用米酒、醬油、醬油膏、一點點糖、蒜頭和胡椒粉抓醃，靜置約半小時入味。", "醃好的雞肉打入1顆全蛋抓勻讓肉吸收（不加也可以，各家配方不同）。", "第一層裹濕麵糊：麵粉加水調成不太稀也不太稠的糊，讓雞肉均勻裹上。", "第二層裹乾的玉米粉，炸起來比較酥脆（用太白粉也可以）。", "裹完粉不要馬上下鍋，靜置一下讓表面反潮，之後粉才不會脫落散進鍋裡。", "氣炸鍋下層鋪四季豆、玉米筍等蔬菜，上層酥炸籃放雞肉，兩面都噴一點油。", "氣炸約10到15分鐘：切得小塊薄片不用太久，大塊厚一點就要拉長時間，炸到金黃酥脆。", "起鍋趁熱撒一點點鹽和胡椒粉（椒鹽），想吃辣可加辣椒粉，加點九層塔更香。"], "tip": "先濕粉再乾粉的雙層裹法，加上裹粉後靜置反潮，是酥脆不掉粉的關鍵；蔬菜切越細吸油量越高，改用氣炸噴油取代油炸，油量至少省50%到80%。", "long": "https://youtu.be/g14GJpLSXXs", "wide": false, "desc": "雞胸醃香雙層裹粉氣炸，少油也有鹽酥雞的酥脆。", "chapters": [], "views": 10000, "zones": ["高蛋白"]}, {"name": "滷雞胗", "img": "VID-110.jpg", "yt": "E4yv3_Kw7qY", "cat": "肉類", "ing": "雞胗3斤（約1800克）、嫩薑、辣椒、紅糖少許、白芝麻香油少許、米酒少許；滷汁：醬油3罐（每罐710ml，共約2130ml）、冰糖80克、米酒400cc（19.5度料理米酒）、雞高湯2包（每包500克，共1000克，可用水替代）、滷包香料（草果、八角、甘草、當歸、桂皮、花椒）", "steps": ["製作滷包：草果敲開，與八角、桂皮、花椒放入棉布滷包袋（中藥店買得到）；甘草與當歸提味即可不能多，甘草太多會變苦。花椒可先用乾鍋小火煸出香氣再入袋，袋口要綁緊才不會露出來。", "煮滷汁：鍋中倒入3罐醬油（共約2130ml）、米酒400cc與雞高湯2包共1000克（不加高湯改加水也可以），放入滷包，先大火煮滾再轉小火，加入冰糖80克煮到溶解沒有泡泡；試味偏鹹可再補約30克糖。", "雞胗先汆燙，燙好後一定要再用清水洗得很乾淨，雜質才不會弄髒滷汁。", "雞胗分鍋滷：另取一鍋放入雞胗，加一點原滷汁再加水淹過，煮滾後蓋鍋蓋滷約20分鐘；喜歡吃軟一點就滷久一點，中途滷汁變淡可再補一點醬油平衡鹹度。", "剪開試軟硬度，OK就撈起；煮雞胗的湯汁不要倒回原滷汁，以免影響味道。", "撈起的雞胗趁熱與嫩薑、辣椒（不吃辣可省略或改加辣油）、少許紅糖、米酒和白芝麻香油拌勻。", "原滷汁煮滾後撇掉表面浮油，把拌好的雞胗泡回滷汁約5小時以上（可泡到隔天）更入味；吃冷的最Q，要吃熱的用微波或電鍋加熱也可以。"], "tip": "滷汁量是安媽一次滷150隻雞腳、100隻雞翅、豆乾6斤、雞胗3斤、滷蛋30顆的大鍋比例，家庭少量請依比例換算（量太少味道出不來）；香油務必用白芝麻香油，黑芝麻不行，提香又能防止雞胗放冷沾黏。", "long": "https://youtu.be/fC_0_gVpF3c", "wide": false, "desc": "雞胗高蛋白低脂肪，滷到軟Q再拌香辣佐料超涮嘴。", "chapters": [], "views": 11000, "zones": ["新手", "高蛋白"]}, {"name": "糯米飯糰", "img": "VID-111.jpg", "yt": "5txnMFC7G-U", "cat": "全穀雜糧", "ing": "糯米 兩斤", "steps": ["糯米兩斤泡水、洗乾淨後瀝乾；安媽這次忘記先泡米，91歲的阿環小姐說正常還是要稍微泡一下，煮起來味道比較好。", "煮一鍋滾水，把瀝乾的糯米放入快速過熱水汆燙，滾過就馬上撈起——這是阿環小姐祖傳的古早「燒水」法，忘記泡米時這樣做米心才會透（讓米心「伸展開」），蒸起來才會Q。", "蒸籠裡先鋪一塊打濕的布，免得米粒從縫隙掉下去，再把汆燙撈起的糯米倒進去攤平抹勻。", "用筷子在米上插幾個洞，讓蒸氣有空隙可以透上來，糯米才蒸得均勻。", "鍋中另外煮滾一鍋水，放上蒸籠蓋好蓋子，蒸約半點鐘（三十分鐘）；用電鍋蒸也可以。", "半小時時間到先關火，讓糯米在鍋裡再燜一下才開蓋，就完成飯糰的米飯基底。"], "tip": "本篇是「豪華飯糰」的其中一部分（米飯基底），內餡做法見鹹菜菜脯飯糰、配料與組裝見鮭魚干貝飯糰。長片的失敗插曲：這批糯米米質不好，蒸出來太軟太黏、不夠Q，安媽不甘心，最後改用一般白飯重新包，反而粒粒分明更好包；阿環小姐也說在家做飯糰用平常吃的白飯就可以，不必特地用費工的糯米。", "long": "https://youtu.be/I5fsZRLqXSo", "wide": false, "desc": "糯米先過滾水再上籠蒸，粒粒Q透的飯糰好基底。", "chapters": [], "views": 891, "zones": ["新手"]}, {"name": "鹹菜菜脯飯糰", "img": "VID-112.jpg", "yt": "42Jeo_Tu57Q", "cat": "蔬菜", "ing": "菜脯、鹹菜、油 兩湯匙（鹹菜、菜脯各）、冰糖少許、辣椒少許、胡椒粉少許、味素少許（手工菜脯夠香可省略）", "steps": ["手工菜脯切得很細，先泡水退鹹，太大塊不好吃。", "鹹菜要挑脆口、帶點酸的才適合飯糰，一樣切成小小丁；軟軟的鹹菜不好吃，拿去做刈包比較適合。", "熱鍋先不加油，把鹹菜下鍋乾炒，將湯汁收乾、逼出香氣。", "鹹菜湯汁收乾後再加約兩湯匙油，並加一點點冰糖拌炒，炒出鹹甜鹹甜的脆口滋味就可起鍋。", "菜脯用同樣做法乾炒，把水分炒乾、香氣出來後，再加兩湯匙油。", "吃辣的可加一點辣椒，再加兩小粒冰糖與少許胡椒粉拌炒均勻。", "安媽說這次姊姊做的純手工菜脯本身就夠香，味素不加也很好吃。", "炒好的餡料一次用不完可以分包冷凍保存，之後打個蛋、加點蔥煎菜脯蛋也很好吃。"], "tip": "安媽的撇步：鹹菜、菜脯都先乾炒把水分炒乾再加油，香氣才會出來；鹹菜是飯糰的靈魂人物，一定要有。本篇是「豪華飯糰」的其中一部分（內餡），米飯基底見糯米飯糰、配料與組裝見鮭魚干貝飯糰。", "long": "https://youtu.be/I5fsZRLqXSo", "wide": false, "desc": "乾炒逼香的鹹菜菜脯餡，鹹香帶甜，包飯糰最對味。", "chapters": [], "views": 842, "zones": []}, {"name": "鮭魚干貝飯糰", "img": "VID-113.jpg", "yt": "ePgTaAtKH_Q", "cat": "海鮮魚類", "ing": "鮭魚（去皮）、生食級干貝、米酒少許、白胡椒粉少許、鹽少許、白飯、海苔、鹹菜菜脯餡、滷雞腿肉、玉子燒、可樂果", "steps": ["新鮮鮭魚去皮（皮太軟不用），切成一塊一塊的小塊。", "加一點鹽、米酒與白胡椒粉略醃一下，安媽習慣先加米酒。", "下鍋前把魚肉表面水分擦乾，煎的時候才不會劈啪油爆。", "全程不加油乾煎，讓鮭魚本身的油釋出，邊煸邊把多餘的油吸掉，慢慢煸、把魚肉搗散成小塊酥鬆的鮭魚酥；小塊炒散腥味比較不重，煸透了放涼也不腥。", "北海道生食級干貝加一點鹽略煎調味（煎的時候會出水），生食等級的中間不必煎到全熟。", "組裝豪華飯糰：海苔鋪底放上白飯（修正版改用一般白飯，粒粒分明比軟糯米好包），依序放上鹹菜、菜脯餡、鮭魚酥、干貝、滷好的雞腿肉與玉子燒。", "放幾根可樂果代替傳統油條，一樣酥酥脆脆、油脂卻少很多，最後把海苔捲起包好即完成。", "料不要貪心放太多——安媽第一顆就是料放太多包不起來，餡料適量才包得起來、包得漂亮。"], "tip": "本篇是「豪華飯糰」的配料與組裝篇，米飯基底見糯米飯糰、鹹香內餡見鹹菜菜脯飯糰。鮭魚油脂豐富不必加油，乾煎逼油再吸掉更爽口不腥。長片兩個失敗修正：糯米太軟改用白飯、料太多包不起來要減量。營養師提醒：200公克的飯糰熱量約500-600大卡，等於一個便當，控制體重的人淺嚐就好、不要太常吃。", "long": "https://youtu.be/I5fsZRLqXSo", "wide": false, "desc": "自製鮭魚酥配生食級干貝，高蛋白低脂豪華飯糰。", "chapters": [], "views": 706, "zones": ["高蛋白"]}, {"name": "雞肉丸湯", "img": "VID-114.jpg", "yt": "ExckURQfKUk", "cat": "湯品", "ing": "雞胸肉、雞里肌、雞腿肉、雞腳、雞脖子、辛香料適量", "steps": ["雞胸肉、雞里肌與雞腿肉全部切細。", "雞腳與雞脖子先下鍋熬成雞高湯。", "切好的雞肉放入絞肉機略打，不要打太細，保留一點肉的口感。", "依個人喜好加入辛香料，攪拌到肉出漿有黏性。", "不用手，用湯匙把肉漿挖成丸子放入高湯中煮熟即完成。"], "tip": "肉不要打太細才有口感；挖丸子用湯匙不用手，形狀漂亮又俐落。", "long": "", "wide": false, "desc": "三部位雞肉手打成丸，配自熬雞高湯，清爽高蛋白。", "chapters": [], "views": 18000, "zones": ["高蛋白"]}, {"name": "雲朵菇漢堡", "img": "VID-115.jpg", "yt": "cW124-u2dDk", "cat": "肉類", "ing": "雞胸肉、雞里肌、雞腿肉、雲朵菇、洋蔥、醬油少許、油膏少許、辛香料適量", "steps": ["雞胸肉、雞里肌與雞腿肉全部切細，絞拌成漢堡肉，增加口感。", "依個人喜好加入辛香料拌勻。", "洋蔥熬到稍微濃稠，加一點醬油與油膏熬成洋蔥醬。", "雲朵菇下鍋煎香——雲朵菇就是這顆漢堡的「麵包體」。", "雞肉漢堡排下鍋煎熟。", "用煎香的雲朵菇夾住漢堡排、抹上洋蔥醬，雲朵菇漢堡完成。"], "tip": "安媽的洋蔥醬加醬油與油膏熬到濃稠，沾很多東西都對味。", "long": "", "wide": false, "desc": "三種雞肉打成漢堡排，配雲朵菇與洋蔥醬，健康滿足。", "chapters": [], "views": 4000, "zones": ["高蛋白"]}, {"name": "毛豆豆漿", "img": "VID-116.jpg", "yt": "p_T1OKZ0l1g", "cat": "百卡點心", "ing": "毛豆半斤（約300公克）、水600cc", "steps": ["生毛豆洗乾淨，半斤毛豆配600cc的水一起放進調理機。", "打到非常細緻；用攪拌棒打細緻度不夠，用調理機打會更細、口感更好。", "用過濾布把豆渣濾掉，將豆漿擠出來；豆渣可以再加一點水回沖、再擠一次，不要浪費。", "濾出的豆渣留著不要丟，等一下做毛豆豆腐會用到。", "豆漿倒入鍋中以小火加熱，快滾時容易噗鍋要顧著；一定要確實煮滾破壞皂素。", "不加糖就很好喝；想喝甜的可以加赤藻糖醇（無熱量的糖），完成。"], "tip": "安媽提醒：豆漿一定要煮滾破壞皂素，豆子沒滾過不能喝；小火慢煮、快滾時顧著鍋才不會噗出來。", "long": "https://youtu.be/oex8IGoNFXQ", "wide": false, "desc": "只要毛豆和水就能打出濃醇豆漿，無糖也好喝。", "chapters": [], "views": 1100, "zones": ["新手", "高蛋白"]}, {"name": "毛豆豆腐", "img": "VID-117.jpg", "yt": "tfbeARZzbRQ", "cat": "豆蛋", "ing": "毛豆（煮熟）、嫩豆腐（介於板豆腐與嫩豆腐之間）、豆渣粉、毛豆豆渣（打豆漿剩的）、鹽少許", "steps": ["煮熟的毛豆放入調理機。", "加入豆腐一起打勻；影片選的是介於板豆腐與嫩豆腐之間、比較有嚼勁的嫩豆腐。", "加入豆渣粉，再把打豆漿剩下的毛豆豆渣也加進去，加一點鹽巴提味後打勻。", "倒進耐蒸的容器裡整平，任何容器都可以，形狀看容器決定。", "放入鍋中蒸熟，凝固即可起鍋；稍微放涼再倒扣脫模比較漂亮。", "可直接吃，或切塊下鍋煎到表面微焦、撒上毛豆碎裝飾，口感像綿軟的鹹蛋糕，素食也能吃。"], "tip": "豆渣粉黏性較低，但蛋白質很高，加了營養更足；一般做法是加太白粉增加黏性，可自行取捨。", "long": "https://youtu.be/oex8IGoNFXQ", "wide": false, "desc": "毛豆打進嫩豆腐蒸出滑嫩口感，高蛋白清爽小品。", "chapters": [], "views": 838, "zones": ["新手", "高蛋白"]}, {"name": "毛豆麻糬", "img": "VID-118.jpg", "yt": "bjJupzhEWio", "cat": "百卡點心", "ing": "糯米麻糬（安媽自製冷凍或市售）、毛豆半斤（約300公克，煮熟）、椰漿、牛奶、毛豆豆渣、赤藻糖醇適量（或冰糖）、鹽少許、油少許", "steps": ["毛豆先煮熟，加入赤藻糖醇（想更甜可用冰糖）拌勻，再加一點鹽巴，鹹甜鹹甜更對味。", "加入椰漿增添風味，再加一點點牛奶提味，混合均勻成毛豆餡醬；顏色和質感就跟日本秋田的毛豆麻糬一樣。", "麻糬用安媽之前以糯米做好、冷凍保存的自製麻糬，放入鍋中蒸熟蒸軟（麻糬做法可參考頻道「製作麻糬」那一集）。", "蒸好的麻糬拌入打豆漿剩的毛豆豆渣、一點油和一點糖，防止沾黏又增加香氣，再分成一顆一顆。", "麻糬裝碗，鋪上毛豆餡醬即完成；用毛豆取代常見的花生粉，蛋白質更高。"], "tip": "毛豆餡加一點鹽巴和牛奶提味，鹹甜不膩；日本吃法一碗三顆，毛豆餡取代花生粉，自己做的麻糬更Q。", "long": "https://youtu.be/oex8IGoNFXQ", "wide": false, "desc": "椰香糯米麻糬配甜毛豆，蒸出日式風味Q彈小點。", "chapters": [], "views": 697, "zones": ["新手"]}, {"name": "透抽包鷹嘴豆", "img": "VID-119.jpg", "yt": "wxZEpkdZ1xQ", "cat": "海鮮魚類", "ing": "透抽、鷹嘴豆、白芝麻粒、腰果、蘑菇、洋蔥、豆腐、毛豆、雞蛋1顆、鹽、黑胡椒", "steps": ["鷹嘴豆乾豆加約2倍體積的水，至少泡4小時、最好泡一個晚上，會脹到1.5至2倍大；再用電鍋加約2倍的水蒸熟，蒸出來的湯汁先留著不要丟。", "蘑菇和洋蔥下鍋炒香，加鹽巴和黑胡椒調味。", "蒸好的鷹嘴豆與白芝麻粒、腰果、炒料一起打成豆泥，加入預留湯汁打得更滑順，再補一點鹽，黑胡椒可以多一點。", "打好的豆泥再下鍋滾一次，保存期限會多幾天、比較不會壞。", "豆泥拌入豆腐、毛豆和保留的整顆鷹嘴豆（吃得到顆粒），再打一顆蛋混合成內餡。", "內餡灌進透抽裡，不要塞太滿，加熱時熱氣才不會把餡爆出來；開口用針線縫起來並打結固定，餡才不會掉出來。", "下鍋乾煎至熟，切片即可享用；想更香可以先把內餡下鍋炒過再灌，裡面就不會糊糊的。"], "tip": "蒸鷹嘴豆的湯汁別丟掉，打豆泥時加回去更滑順；餡別灌太滿，煎的時候才不會爆餡。", "long": "https://youtu.be/O9mMnrMsRjA", "wide": false, "desc": "透抽灌進鷹嘴豆泥餡，乾煎切片，高蛋白又澎湃。", "chapters": [], "views": 808, "zones": ["澎湃", "高蛋白"]}, {"name": "鷹嘴豆泥蛋餅皮", "img": "VID-120.jpg", "yt": "FEarponhHNY", "cat": "豆蛋", "ing": "鷹嘴豆、白芝麻粒、腰果、蘑菇、洋蔥、蛋餅皮、香菜、辣椒粉、橄欖油、蔥花、檸檬（可不加）、鹽、黑胡椒", "steps": ["鷹嘴豆乾豆加約2倍體積的水，至少泡4小時或泡一個晚上，再用電鍋加約2倍的水蒸熟，湯汁留著備用。", "蘑菇、洋蔥下鍋炒香，加鹽巴、黑胡椒調味。", "蒸好的鷹嘴豆與白芝麻粒、腰果、炒料一起打成豆泥，加湯汁調整濃稠度，黑胡椒可以多一點；有人建議加檸檬，喜歡原味可以不加，也可以加孜然粉。", "打好的豆泥再下鍋滾一次，保存期限比較長、比較不會壞。", "蛋餅皮選薄的，不加油直接乾烙到酥脆，也可以改用烤箱或氣炸鍋。", "烙好撒上鹽、胡椒、辣椒粉和香菜，切好沾鷹嘴豆泥一起吃。", "豆泥上可以淋一點橄欖油、撒蔥花（台式吃法）或改撒巴西里（西式），配蔬菜棒沾著吃也很棒。"], "tip": "蛋餅皮買薄不買厚，免油乾烙就會酥；加香菜下去更香。", "long": "https://youtu.be/O9mMnrMsRjA", "wide": false, "desc": "自製鷹嘴豆泥配乾烙酥脆蛋餅皮，免油沾著吃涮嘴。", "chapters": [], "views": 672, "zones": ["新手"]}, {"name": "南瓜凍", "img": "VID-121.jpg", "yt": "Qzq9UW2guUQ", "cat": "豆蛋", "ing": "南瓜、毛豆、天貝、綠花椰菜、小番茄、薑片、醬油膏、鹽、黑胡椒、油", "steps": ["南瓜先蒸熟備用，毛豆也先煮熟，天貝切碎。", "熱鍋加油放入薑片，小火有耐心地慢煸天貝，把它煸到很酥。", "加一點點鹽巴、醬油膏和黑胡椒，炒出香氣。", "煮熟的毛豆打成碎泥後回鍋，加一點油和一點水炒香，炒過就不會有豆腥味。", "取圓柱模具組裝：底層鋪蒸熟的南瓜壓實當地基，靠南瓜的黏性把整座塔固定住。", "南瓜上鋪一層綠花椰菜，再鋪一層小番茄。", "最上層鋪毛豆泥拌天貝酥，壓平後脫模，像一個蔬食蛋糕就完成了。"], "tip": "天貝要用小火慢煸到酥，香氣才會出來；底層南瓜壓實有黏性，脫模才不會散。", "long": "https://youtu.be/qyuRtoCi3_I", "wide": false, "desc": "酥香天貝配毛豆泥疊成小圓塔，清爽漂亮的蔬食盤。", "chapters": [], "views": 1100, "zones": ["澎湃"]}, {"name": "青醬", "img": "VID-122.jpg", "yt": "iSlKYSgU_kE", "cat": "蔬菜", "ing": "九層塔、堅果7顆（腰果為主）、花生醬（無糖無鹽）、冷壓橄欖油、薑、醬油膏、鹽、黑胡椒", "steps": ["九層塔先汆燙5到10秒，先汆燙過才不會變黑。", "撈起後馬上冰鎮，保持翠綠和脆度。", "把九層塔的水分盡量擠乾。", "起油鍋放薑爆香，再把九層塔直接下鍋。", "加入約7顆堅果（腰果為主，甜味較高）、鹽、醬油膏、無糖無鹽的純花生醬和黑胡椒。", "淋上冷壓橄欖油，全部一起打成青醬即完成；油要夠多才打得動。", "打好的青醬可以冷凍保存，拌義大利麵、抹生菜沙拉或夾漢堡都很適合。"], "tip": "先汆燙再冰鎮，是青醬不變黑、保持翠綠的關鍵；素食版不加洋蔥蒜頭，靠薑和堅果提味。", "long": "https://youtu.be/qyuRtoCi3_I", "wide": false, "desc": "汆燙冰鎮鎖住翠綠，堅果打出香濃自製青醬。", "chapters": [], "views": 708, "zones": ["新手"]}, {"name": "雞蛋漢堡", "img": "VID-123.jpg", "yt": "0Dq-xPlZksQ", "cat": "豆蛋", "ing": "雞蛋、豆皮2片、番茄、起司、生菜、醬油膏、黑胡椒", "steps": ["雞蛋先水煮，切對半當作漢堡的外皮；全素者可以改用香菇或蘑菇切對半當外皮。", "豆皮當作肉排，用剩下帶黑胡椒香的醬油膏先醃一下讓它入味。", "醃好的豆皮下鍋煎到酥酥脆脆，兩片疊成雙層更像肉排。", "番茄對切成片，煎好的豆皮也對切成適口大小，起司片和生菜備好。", "依序組裝：水煮蛋對半夾入雙層豆皮排、起司、番茄和生菜即完成。", "吃的時候可以抹一點自製青醬，醬香和蛋香更搭。"], "tip": "全素版本把水煮蛋外皮換成香菇或蘑菇就可以了；豆皮一定要醃過再煎才有醬香味。", "long": "https://youtu.be/qyuRtoCi3_I", "wide": false, "desc": "豆皮醃油膏煎香當肉排，夾起司番茄的高蛋白漢堡。", "chapters": [], "views": 1000, "zones": ["新手", "高蛋白"]}, {"name": "蔬食生乳捲", "img": "VID-124.jpg", "yt": "m_NjZuTCzJo", "cat": "全穀雜糧", "ing": "馬鈴薯、起司絲、香菇、天貝、香菜梗、昆布調味料、醬油膏、油", "steps": ["馬鈴薯切片，烘焙紙上先鋪滿一層起司絲。", "鋪上馬鈴薯片，再撒第二層起司絲，送入烤箱烤定型。", "熱鍋先把香菇翻炒出香氣，加一點醬調味。", "再加油下天貝拌炒，加入昆布調味料、醬油膏和香菜梗，炒成內餡。", "內餡鋪在烤好的馬鈴薯起司皮上，整個捲起來，就是生乳捲的樣子。", "要吃之前表面再烤一下，烤到焦焦的更好吃。"], "tip": "上桌前表面回烤到微焦，口感和香氣都加分。", "long": "", "wide": false, "desc": "馬鈴薯起司烤成皮，捲入天貝香菇餡的鹹香蔬食捲。", "chapters": [], "views": 884, "zones": ["澎湃"]}, {"name": "蔬食蛋糕", "img": "VID-125.jpg", "yt": "692xo-iF3SE", "cat": "蔬菜", "ing": "番茄、南瓜、花椰菜、皇帝豆、堅果、橄欖油、吉利丁、豆製品、鹽", "steps": ["吉利丁加水攪勻，趁熱倒入模具做第一層凍。", "番茄烤過後切片，撒一點鹽巴鋪上，冷藏約5分鐘讓它稍微結凍。", "接著鋪蔬菜層，送入冰箱定型。", "加一層蛋白質：豆製品切碎炒成金黃色，加一點鹽調味。", "底層基底搗碎鋪好，依序疊上南瓜、花椰菜、番茄。", "皇帝豆加鹽巴、堅果和橄欖油打成泥，像抹蛋糕一樣抹在表面。", "最後鋪上青醬裝飾即完成。"], "tip": "每疊一層先稍微冷藏定型，蛋糕的層次才會漂亮。", "long": "", "wide": false, "desc": "蔬菜疊出層次、皇帝豆泥當抹面的宴客蔬食蛋糕。", "chapters": [], "views": 987, "zones": ["澎湃"]}, {"name": "高麗菜豆腐餅", "img": "VID-126.jpg", "yt": "JHmIZsAJf_k", "cat": "蔬菜", "ing": "高麗菜、板豆腐、雞蛋、紅蘿蔔、洋蔥、蒜頭、香菜、辣椒（可加）、油1茶匙、黑胡椒適量", "steps": ["高麗菜切絲，菜梗也要切得細細的。", "鍋中下一茶匙油，放入紅蘿蔔、洋蔥與蒜頭爆香，喜歡辣可以加辣椒。", "爆香料拌入高麗菜絲中；豆腐也下鍋略炒，讓豆香味出來後一起加入。", "加入黑胡椒與香菜，打入雞蛋拌勻幫助成型，整體拌勻成餅料。", "餅料下鍋整成餅狀，蓋上鍋蓋以中火煎。", "翻面後火轉小一點，續煎至兩面金黃即完成。"], "tip": "豆腐先炒過帶出豆香；安媽提醒翻面後火要再小一點，才不容易焦。", "long": "", "wide": false, "desc": "高麗菜絲拌豆腐煎成金黃圓餅，樸實家常好滋味", "chapters": [], "views": 31000, "zones": []}, {"name": "甜椒炒龍鬚菜", "img": "VID-127.jpg", "yt": "cydbgOedfn8", "cat": "蔬菜", "ing": "龍鬚菜、紅甜椒、黃甜椒、蒜頭、油少許、鹽適量", "steps": ["龍鬚菜洗淨切段，紅、黃甜椒切條備用。", "熱鍋下油，先爆香蒜頭。", "放入龍鬚菜，全程大火快炒。", "甜椒最後才下鍋，略拌保持脆度，加一點鹽巴調味。", "蓋上鍋蓋稍燜一下即可起鍋。"], "tip": "青菜要大火快炒；甜椒很快就熟，最後再放口感才脆。", "long": "", "wide": false, "desc": "翠綠龍鬚菜配紅黃甜椒，大火快炒立刻上桌", "chapters": [], "views": 6900, "zones": ["新手"]}, {"name": "紫菜湯", "img": "VID-128.jpg", "yt": "geNz091J8YY", "cat": "湯品", "ing": "紫菜（海菜）、排骨半斤、蔥花、鹽適量、魩仔魚（可加，先炒到很乾）、蛋（可加）、豆腐（可加）", "steps": ["排骨先汆燙去除雜質。", "排骨買一斤只取半斤煮湯就夠，加水慢慢熬成高湯，熬得久湯頭才夠味。", "煮排骨湯一定會浮出油脂，用撇油工具把湯面浮油撈除，無形中就不會把油喝下肚。", "高湯滾後放入紫菜，紫菜很快熟，滾了就好。", "加一點鹽巴調味。", "起鍋撒上蔥花；喜歡也可加炒得很乾很乾的魩仔魚、蛋花或切細絲的豆腐增添風味，但配料越加越多熱量越高。"], "tip": "安媽提醒配料越加越多熱量越高，高湯熬得好，簡單加蔥花就很好喝。海菜熱量很低（100公克約9卡），膳食纖維與葉酸都很豐富。", "long": "https://youtu.be/Ey-yVSj-D-U", "wide": false, "desc": "排骨高湯滾入紫菜撒上蔥花，簡單清爽家常湯", "chapters": [], "views": 7100, "zones": ["新手"]}, {"name": "炒櫛瓜", "img": "VID-129.jpg", "yt": "RAIH-oYmMVc", "cat": "蔬菜", "ing": "櫛瓜、乾香菇、洋蔥、番茄、蒜末（可不加）、紅甜椒、黃甜椒、油少許", "steps": ["櫛瓜用手切成長條狀，像櫛瓜麵一樣；櫛瓜挑中等長度就好，不要買太大條。", "鍋中下一點點油，放入蒜末爆香（不愛吃蒜的人可以不加），乾香菇與洋蔥也下鍋炒香。", "下櫛瓜以小火慢慢煸，炒到軟但保留一點脆口，炒太軟就不好吃。", "番茄與紅、黃甜椒最後鋪在櫛瓜上面，不必翻炒，利用鍋中熱度稍微燜一下。", "整體拌開即可起鍋。"], "tip": "油量一點點就好，耐心慢煸；安媽提醒櫛瓜不能炒太軟，要留一點脆口才好吃。", "long": "https://youtu.be/Ey-yVSj-D-U", "wide": false, "desc": "手切櫛瓜麵慢煸至軟，配上紅黃甜椒繽紛清爽", "chapters": [], "views": 9000, "zones": ["新手"]}, {"name": "蛋炒杏鮑菇", "img": "VID-130.jpg", "yt": "VzZP7k9NBBw", "cat": "豆蛋", "ing": "杏鮑菇、蛋3顆、蒜頭、辣椒、油膏適量、油少許", "steps": ["杏鮑菇放入乾鍋不加油，炒到出水後繼續炒到水分收乾，香氣才會出來、沒有菇的燥氣。", "杏鮑菇先盛起，鍋中下油，倒入3顆蛋液，邊煎邊拉成蛋塊後盛起備用。", "原鍋爆香蒜頭與辣椒。", "杏鮑菇與蛋倒回鍋中，加一點油膏拌炒。", "拌勻入味即可起鍋。"], "tip": "菇類先用乾鍋煸到水分收乾再料理，炒起來更香、沒有生菇味。", "long": "", "wide": false, "desc": "乾煸杏鮑菇遇上滑嫩炒蛋，油膏香氣簡單下飯", "chapters": [], "views": 22000, "zones": ["新手", "高蛋白"]}, {"name": "栗子飯", "img": "VID-131.jpg", "yt": "Fsab4sw6EXs", "cat": "全穀雜糧", "ing": "白米1杯（鑄鐵鍋附量杯）、熟栗子約200克、鴻喜菇、水220～250cc（米先泡過約200cc）、米酒少許、鹽少許、油少許", "steps": ["白米洗淨備用；若想煮得更快，可先把米泡水，之後水量約200cc即可。", "鑄鐵鍋以中火加熱，油倒在小碟子裡，用餐巾紙沾一點點油抹在鍋面上。", "鴻喜菇先下鍋炒熟，先炒過再煮才不會有生菇味。", "洗好的米下鍋炒過，香氣會更足。", "加入先煮熟的栗子與水（1杯米配220～250cc），再加一點米酒增加香氣、一點鹽巴，拌一拌。", "蓋好鍋蓋，按下煮飯模式煮至完成。", "煮好後不要馬上開蓋，再燜約10分鐘會更好吃。"], "tip": "米先用薄薄的油炒過再煮，整鍋飯的香氣會更明顯；菇類先炒熟再入鍋才不會有菇腥味，煮好續燜10分鐘口感更佳。", "long": "https://youtu.be/br33n_JGsuo", "wide": false, "desc": "白米先炒過再與熟栗、鴻喜菇同煮，香氣十足的一鍋炊飯", "chapters": [], "views": 9200, "zones": ["新手", "懶人"]}, {"name": "毛豆豆腐烘蛋", "img": "VID-132.jpg", "yt": "JTHvq8_YtGE", "cat": "豆蛋", "ing": "蛋5顆、毛豆、豆腐、皮蛋、魚露少許、鹽少許、洋蔥粉少許、油少許", "steps": ["毛豆先打碎，豆腐用手捏碎備用（弄碎才好烘蛋）。", "皮蛋剝殼後下鍋加一點油先煎，把蛋黃煎出香氣（此步驟可省略，直接下去烘也可以）。", "煎香的皮蛋取出弄碎，與豆腐碎一起下鍋炒出香氣，再加入毛豆碎。", "5顆蛋打成蛋液，加入炒好的料，調入魚露、鹽巴與秘密武器北海道洋蔥粉，拌勻。", "鍋內鋪好烘焙紙，倒入蛋料，蓋鍋以中火定時約35分鐘。", "開蓋檢查邊緣底部，若剛微焦再補烘約5分鐘（共約40分鐘），倒扣脫模即完成。"], "tip": "鍋底鋪烘焙紙好脫模；皮蛋蛋黃先煎過、豆腐先炒過，是香氣的關鍵。35分鐘先開蓋檢查，視微焦程度再補5分鐘。", "long": "https://youtu.be/br33n_JGsuo", "wide": false, "desc": "毛豆豆腐拌蛋液烘出微焦金黃，蛋白質滿滿一鍋", "chapters": [], "views": 9100, "zones": ["懶人", "高蛋白"]}, {"name": "彩椒炒娃娃菜", "img": "VID-133.jpg", "yt": "0PZOwbc_c2E", "cat": "蔬菜", "ing": "娃娃菜、紅甜椒、黃甜椒、蒜末、油1湯匙、鹽少許、水或米酒少許", "steps": ["熱鍋加入約一湯匙油，放入蒜末爆香。", "下娃娃菜拌炒，加一點水或米酒幫助軟化，並以鹽巴調味。", "蓋上鍋蓋燜約三分鐘，讓娃娃菜釋放水分軟化。", "起鍋前加入紅、黃甜椒快速拌炒，保持脆度與色澤。", "最後點綴綠色配料即可起鍋，前後約六分鐘完成。"], "tip": "娃娃菜燜一下就會出水軟化，不必加太多水；甜椒最後下鍋保持脆度與色澤。喜歡軟一點的口感可以多燜一下。", "long": "https://youtu.be/br33n_JGsuo", "wide": false, "desc": "蒜香娃娃菜快炒，紅黃彩椒點綴，六分鐘清爽上桌", "chapters": [], "views": 360, "zones": ["新手", "懶人"]}, {"name": "地中海海鮮薏仁湯", "img": "VID-134.jpg", "yt": "ks0PNR1YC3w", "cat": "湯品", "ing": "蛤蜊、透抽、薏仁、山藥、白木耳、鴻喜菇、洋蔥、蒜、蔥、香菜、紅椒（甜椒）、油 適量、鹽巴 適量、胡椒 適量", "steps": ["薏仁先泡水備用。", "萬用鍋選烤雞模式，加油將透抽等海鮮料稍微炒香爆香。", "加水，放入泡好的薏仁、白木耳與切塊山藥。", "切換煲湯模式燉煮。", "中途加料時放入蛤蜊，補一點水後續煮約5分鐘，至蛤蜊與透抽都開。", "開鍋後加入蔥、香菜、甜椒等辛香料，以油、鹽巴與胡椒調味拌勻即可。"], "tip": "薏仁先泡水才容易煮透；蛤蜊中途加料再放，續煮約5分鐘剛好開殼不會煮過頭。白木耳增加滑順口感與膳食纖維。", "long": "https://youtu.be/QKqJR4MVoeM", "wide": false, "desc": "蛤蜊透抽入湯，薏仁白木耳山藥同煮，鮮甜又清爽", "chapters": [], "views": 3500, "zones": ["澎湃"]}, {"name": "紙包義式鱈魚", "img": "VID-135.jpg", "yt": "JvLJNjB8qDE", "cat": "海鮮魚類", "ing": "鱈魚、櫛瓜、小番茄、蒜、薑、蔥、義式香料適量、黑胡椒鹽適量、米酒少許、橄欖油少許", "steps": ["櫛瓜切片、蔥切段備用，蔥少許就好。", "烘焙紙剪兩張，以十字形交疊鋪好，方便承接湯汁。", "鱈魚兩面抹上少許鹽，再兩面撒上義式香料。", "鋪上蒜片、蔥絲與一點薑，海鮮配薑可去腥。", "擺上櫛瓜與小番茄，淋上一點油、米酒與胡椒粉。", "將烘焙紙包起，以烤海鮮模式烹調即完成。"], "tip": "烘焙紙十字交疊包法能鎖住湯汁；海鮮加一點薑與米酒可去腥提鮮。用烤海鮮模式做出的是烤物口感，不是蒸的，安媽試吃也說很有味道。", "long": "https://youtu.be/QKqJR4MVoeM", "wide": false, "desc": "烘焙紙鎖住鮮味，義式香料佐櫛瓜小番茄，清爽零油煙", "chapters": [], "views": 2200, "zones": ["新手", "高蛋白"]}, {"name": "古早味滷肉", "img": "VID-136.jpg", "yt": "akOEidfhWGM", "cat": "肉類", "ing": "梅花豬肉、洋蔥、蒜頭、冰糖少許、醬油適量、醬油膏適量、米酒適量", "steps": ["梅花豬肉切小塊，不要切太大塊，大小大約均勻即可。", "肉塊冷水下鍋汆燙，水滾後撈除渣渣浮沫，撈起沖洗乾淨並擦乾。", "鍋中加一點點油（控油即可），肉塊下鍋煸出油脂與香氣，煸過才不會黏鍋。", "加入洋蔥（與蒜頭）一起炒香，炒到香氣出來。", "加入醬油與醬油膏，再加一點點冰糖拌炒（醬油膏本身帶甜，糖不必多）。", "倒入米酒，以全酒滷、不另外加水，滷煮至入味即完成。"], "tip": "肉塊汆燙後要擦乾再下鍋才不會黏鍋；先煸過再滷，香氣才會足。二姐提醒醬油膏就會甜，減糖減油更健康；全酒下去滷、不加水，酒香更足。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "梅花豬先煸香，洋蔥醬油膏全酒下去滷，古早味超下飯", "chapters": [], "views": 1100, "zones": ["澎湃"]}, {"name": "涼拌杏鮑菇", "img": "VID-137.jpg", "yt": "1VsPAXUq7eo", "cat": "蔬菜", "ing": "杏鮑菇、紅蘿蔔、蒜末、香菜、醬油膏適量、辣椒醬適量、香油少許、醋少許、鹽少許", "steps": ["杏鮑菇切好，紅蘿蔔切絲備用。", "煮一鍋水，加一點鹽讓食材先入味。", "放入杏鮑菇與紅蘿蔔絲快速汆燙，燙一下就好不要太久。", "撈起瀝乾，把水分瀝到乾乾的。", "加入蒜末、醬油膏、辣椒醬與香油拌勻。", "放入香菜，最後再補一點醋拌勻即可。"], "tip": "汆燙水裡先加鹽，食材更入味；燙太久口感會軟爛。辣椒醬視吃辣程度斟酌、不要太辣；加些小黃瓜絲更清脆好吃。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "汆燙杏鮑菇拌紅蘿蔔絲，蒜香辣醬加香菜提味，清爽又開胃", "chapters": [], "views": 808, "zones": ["新手", "懶人"]}, {"name": "九層塔煎蛋", "img": "VID-138.jpg", "yt": "eXS7131X_Qo", "cat": "豆蛋", "ing": "雞蛋2顆、九層塔、極致輕脂青汁2包、醬油膏少許、鹽少許、水少許", "steps": ["九層塔洗淨切碎備用。", "雞蛋2顆打散，加入2包「極致輕脂」青汁粉拌勻，增加膳食纖維。", "再加一點醬油膏、少許鹽巴與一點點水拌勻。", "熱鍋下油，倒入蛋液與九層塔。", "煎至兩面金黃即可起鍋。"], "tip": "蛋液裡加安媽的祕密武器「極致輕脂」青汁是關鍵，煎兩顆蛋配2包剛剛好；耐心等定型再翻面，才能煎得漂亮完整。青汁平常也可直接泡水、加牛奶或豆漿喝，補足膳食纖維。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "九層塔香撲鼻，青汁打進蛋液補纖維，兩面金黃超簡單", "chapters": [], "views": 1300, "zones": ["新手", "高蛋白"]}, {"name": "清炒荷蘭豆", "img": "VID-139.jpg", "yt": "Vbl_jjOXi_g", "cat": "蔬菜", "ing": "荷蘭豆、油少許、鹽少許", "steps": ["熱鍋後下少許油。", "荷蘭豆下鍋，以大火快炒。", "加入少許鹽調味，拌炒均勻。", "炒至荷蘭豆翠綠即可起鍋。"], "tip": "安媽強調少鹽少油，大火快炒最能保留荷蘭豆的清脆與甜味；二姐說吃這個也比較健康。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "少鹽少油大火快炒，翠綠清脆的家常荷蘭豆。", "chapters": [], "views": 1200, "zones": ["新手", "懶人"]}, {"name": "蒜炒芥蘭", "img": "VID-140.jpg", "yt": "zzQsnMOuB18", "cat": "蔬菜", "ing": "芥蘭、蒜頭、油少許、米酒少許、鹽少許", "steps": ["芥蘭洗淨切段；非當季的芥蘭先汆燙過，比較不會苦、口感較脆。", "熱鍋下油，放入蒜頭爆香。", "下芥蘭大火拌炒，嗆入少許米酒。", "蓋上鍋蓋稍燜，讓芥蘭自己收汁、燜出甜味。", "起鍋前再補一點油拌勻，芥蘭較不易變黑。"], "tip": "二姐說買菜一定要買當季的：當季芥蘭蓋鍋蓋燜一下自己收汁就很甜；非當季的先汆燙再炒才不苦。起鍋前補點油，可保持翠綠不發黑。不知道什麼是當季菜，上網查或問菜販就知道。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "蒜香爆炒加蓋稍燜，芥蘭鮮甜翠綠不發黑。", "chapters": [], "views": 1300, "zones": ["新手"]}, {"name": "蘑菇滷肉刈包堡", "img": "VID-141.jpg", "yt": "eB2mJzmAUb0", "cat": "肉類", "ing": "大朵蘑菇、南瓜、滷肉（當天滷好的梅花豬）、刈包、滷肉滷汁、油少許", "steps": ["大朵蘑菇不能乾煎（太大顆乾煎不會熟），下鍋半乾煎上色出香氣後，蓋上鍋蓋燜熟，燜好會縮小變軟。", "南瓜放入滷肉的滷汁中滷至入味，呈現鹹中帶甜的風味。", "將滷南瓜壓成泥，當作美乃滋醬使用。", "燜好的蘑菇取出切片。", "組裝：刈包抹上南瓜泥醬，依序疊上蘑菇片與滷肉片，包起來即完成。"], "tip": "滷過的南瓜泥鹹甜滑順，取代美乃滋更清爽也更省錢；蘑菇要半乾煎再燜才有香氣，直接水煮就沒有香氣、再乾一點就不會出水。", "long": "https://youtu.be/SB2cNI2aC5U", "wide": false, "desc": "刈包抹滷南瓜泥，夾煎蘑菇與滷肉片，鹹甜好滋味。", "chapters": [], "views": 1100, "zones": ["澎湃"]}, {"name": "香菇高麗菜炒米粉", "img": "VID-142.jpg", "yt": "y38Uz7Uw-H8", "cat": "全穀雜糧", "ing": "米粉、紅蘿蔔、香菇、豆乾丁、植物肉（新豬肉，大豆製素絞肉）、高麗菜、油少許、醬油適量、鹽少許、胡椒粉少許、香菜（可加）", "steps": ["米粉泡軟並分段剪短備用。", "紅蘿蔔先下鍋加油煸炒——紅蘿蔔的維生素A是脂溶性，加油炒吸收率更好，也帶出色澤與香氣。", "接著煸香菇；再分段補一點油，下植物肉（新豬肉素絞肉）與豆乾丁一起煸香。", "下高麗菜拌炒，沿鍋邊熗入醬油，先把醬油香炒出來。", "醬香出來後才下水；水量不用太多，要看米粉吸不吸水——會吸水的米粉水更不能多。", "放入米粉拌炒，讓米粉均勻吸附湯汁。", "加鹽巴與胡椒粉調味，拌炒收乾即完成；起鍋可依喜好加香菜。"], "tip": "醬油先熗出醬香再下水；水量依米粉吸水程度調整、寧少勿多，口感才不軟爛。安媽選無添加修飾澱粉的有機米粉。", "long": "https://youtu.be/qXTxwAxMbwc", "wide": false, "desc": "紅蘿蔔香菇煸香、植物肉提味，醬油熗鍋的古早味素炒米粉。", "chapters": [], "views": 13000, "zones": ["澎湃"]}, {"name": "快手天貝鬆", "img": "VID-143.jpg", "yt": "SLnwQ06zcgM", "cat": "豆蛋", "ing": "天貝、薑、毛豆、玉米、紅辣椒（可加）、九層塔、油適量、鹽巴少許、黑胡椒粉少許、韓式辣椒粉少許（可加）", "steps": ["天貝切小丁下鍋煸炒；天貝吃油，這道油量會比一般炒菜多一點，油溫拉高一點才不沾鍋。", "耐心煸，煸得越香越好吃，煸至上色、表面焦香酥鬆，呈現像蝦鬆的口感。", "加入薑拌炒提香。", "加少許鹽巴調味——安媽說加鹽巴這樣就很好吃了；喜歡辣可再加韓式辣椒粉。
