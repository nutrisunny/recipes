  .card h3{margin:0 0 5px;font-size:16px;font-weight:700}

       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .overlay{position:fixed;inset:0;background:rgba(60,45,35,.55);display:none;z-index:50;

  .overlay.show{display:flex}

  .modal .mcat{color:var(--tan);font-size:13px;font-weight:800;filter:brightness(.85)}

  .modal h4{margin:18px 0 8px;font-size:14px;color:var(--muted);letter-spacing:1px}

</style>
</head>

let curCat="全部";
const grid=document.getElementById('grid'),bar=document.getElementById('bar'),q=document.getElementById('q'),countEl=document.getElementById('count');
["全部",...DB.cats].forEach(c=>{const b=document.createElement('button');b.className='pill'+(c==="全部"?' active':'');b.textContent=c;
  b.onclick=()=>{curCat=c;[...bar.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};bar.appendChild(b);});
function match(r){const kw=q.value.trim().toLowerCase();if(curCat!=="全部"&&r.cat!==curCat)return false;if(!kw)return true;
  return r.name.toLowerCase().includes(kw)||r.ing.join(",").toLowerCase().includes(kw);}
function thumb(r){return r.img?`<img src="${r.img}" alt="${r.name}">`:`<div class="ph">${r.name}</div>`;}
function render(){const list=DB.recipes.filter(match);countEl.textContent=`共 ${list.length} 道`;
  grid.innerHTML=list.map(r=>`<div class="card" onclick="openModal(${DB.recipes.indexOf(r)})"><div class="thumb"><span class="badge">${r.cat}</span>${thumb(r)}</div><div class="body"><h3>${r.name}</h3><div class="ing">${r.ing.join('、')}</div></div></div>`).join('')||`<p style="color:#999">找不到符合的食譜</p>`;}
function openModal(i){const r=DB.recipes[i];
  document.getElementById('modal').innerHTML=`<div class="mimg">${r.img?`<img src="${r.img}" alt="${r.name}">`:`<div class="ph">${r.name}</div>`}</div>
    <div class="mbody"><div class="mcat">${r.cat}</div><h2>${r.name}</h2><h4>食材</h4>
    <div class="tags">${r.ing.map(x=>`<span class="tag">${x}</span>`).join('')||'<span style="color:#999">（待補）</span>'}</div>
    <div class="follow"><p>❤️ 喜歡這道料理？追蹤送你營養吃看更多食譜！</p><div class="socials">${SOCIAL_MODAL}</div></div></div>`;
  document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal()};
q.oninput=render;render();
