<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>送你營養吃｜家常食譜</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  :root{
    --cream:#f8f2e8; --card:#fff; --ink:#50412f; --muted:#9c8b76;
    --rose:#d98fa4; --rose-d:#c26f88; --tan:#e0b877; --line:#ede3d3;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
       background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  header{background:linear-gradient(135deg,#f6dde1,#f9ecdd);padding:24px 18px 20px;text-align:center}
  header .logo{width:88px;height:88px;border-radius:50%;box-shadow:0 4px 14px rgba(120,80,60,.18);background:#fff}
  header h1{margin:10px 0 2px;font-size:25px;font-weight:800;color:var(--ink)}
  header p{margin:0;font-size:13px;color:#7d6b58}
  .search-wrap{max-width:520px;margin:16px auto 0;position:relative}
  .search-wrap input{width:100%;padding:12px 16px 12px 42px;border:none;border-radius:30px;
       font-size:15px;box-shadow:0 4px 16px rgba(120,80,60,.14);outline:none;background:#fff}
  .search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.4}
  .modeswitch{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:16px 12px 6px;background:var(--cream)}
  .msbtn{border:1.5px solid var(--rose);background:transparent;color:var(--rose-d);font-size:15px;
       font-weight:700;padding:9px 26px;border-radius:24px;cursor:pointer;transition:.15s}
  .msbtn.active{background:var(--rose);color:#fff}
  @media(max-width:480px){
    .modeswitch{gap:8px;padding:14px 10px 4px;max-width:330px;margin:0 auto}
    .msbtn{font-size:13.5px;padding:9px 0;flex:0 0 calc(50% - 4px);text-align:center}
  }
  .zb{font-size:13px;letter-spacing:1px}
  .views{margin-top:6px;font-size:12px;color:var(--muted)}
  .sortbar{position:static}
  .sortbar .pill{font-size:13px;padding:5px 12px}
  .platewrap{max-width:720px;margin:24px auto 50px;padding:0 16px;text-align:center}
  .platetitle{font-size:20px;font-weight:800;margin:0 0 4px}
  .platesub{font-size:13px;color:var(--muted);margin:0 0 18px}
  .platearea{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap}
  .plate{position:relative;width:min(460px,92vw);aspect-ratio:960/890;
       background:url(plate.png) center/contain no-repeat}
  .slot{position:absolute;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:1px;transition:.15s;text-align:center;padding:2px}
  .slot .sname{background:rgba(255,255,255,.92);border-radius:8px;padding:3px 7px;box-shadow:0 1px 4px rgba(120,80,60,.15)}
  .slot:hover .sname{background:#fff;transform:scale(1.04)}
  .slabel{font-size:10px;color:#8a5a3b;letter-spacing:1px;font-weight:700;background:rgba(255,255,255,.75);border-radius:6px;padding:1px 6px}
  .sname{font-size:13px;font-weight:800;line-height:1.25;color:var(--ink)}
  .sroll{position:absolute;right:0;bottom:-2px;border:none;background:transparent;cursor:pointer;font-size:12px;padding:2px;opacity:.75}
  .sroll:hover{opacity:1}
  .s-fruit{top:12%;left:15%;width:42%;height:15%}
  .s-nut{top:12%;left:68%;width:18%;height:13%}
  .s-nut .sname{font-size:10px;font-weight:600;padding:2px 5px}
  .s-fruit .sname{font-size:11px;font-weight:600}
  .s-grain{top:34%;left:8%;width:46%;height:14%}
  .s-soup{top:38%;left:57%;width:34%;height:30%;border-radius:50%}
  .s-protein{top:56%;left:7%;width:46%;height:14%}
  .s-veg1{top:79%;left:14%;width:30%;height:14%}
  .s-veg2{top:79%;left:48%;width:30%;height:14%}
  .dairycup{position:relative;width:130px;height:133px;background:url(plate_bowl.png) center/contain no-repeat;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .dairycup .sname{font-size:11px;font-weight:700;background:rgba(255,255,255,.92);border-radius:8px;padding:3px 7px}
  .dairycup .sroll{right:14%;bottom:14%}
  .platemenu{max-width:420px;margin:22px auto 0;text-align:left;background:#fff;border:1px solid var(--line);
       border-radius:14px;padding:14px 20px;font-size:14px;line-height:2}
  .platemenu b{color:var(--rose-d);font-weight:700;margin-right:6px}
  .platebtns{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .platebuy{display:inline-flex;align-items:center;border:1.5px solid var(--tan);background:#fff;color:#8a6a30;
       font-size:15px;font-weight:700;padding:9px 26px;border-radius:24px}
  .rel{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
  .relcard{flex:0 0 calc(33.3% - 7px);max-width:calc(33.3% - 7px);cursor:pointer;background:#faf6ee;
       border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:.15s}
  .relcard:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(80,65,47,.12)}
  .relcard img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .relcard p{margin:0;padding:7px 8px 9px;font-size:13px;font-weight:700;line-height:1.3}
  .sgrouptitle{max-width:1100px;margin:20px auto 2px;padding:0 16px;font-size:15px;font-weight:800;color:var(--rose-d)}
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .vthumb{aspect-ratio:1;position:relative;background:#e9e2d6}
  .vthumb img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
  .vplay{position:absolute;right:9px;bottom:9px;display:flex;align-items:center;justify-content:center}
  .vplay span{width:40px;height:40px;border-radius:50%;background:rgba(220,20,20,.92);
       display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .vplay svg{width:19px;height:19px;fill:#fff;margin-left:2px}
  .bar{position:sticky;top:0;z-index:20;background:var(--cream);border-bottom:1px solid var(--line);
       padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .pill{flex:0 0 auto;border:1.5px solid var(--rose);color:var(--rose-d);background:transparent;
       padding:7px 15px;border-radius:20px;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s}
  .pill.active{background:var(--rose);color:#fff;border-color:var(--rose)}
  .barlabel{flex:0 0 auto;font-size:12px;color:var(--muted);letter-spacing:2px;align-self:center;padding-right:2px}
  .zpill{flex:0 0 auto;border:none;padding:7px 15px;border-radius:20px;font-size:14px;cursor:pointer;
       white-space:nowrap;transition:.15s;font-weight:600}
  .zpill.z0{background:#e9f1dd;color:#5d7d40}.zpill.z0.active{background:#87a562;color:#fff}
  .zpill.z1{background:#e2edf5;color:#4a708c}.zpill.z1.active{background:#7599b5;color:#fff}
  .zpill.z2{background:#faeeda;color:#a06a2c}.zpill.z2.active{background:#d99a4e;color:#fff}
  .zpill.z3{background:#f0e7f2;color:#7d5a85}.zpill.z3.active{background:#a37cab;color:#fff}
  .count{max-width:1100px;margin:14px auto 0;padding:0 16px;color:var(--muted);font-size:13px;scroll-margin-top:64px}
  .grid{max-width:1100px;margin:10px auto 40px;padding:0 16px;
       display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;
       box-shadow:0 2px 10px rgba(120,80,60,.08);transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(120,80,60,.16)}
  .thumb{aspect-ratio:1;background:#f0ede3;position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
       font-size:22px;font-weight:800;color:var(--rose-d);background:repeating-linear-gradient(45deg,#f3f0e6,#f3f0e6 10px,#eee9db 10px,#eee9db 20px)}
  .badge{position:absolute;top:8px;left:8px;background:rgba(217,143,164,.94);color:#fff;
       font-size:11px;padding:3px 9px;border-radius:12px}
  .vbadge{position:absolute;top:8px;right:8px;background:rgba(220,20,20,.94);color:#fff;
       font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px}
  .modal .mvid{padding:14px;background:#faf7ef;flex-direction:column;gap:8px;justify-content:center}
  .modal .mvid iframe{height:min(74vh,600px);width:auto;max-width:100%;aspect-ratio:9/16;border:0;border-radius:10px}
  .modal .mvid iframe.wide{width:100%;height:auto;aspect-ratio:16/9}
  .chaps{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 4px}
  .chap{border:1.5px solid var(--line);background:#faf7ef;color:var(--ink);font-size:13px;
       padding:6px 12px;border-radius:16px;cursor:pointer;transition:.15s;font-family:inherit}
  .chap b{color:var(--rose-d);font-weight:700;margin-right:4px}
  .chap:hover{border-color:var(--rose);background:#fff}
  .vnote{font-size:12.5px;line-height:1.5;color:var(--rose-d);background:#fff;
       border:1px solid var(--line);border-radius:8px;padding:7px 10px;width:100%}
  .longbtn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;
       padding:11px 16px;border-radius:12px;background:#fff;border:1.5px solid var(--rose);
       color:var(--rose-d);font-size:14px;font-weight:700;transition:.15s}
  .longbtn:hover{background:var(--rose);color:#fff}
  .buynote{margin-top:14px;font-size:13.5px;color:#8a6a2f;line-height:1.6;font-weight:600}
  .buyrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .buybtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:16px;
       background:#fdf6e8;border:1.5px solid var(--tan);color:#8a6a2f;font-size:13px;font-weight:700;transition:.15s}
  .buybtn:hover{background:var(--tan);color:#fff}
  .card .body{padding:11px 13px 13px}
  .card h3{margin:0 0 5px;font-size:16px;font-weight:700}
  .card .ing{font-size:12px;color:var(--muted);line-height:1.5;
       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .overlay{position:fixed;inset:0;background:rgba(60,45,35,.55);display:none;z-index:50;
       align-items:center;justify-content:center;padding:16px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:860px;width:100%;max-height:90vh;overflow:auto;
       display:grid;grid-template-columns:1fr 1fr}
  .modal.longmode{grid-template-columns:1fr}
  .modal.longmode .mvid{padding:0;background:#000;border-radius:18px 18px 0 0;overflow:hidden}
  .modal.longmode .mvid iframe.wide{border-radius:0}
  .modal .mimg{background:#fff;display:flex;align-items:center;justify-content:center}
  .modal .mimg img{width:100%;height:auto;aspect-ratio:1;object-fit:contain;display:block}
  .modal .mimg .ph{min-height:280px;width:100%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:var(--rose-d)}
  .modal .mbody{padding:24px 24px 28px}
  .modal .mcat{color:var(--tan);font-size:13px;font-weight:800;filter:brightness(.85)}
  .modal h2{margin:6px 0 14px;font-size:26px}
  .modal h4{margin:18px 0 8px;font-size:14px;color:var(--muted);letter-spacing:1px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:#fbeef1;color:var(--rose-d);padding:6px 12px;border-radius:14px;font-size:14px}
  .steps{margin:8px 0 0;padding-left:22px;font-size:14.5px;line-height:1.85;color:var(--ink)}
  .steps li{margin-bottom:7px;padding-left:2px}
  .steps li::marker{color:var(--rose-d);font-weight:700}
  .tip{margin-top:14px;padding:10px 13px;background:#eef6ee;border:1px solid #d2e7d2;border-radius:10px;font-size:13px;color:#4d7a4d;line-height:1.6}
  .pending{margin-top:12px;padding:9px 13px;background:#faf3ea;border:1px dashed #e2cfa8;border-radius:10px;font-size:13px;color:#a2865c}
  .video{position:relative;padding-top:56.25%;margin-top:8px;border-radius:12px;overflow:hidden;background:#000}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .follow{margin-top:20px;padding:14px;background:#fbf3ea;border:1px solid #f0e2cd;border-radius:14px}
  .follow p{margin:0 0 10px;font-size:13px;color:#8a6d4f;font-weight:600}
  .socials{display:flex;flex-wrap:wrap;gap:8px}
  .s-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;
       color:#fff;font-size:13px;font-weight:600}
  .s-btn svg{width:16px;height:16px}
  .s-fb{background:#1877f2}.s-yt{background:#ff0000}.s-line{background:#06c755}
  .s-btn:hover{opacity:.9}
  .close{position:absolute;top:20px;right:22px;background:#fff;border:none;width:38px;height:38px;
       border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(60,45,35,.2);z-index:60}
  .totop{position:fixed;right:18px;bottom:22px;padding:11px 18px;border-radius:24px;
       background:var(--rose);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;
       box-shadow:0 4px 12px rgba(120,80,60,.35);display:none;z-index:40;transition:.15s;letter-spacing:1px}
  .totop:hover{background:var(--rose-d)}
  .totop.show{display:block}
  footer{background:#efe0d0;color:var(--ink);text-align:center;padding:26px 16px}
  footer .flogo{width:56px;height:56px;border-radius:50%;box-shadow:0 2px 8px rgba(120,80,60,.2)}
  footer h3{margin:8px 0 4px;font-size:17px}
  footer .socials{justify-content:center;margin:12px 0 10px}
  footer .credit{font-size:12px;color:#8a7862;margin-top:6px}
  @media(max-width:640px){.modal{grid-template-columns:1fr}header h1{font-size:22px}}
</style>
</head>
<body>
<header>
  <img class="logo" src="logo.png" alt="送你營養吃">
  <h1>送你營養吃</h1>
  <p>家常食譜 ｜ 一菜一卡，食材清清楚楚</p>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" placeholder="搜尋菜名或食材，例如「番茄」「雞胸」">
  </div>
</header>
<div class="modeswitch">
  <button id="ms-card" class="msbtn active" onclick="setMode('card')">圖卡食譜</button>
  <button id="ms-vid" class="msbtn" onclick="setMode('vid')">影片食譜</button>
  <button id="ms-long" class="msbtn" onclick="setMode('long')">長片教學</button>
  <button id="ms-plate" class="msbtn" onclick="setMode('plate')">🍽️ 幫我配餐</button>
</div>
<div class="bar" id="zbar" style="padding-top:2px"></div>
<div id="cardview">
  <div class="bar" id="bar"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>
<div id="vidview" style="display:none">
  <div class="bar" id="vbar"></div>
  <div class="bar sortbar" id="vsortbar" style="border-bottom:none;padding-top:6px;padding-bottom:2px"></div>
  <div class="count" id="vcount"></div>
  <div class="grid vgrid" id="vgrid"></div>
</div>
<div id="longview" style="display:none">
  <div class="bar" id="lbar"></div>
  <div class="bar sortbar" id="lsortbar" style="border-bottom:none;padding-top:6px;padding-bottom:2px"></div>
  <div class="count" id="lcount"></div>
  <div class="grid vgrid" id="lgrid"></div>
</div>
<div id="plateview" style="display:none">
  <div class="platewrap">
    <p class="platetitle">今天吃什麼？讓營養師幫你配 🍽️</p>
    <p class="platesub">照著營養餐盤的六大類比例，一鍵配出一餐；點格子看食譜、點 🔄 單格換菜（湯品自動避開澱粉湯，不與主食重複）</p>
    <div class="platearea">
      <div class="plate">
        <div class="slot s-fruit"><span class="slabel">水果類</span><span class="sname" id="p-fruit"></span><button class="sroll" onclick="rollFixed('fruit')">🔄</button></div>
        <div class="slot s-nut"><span class="slabel">堅果類</span><span class="sname" id="p-nut"></span><button class="sroll" onclick="rollFixed('nut')">🔄</button></div>
        <div class="slot s-grain" onclick="openPlate('grain')"><span class="slabel">全穀雜糧類</span><span class="sname" id="p-grain"></span><button class="sroll" onclick="event.stopPropagation();rollSlot('grain')">🔄</button></div>
        <div class="slot s-soup" onclick="openPlate('soup')"><span class="slabel">彈性空間・湯</span><span class="sname" id="p-soup"></span><button class="sroll" onclick="event.stopPropagation();rollSlot('soup')">🔄</button></div>
        <div class="slot s-protein" onclick="openPlate('protein')"><span class="slabel">豆蛋魚肉類</span><span class="sname" id="p-protein"></span><button class="sroll" onclick="event.stopPropagation();rollSlot('protein')">🔄</button></div>
        <div class="slot s-veg1" onclick="openPlate('veg1')"><span class="slabel">蔬菜類</span><span class="sname" id="p-veg1"></span><button class="sroll" onclick="event.stopPropagation();rollSlot('veg1')">🔄</button></div>
        <div class="slot s-veg2" onclick="openPlate('veg2')"><span class="slabel">蔬菜類</span><span class="sname" id="p-veg2"></span><button class="sroll" onclick="event.stopPropagation();rollSlot('veg2')">🔄</button></div>
      </div>
      <div class="dairycup"><span class="slabel">乳品類</span><span class="sname" id="p-dairy"></span><button class="sroll" onclick="rollFixed('dairy')">🔄</button></div>
    </div>
    <div class="platemenu" id="platemenu"></div>
    <div class="platebtns">
      <button class="msbtn" onclick="rollPlate()">🎲 重新配一餐</button>
      <button class="msbtn" onclick="copyMenu(this)">📋 複製菜單</button>
      <a class="platebuy" href="https://i333.tw/%E9%A3%9F%E8%AD%9C%E9%A4%90%E7%9B%A4" target="_blank" rel="noopener">🛒 我也要這個營養餐盤</a>
    </div>
  </div>
</div>
<div id="searchview" style="display:none">
  <div class="count" id="scount"></div>
  <div id="sresults"></div>
</div>

<div class="overlay" id="overlay">
  <button class="close" onclick="closeModal()">×</button>
  <div class="modal" id="modal"></div>
</div>

<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到頂端">回到頂端</button>
<footer>
